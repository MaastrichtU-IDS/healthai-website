<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research · HAIR Group · Maastricht University</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    .theme-subnav {
      position: sticky; top: var(--nav-h); z-index: 10;
      background: var(--white); border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .theme-subnav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 32px;
      display: flex; gap: 0;
    }
    .theme-subnav a {
      padding: 13px 18px; font-size: 0.84rem; font-weight: 500;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; white-space: nowrap; transition: all var(--transition);
    }
    .theme-subnav a:hover { color: var(--slate); }
    .theme-subnav a.active { color: var(--slate); border-bottom-color: var(--slate); font-weight: 600; }

    .theme-block { padding: 72px 0; border-bottom: 1px solid var(--border); scroll-margin-top: 120px; }
    .theme-block.alt { background: var(--bg-alt); }
    .theme-inner { display: grid; grid-template-columns: 300px 1fr; gap: 64px; align-items: start; }
    .theme-sidebar { position: sticky; top: calc(var(--nav-h) + 54px); }
    .theme-num { font-family: 'Fraunces', serif; font-size: 5rem; font-weight: 700; color: var(--slate-light); line-height: 1; margin-bottom: 10px; }
    .theme-sidebar h2 { font-size: 1.4rem; margin-bottom: 12px; }
    .theme-sidebar p { font-size: 0.88rem; line-height: 1.75; margin-bottom: 18px; }
    .lead-chips { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .lead-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 7px; background: var(--white);
      border: 1px solid var(--border); font-size: 0.83rem;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    a.lead-chip:hover { border-color: var(--blue); box-shadow: var(--card-shadow); }
    .lead-dot {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--slate); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700;
    }

    @media (max-width: 860px) {
      .theme-inner { grid-template-columns: 1fr; gap: 28px; }
      .theme-sidebar { position: static; }
    }
  </style>
</head>
<body class="page-body">
<script src="nav.js"></script>
<script src="cms.js"></script>

<div class="page-hero">
  <div class="container">
    <span class="section-label">What we investigate</span>
    <h1>Research</h1>
    <p class="lead">Six interconnected themes advancing health AI — from data infrastructure to AI deployment.</p>
  </div>
</div>

<nav class="theme-subnav" id="themeSubnav">
  <div class="theme-subnav-inner" id="themeNavLinks"></div>
</nav>

<div class="loading" id="loading"><div class="spinner"></div> Loading…</div>
<div id="themesContainer"></div>

<script>
(async () => {
  const [data, people, pubsData] = await CMS.loadAll(
    'content/research.yaml',
    'content/people.yaml',
    'content/publications.generated.yaml'
  );
  document.getElementById('loading').remove();

  const nameToSlug  = Object.fromEntries((people || []).filter(p => p.slug).map(p => [p.name, p.slug]));
  const nameToOrcid = Object.fromEntries((people || []).filter(p => p.orcid).map(p => [p.name, p.orcid]));
  const allPubs     = (pubsData || {}).publications || [];

  /* Theme subnav */
  document.getElementById('themeNavLinks').innerHTML = data.themes.map(t =>
    `<a href="#theme-${t.id}">${t.number} ${t.title}</a>`
  ).join('');

  /* Theme sections */
  document.getElementById('themesContainer').innerHTML = data.themes.map((t, i) => {
    /* Projects for this theme */
    const themeProjs = data.projects
      .filter(p => (t.projects || []).includes(p.acronym))
      .sort((a, b) => (b.status === 'Active') - (a.status === 'Active'));

    /* Publications: featured DOIs first, then recent pubs from leads' ORCIDs */
    const leadOrcids   = new Set((t.leads || []).map(l => nameToOrcid[l]).filter(Boolean));
    const featuredDois = new Set(t.featured_pubs || []);
    const featured     = allPubs.filter(p => featuredDois.has(p.doi));
    const usedDois     = new Set(featured.map(p => p.doi));
    const recent       = allPubs
      .filter(p => !usedDois.has(p.doi) && (p.orcids || []).some(o => leadOrcids.has(o)))
      .sort((a, b) => b.year - a.year)
      .slice(0, 5 - featured.length);
    const themePubs = [...featured, ...recent];

    const pubsLink = t.leads.length
      ? `publications.html?q=${encodeURIComponent(t.leads[0])}`
      : 'publications.html';

    return `
    <div class="theme-block${i % 2 === 1 ? ' alt' : ''}" id="theme-${t.id}">
      <div class="container">
        <div class="theme-inner">
          <div class="theme-sidebar reveal">
            <div class="theme-num">${t.number}</div>
            <h2>${t.title}</h2>
            <p>${t.desc.trim()}</p>
            <div class="lead-chips">
              ${t.leads.map(l => {
                const slug = nameToSlug[l];
                const inner = `<div class="lead-dot">${CMS.initials(l)}</div><span>${l}</span>`;
                return slug
                  ? `<a class="lead-chip" href="people/?id=${slug}" style="text-decoration:none;color:inherit">${inner}</a>`
                  : `<div class="lead-chip">${inner}</div>`;
              }).join('')}
            </div>
          </div>

          <div class="reveal" data-delay="100">
            ${themeProjs.length ? `
              <p class="theme-content-label">Projects
                <a class="theme-content-link" href="projects.html">View all →</a>
              </p>
              <div class="theme-proj-grid">
                ${themeProjs.map(p => renderCard(p, nameToSlug)).join('')}
              </div>` : ''}

            <p class="theme-content-label">Recent Publications
              <a class="theme-content-link" href="${pubsLink}">View all →</a>
            </p>
            ${themePubs.length ? themePubs.map(p => {
              const authorParts = p.authors.split(', ');
              const authorShort = authorParts.length > 3
                ? authorParts.slice(0, 3).join(', ') + ' et al.'
                : p.authors;
              return `
              <div class="theme-pub-row">
                <a class="theme-pub-title" href="${p.doi ? 'https://doi.org/' + p.doi : '#'}" target="_blank" rel="noopener">${p.title}</a>
                <div class="theme-pub-meta">${authorShort} · ${p.venue || ''} · ${p.year}</div>
              </div>`;
            }).join('')
            : `<p style="color:var(--text-muted);font-size:0.86rem">No publications yet.</p>`}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  CMS.revealNew(document.getElementById('themesContainer'));

  /* Jump to anchor now that DOM is populated */
  if (location.hash) {
    requestAnimationFrame(() => {
      const target = document.querySelector(location.hash);
      if (target) target.scrollIntoView();
    });
  }

  /* Sticky active subnav */
  const themeEls = data.themes.map(t => document.getElementById('theme-' + t.id));
  const navLinks = document.querySelectorAll('.theme-subnav a');
  window.addEventListener('scroll', () => {
    const top = 64 + 45 + 80;
    let cur = 0;
    themeEls.forEach((el, i) => { if (el && el.getBoundingClientRect().top < top + 60) cur = i; });
    navLinks.forEach((a, i) => a.classList.toggle('active', i === cur));
  });
})();

function renderCard(p, nameToSlug) {
  const statusCls = p.status === 'Active' ? 'tag-active' : 'tag-muted';
  const logo = p.logo
    ? `<div class="proj-logo"><img src="${p.logo}" alt="${p.acronym} logo" loading="lazy"></div>`
    : '';
  const teamHtml = (p.team || []).map(name => {
    const slug = nameToSlug[name];
    return slug
      ? `<a class="proj-member" href="people/?id=${slug}">${name}</a>`
      : `<span class="proj-member">${name}</span>`;
  }).join('');
  const meta = [p.period, p.funder, p.amount].filter(Boolean).join(' · ');
  const titleLine = p.title && p.title.trim() && p.title.trim() !== p.acronym
    ? `<div class="proj-title">${p.title.trim()}</div>` : '';
  const urlLink = p.url
    ? `<a class="proj-url" href="${p.url}" target="_blank" rel="noopener">Visit project →</a>` : '';
  const featuredBadge = p.featured
    ? `<span class="tag tag-gold" style="font-size:0.68rem">Featured</span>` : '';
  return `
    <div class="proj-card${p.featured ? ' is-featured' : ''} reveal">
      ${logo}
      <div class="proj-body">
        <div class="proj-top">
          <span class="tag ${statusCls}" style="font-size:0.68rem">${p.status}</span>
          <div class="proj-badges">${featuredBadge}</div>
        </div>
        <div class="proj-acronym">${p.acronym}</div>
        ${titleLine}
        <p class="proj-desc">${(p.desc || '').trim()}</p>
        <div class="proj-footer">
          ${teamHtml ? `<div class="proj-team">${teamHtml}</div>` : ''}
          ${meta ? `<div class="proj-meta">${meta}</div>` : ''}
          ${urlLink}
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
