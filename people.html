<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People · HAIR Group · Maastricht University</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
    }
    .group-header {
      grid-column: 1 / -1;
      padding-bottom: 10px; margin: 8px 0 4px;
      border-bottom: 1.5px solid var(--slate-light);
      display: flex; align-items: baseline; gap: 12px;
    }
    .group-header h3 { font-size: 1.05rem; }
    .group-header .count { font-size: 0.78rem; color: var(--text-muted); }

    .person-card {
      background: var(--white); border-radius: var(--radius-lg);
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--card-shadow); cursor: pointer;
      transition: all var(--transition);
    }
    .person-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-3px); border-color: var(--blue); }
    .person-photo {
      aspect-ratio: 1/1; position: relative;
      background: var(--bg-alt);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .person-photo::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, var(--bg-alt) 0px, var(--bg-alt) 9px, var(--border) 9px, var(--border) 10px);
    }
    .person-initials {
      position: relative; z-index: 1;
      font-family: 'Fraunces', serif; font-size: 2rem;
      font-weight: 700; color: rgba(30,45,61,0.2);
    }
    .person-photo img {
      position: relative; z-index: 2;
      width: 100%; height: 100%; object-fit: cover; object-position: 50% 15%; display: block;
    }
    .person-info { padding: 14px 16px 18px; }
    .person-name { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; color: var(--slate); margin-bottom: 3px; }
    .person-role { font-size: 0.75rem; color: var(--blue); font-weight: 500; margin-bottom: 10px; }
    .person-kws  { display: flex; flex-wrap: wrap; gap: 4px; }

    /* Modal */
    .modal-header {
      background: var(--slate); padding: 32px 32px 24px;
      display: flex; gap: 20px; align-items: flex-start; position: relative;
    }
    .modal-avatar {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700;
      color: rgba(255,255,255,0.5);
    }
    .modal-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 15%; display: block; }
    .modal-hdr-text h3 { color: white; font-size: 1.3rem; margin-bottom: 4px; }
    .modal-hdr-text .role { color: rgba(46,143,160,0.9); font-size: 0.87rem; font-weight: 500; margin-bottom: 8px; }
    .modal-hdr-text .dept { color: rgba(255,255,255,0.5); font-size: 0.78rem; }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; cursor: pointer; transition: background var(--transition);
    }
    .modal-close:hover { background: rgba(255,255,255,0.25); }
    .modal-body { padding: 26px 32px 32px; }
    .modal-section-label {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; margin-top: 18px;
    }
    .modal-bio { font-size: 0.88rem; line-height: 1.75; color: var(--text-muted); }
    .modal-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .modal-link {
      padding: 6px 13px; border-radius: 6px; font-size: 0.78rem;
      border: 1px solid var(--border); color: var(--slate-mid);
      display: flex; align-items: center; gap: 5px;
      transition: all var(--transition);
    }
    .modal-link:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  </style>
</head>
<body class="page-body">
<script src="nav.js"></script>
<script src="cms.js"></script>

<div class="page-hero">
  <div class="container">
    <span class="section-label">Our team</span>
    <h1>People</h1>
    <p class="lead">Faculty, researchers, engineers and students working at the intersection of AI and health.</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="filter-bar">
      <input class="search-input" id="searchInput" type="text" placeholder="Search by name, role or keyword…" oninput="renderPeople()" />
      <div class="filter-chips" id="themeChips"></div>
    </div>
    <div class="loading" id="loading"><div class="spinner"></div> Loading…</div>
    <div class="people-grid" id="peopleGrid"></div>
    <p class="hidden text-center" id="noResults" style="padding:48px 0;color:var(--text-muted)">No matching people found.</p>
  </div>
</section>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="maybeClose(event)">
  <div class="modal" id="modal">
    <div id="modalContent"></div>
  </div>
</div>

<script>
const THEMES_ALL = ['All','Precision Medicine & Digital Health','Precision Agriculture, Food & Health','Neurosymbolic AI','Federated & Privacy-Preserving AI','Regulatory AI','Computational Biology & Bioinformatics'];
const SECTIONS = [
  { label: 'Faculty',
    match: p => p.group === 'Faculty' },
  { label: 'Postdocs, Researchers, and Research Software Engineers',
    match: p => p.group === 'Researchers' && p.role !== 'PhD Researcher' },
  { label: 'PhD Researchers',
    match: p => p.group === 'Researchers' && p.role === 'PhD Researcher' },
  { label: 'Research Staff',
    match: p => p.group === 'Staff' },
];
const ICON = (d) => `<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true" style="flex-shrink:0"><path d="${d}"/></svg>`;
const ICONS = {
  email:    ICON('M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z'),
  orcid:    ICON('M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zM7.369 4.378c.525 0 .947.431.947.947 0 .525-.422.947-.947.947-.525 0-.946-.422-.946-.947 0-.525.421-.947.946-.947zm-.722 3.038h1.444v10.041H6.647V7.416zm3.562 0h3.9c3.712 0 5.344 2.653 5.344 5.025 0 2.578-2.016 5.025-5.325 5.025h-3.919V7.416zm1.444 1.303v7.444h2.297c3.272 0 4.022-2.484 4.022-3.722 0-2.016-1.284-3.722-4.097-3.722h-2.222z'),
  scholar:  ICON('M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z'),
  linkedin: ICON('M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z'),
  pure:     ICON('M4 4h6a4 4 0 0 1 0 8H6v8H4V4zm2 2v4h4a2 2 0 0 0 0-4H6zm8-2h2v16h-2V4zm4 0h4v2h-4v6h3v2h-3v6h-2V4h2z'),
  work:     ICON('M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'),
  pubs:     ICON('M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z'),
};
let people = [], activeTheme = 'All';

(async () => {
  people = await CMS.load('content/people.yaml');
  document.getElementById('loading').remove();

  document.getElementById('themeChips').innerHTML = THEMES_ALL.map(t =>
    `<button class="chip${t==='All'?' active':''}" onclick="setTheme('${t}')">${t}</button>`
  ).join('');

  renderPeople();
})();

function setTheme(t) {
  activeTheme = t;
  document.querySelectorAll('#themeChips .chip').forEach(c => c.classList.toggle('active', c.textContent===t));
  renderPeople();
}

function renderPeople() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('peopleGrid');
  grid.innerHTML = '';
  let total = 0;

  SECTIONS.forEach(section => {
    const members = people.filter(p => {
      if (!section.match(p)) return false;
      const themeOk = activeTheme==='All' || (p.themes||[]).includes(activeTheme);
      if (!themeOk) return false;
      return !q || (p.name+p.role+(p.keywords||[]).join(' ')+p.bio).toLowerCase().includes(q);
    });
    if (!members.length) return;
    total += members.length;

    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `<h3>${section.label}</h3><span class="count">${members.length}</span>`;
    grid.appendChild(hdr);

    members.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'person-card reveal';
      card.dataset.delay = i * 45;
      const photo = p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy">`
        : `<span class="person-initials">${CMS.initials(p.name)}</span>`;
      card.innerHTML = `
        <div class="person-photo">${photo}</div>
        <div class="person-info">
          <div class="person-name">${p.name}</div>
          <div class="person-role">${p.role}</div>
          <div class="person-kws">${(p.keywords||[]).slice(0,3).map(k=>`<span class="tag tag-muted">${k}</span>`).join('')}</div>
        </div>`;
      card.onclick = () => openModal(p);
      grid.appendChild(card);
    });
  });

  document.getElementById('noResults').classList.toggle('hidden', total > 0);
  CMS.revealNew(grid);
}

function openModal(p) {
  const themes = (p.themes||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const kws = (p.keywords||[]).map(k=>`<span class="tag tag-muted">${k}</span>`).join('');
  const links = [];
  if (p.email)          links.push(`<a class="modal-link" href="mailto:${p.email}">${ICONS.email} Email</a>`);
  if (p.orcid)          links.push(`<a class="modal-link" href="https://orcid.org/${p.orcid}" target="_blank" rel="noopener">${ICONS.orcid} ORCID</a>`);
  if (p.google_scholar) links.push(`<a class="modal-link" href="https://scholar.google.com/citations?user=${p.google_scholar}" target="_blank" rel="noopener">${ICONS.scholar} Google Scholar</a>`);
  if (p.linkedin)       links.push(`<a class="modal-link" href="https://www.linkedin.com/in/${p.linkedin}" target="_blank" rel="noopener">${ICONS.linkedin} LinkedIn</a>`);
  if (p.cris_url)       links.push(`<a class="modal-link" href="${p.cris_url}" target="_blank" rel="noopener">${ICONS.pure} PURE</a>`);
  if (p.work_url)       links.push(`<a class="modal-link" href="${p.work_url}" target="_blank" rel="noopener">${ICONS.work} UM page</a>`);
  links.push(`<a class="modal-link" href="publications.html?q=${encodeURIComponent(p.name)}">${ICONS.pubs} Publications</a>`);

  const profileUrl = `people/${p.slug || p.name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')}`;
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar">${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : CMS.initials(p.name)}</div>
      <div class="modal-hdr-text">
        <h3>${p.name}</h3>
        <div class="role">${p.role}</div>
        <div class="dept">Dept. of Advanced Computing Sciences · Maastricht University</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">About</div>
      <p class="modal-bio">${p.bio}</p>
      ${themes ? `<div class="modal-section-label">Research themes</div><div style="display:flex;gap:6px;flex-wrap:wrap">${themes}</div>` : ''}
      <div class="modal-section-label">Keywords</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${kws}</div>
      <div class="modal-section-label">Links</div>
      <div class="modal-links">${links.join('')}</div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <a href="${profileUrl}" class="btn btn-primary" style="font-size:0.82rem;padding:8px 18px">View full profile →</a>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function maybeClose(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
</script>
</body>
</html>
