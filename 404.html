<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · HAIR Group · Maastricht University</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body class="page-body">
<script src="nav.js"></script>
<script>
(function () {
  var path = window.location.pathname;
  var m = path.match(/(.*\/people\/)([^/]+)\/?$/);
  if (m) {
    window.location.replace(m[1] + '?id=' + m[2]);
    return;
  }
  document.getElementById('hero404').classList.remove('hidden');
})();
</script>

<div id="hero404" class="hidden">
  <div class="page-hero">
    <div class="container">
      <span class="section-label">404</span>
      <h1>Page not found</h1>
      <p class="lead">The page you're looking for doesn't exist or has moved.</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:16px">← Back to home</a>
    </div>
  </div>
</div>
</body>
</html>
