  title: Remote and Proximal Sensing-Derived Spectral Indices and Biophysical Variables for Spatial Variation Determination in Vineyards
  authors: Darra N., Psomiadis E., Kasimati A., Anastasiou A., Anastasiou E., Fountas S.
  venue: Agronomy
  doi: 10.3390/agronomy11040741
  citations: 41
  orcids:
