  title: High-throughput assessment identifying major platelet Ca2+ entry pathways via tyrosine kinase-linked and G protein-coupled receptors
  authors: Cheung H. Y. F., Zou J., Tantiwong C., Fernandez D. I., Huang J., Ahrends R., Roest M., Cavill R., Gibbins J., Heemskerk J. W.
  venue: Cell Calcium
  doi: 10.1016/j.ceca.2023.102738
  citations: 17
  orcids:
