  authors: Dumontier M., Gray A. J., Marshall M. S., Alexiev V., Ansell P., Bader G., Baran J., Bolleman J. T., Callahan A., Cruz-Toledo J., Gaudet P., Gombocz E. A., Gonzalez-Beltran A. N., Groth P., Haendel M., Ito M., Jupp S., Juty N., Katayama T., Kobayashi N., Krishnaswami K., Laibe C., Le Novère N., Lin S., Malone J., Miller M., Mungall C. J., Rietveld L., Wimalaratne S. M., Yamaguchi A.
