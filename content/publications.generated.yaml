  tags: []
  abstract: Abstract The Center for Expanded Data Annotation and Retrieval is studying the creation of comprehensive and expressive metadata for biomedical datasets to facilitate data discovery, data interpretation, and data reuse. We take advantage of emerging community-based standard templates for describing different kinds of biomedical datasets, and we investigate the use of computational techniques to help investigators to assemble templates and to fill in their values. We are creating a repository of metadata from which we plan to identify metadata patterns that will drive predictive data entry when filling in metadata templates. The metadata repository not only will capture annotations specified when experimental datasets are initially created, but also will incorporate links to the published literature, including secondary analyses and possible refinements or retractions of experimental interpretations. By working initially with the Human Immunology Project Consortium and the developers of the ImmPort data repository, we are developing and evaluating an end-to-end solution to the problems of metadata authoring and management that will generalize to other data-management environments.
  summary: The Center for Expanded Data Annotation and Retrieval is creating comprehensive metadata for biomedical datasets using community-based templates and computational techniques to facilitate data discovery, interpretation, and reuse. They are developing a repository of metadata patterns from initial annotations and links to published literature, aiming to create an end-to-end solution that generalizes to other data-management environments.
- year: 2015
  type: Journal
  title: The digital revolution in phenotyping
  authors: Oellrich A., Collier N., Groza T., Rebholz-Schuhmann D., Shah N., Bodenreider O., Boland M. R., Georgiev I., Liu H., Livingston K., Luna A., Mallon A., Manda P., Robinson P. N., Rustici G., Simon M., Wang L., Winnenburg R., Dumontier M.
  venue: Briefings in Bioinformatics
  doi: 10.1093/bib/bbv083
  citations: 41
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Phenotypes have gained increased notoriety in the clinical and biological domain owing to their application in numerous areas such as the discovery of disease genes and drug targets, phylogenetics and pharmacogenomics. Phenotypes, defined as observable characteristics of organisms, can be seen as one of the bridges that lead to a translation of experimental findings into clinical applications and thereby support 'bench to bedside' efforts. However, to build this translational bridge, a common and universal understanding of phenotypes is required that goes beyond domain-specific definitions. To achieve this ambitious goal, a digital revolution is ongoing that enables the encoding of data in computer-readable formats and the data storage in specialized repositories, ready for integration, enabling translational research. While phenome research is an ongoing endeavor, the true potential hidden in the currently available data still needs to be unlocked, offering exciting opportunities for the forthcoming years. Here, we provide insights into the state-of-the-art in digital phenotyping, by means of representing, acquiring and analyzing phenotype data. In addition, we provide visions of this field for future research work that could enable better applications of phenotype data.
  summary: Phenotypes are observable characteristics of organisms that can be used to bridge experimental findings from the laboratory to clinical applications. However, a common understanding beyond domain-specific definitions is needed to unlock the true potential in currently available phenome data, offering exciting opportunities for future research.
