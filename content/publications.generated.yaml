  abstract: The visualization and comparison of electrophysiological information in the atrium among different patients could be facilitated by a standardized 2D atrial mapping. However, due to the complexity of the atrial anatomy, unfolding the 3D geometry into a 2D atrial mapping is challenging. In this study, we aim to develop a standardized approach to achieve a 2D atrial mapping that connects the left and right atria, while maintaining fixed positions and sizes of atrial segments across individuals. Atrial segmentation is a prerequisite for the process. Segmentation includes 19 different segments with 12 segments from the left atrium, 5 segments from the right atrium, and two segments for the atrial septum. To ensure consistent and physiologically meaningful segment connections, an automated procedure is applied to open up the atrial surfaces and project the 3D information into 2D. The corresponding 2D atrial mapping can then be utilized to visualize different electrophysiological information of a patient, such as activation time patterns or phase maps. This can in turn provide useful information for guiding catheter ablation. The proposed standardized 2D maps can also be used to compare more easily structural information like fibrosis distribution with rotor presence and location. We show several examples of visualization of different electrophysiological properties for both healthy subjects and patients affected by atrial fibrillation. These examples show that the proposed maps provide an easy way to visualize and interpret intra-subject information and perform inter-subject comparison, which may provide a reference framework for the analysis of the atrial fibrillation substrate before treatment, and during a catheter ablation procedure.
  summary: Researchers developed a standardized 2D atrial mapping approach that connects left and right atria while maintaining fixed positions and sizes across individuals. This method uses automated segmentation to project 3D information into 2D for visualization of electrophysiological properties, aiding in the interpretation of intra-subject and inter-subject comparisons, particularly useful for catheter ablation procedures.
