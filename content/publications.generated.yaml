  abstract: Background Nucleotide and protein sequence feature annotations are essential to understand biology on the genomic, transcriptomic, and proteomic level. Using Semantic Web technologies to query biological annotations, there was no standard that described this potentially complex location information as subject-predicate-object triples. Description We have developed an ontology, the Feature Annotation Location Description Ontology (FALDO), to describe the positions of annotated features on linear and circular sequences. FALDO can be used to describe nucleotide features in sequence records, protein annotations, and glycan binding sites, among other features in coordinate systems of the aforementioned "omics" areas. Using the same data format to represent sequence positions that are independent of file formats allows us to integrate sequence data from multiple sources and data types. The genome browser JBrowse is used to demonstrate accessing multiple SPARQL endpoints to display genomic feature annotations, as well as protein annotations from UniProt mapped to genomic locations. Conclusions Our ontology allows users to uniformly describe - and potentially merge - sequence annotations from multiple sources. Data sources using FALDO can prospectively be retrieved using federalised SPARQL queries against public SPARQL endpoints and/or local private triple stores.
  summary: Researchers developed the Feature Annotation Location Description Ontology (FALDO) to standardize how biological features are annotated in sequence data, including nucleotides, proteins, and glycan sites. By representing annotations as triples of subject-predicate-object, FALDO enables integration and uniform description across different genomic, transcriptomic, and proteomic datasets using a common data format that is independent of file formats. This ontology facilitates accessing multiple SPARQL endpoints to display genomic feature annotations and protein annotations from UniProt mapped to genomic locations in the genome browser JBrowse.
