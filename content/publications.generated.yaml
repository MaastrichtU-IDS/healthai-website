  title: Rule-augmented constraint learning for semantic error detection in MIMIC-III knowledge graph
  authors: Noben Ö., Durukan Kılıç Ö., Rienstra T., Dumontier M., Celebi R.
  venue: International Journal of Medical Informatics
  doi: 10.1016/j.ijmedinf.2026.106297
  citations: 1
  orcids:
  - 0000-0001-7769-4272
  - 0000-0003-4727-9435
  tags: []
  abstract: 'High-quality, error-free data is essential for developing reliable data-driven models, particularly in clinical decision support systems where inaccurate predictions can have serious consequences. While KGs offer a structured and semantically rich representation for clinical data, ensuring their consistency and correctness remains a challenge. Existing rule mining techniques provide solutions for the automatic extraction of logical constraints from KGs, but they often produce redundant or clinically irrelevant rules, especially when dealing with numeric or categorical literals such as age or lab values. KG constraints-rules intended to capture implausible or conflicting facts in the KG-can be used to spot semantic errors: facts that might conform to the underlying schema but contradict domain knowledge. In this work, we propose a novel framework for constraint learning in clinical KGs that identifies and transforms high-confidence rules into clinically plausible constraints. We propose two approaches, based on class disjointness and literal clustering combined with rule mining. We validate the clinical relevance of these generated rules using expert-curated constraints and large language models (LLMs). The results on the MIMIC-III clinical dataset show that rule filtering based constraint learning effectively preserves clinically meaningful rules that align with established medical knowledge. For numeric data, we achieve reliable value groupings through our clustering-based method, and the rules derived from these groupings were validated by LLMs. Their outputs confirm the clinical relevance of a portion of those discovered rules. By providing interpretable and scalable solutions to semantic inconsistencies in KGs, this study contributes to increasing the KG trustworthiness and its clinical usability.'
  summary: Researchers developed a novel framework for learning constraints from clinical Knowledge Graphs (KGs) that identifies and transforms high-confidence rules into clinically plausible constraints. This approach uses class disjointness and literal clustering combined with rule mining to validate generated rules using expert-curated constraints and large language models, improving the KG's trustworthiness and usability in clinical decision support systems.
