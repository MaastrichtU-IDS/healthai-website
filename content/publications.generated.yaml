  title: 'RKB: a Semantic Web knowledge base for RNA'
  authors: Cruz-Toledo J., Dumontier M., Parisien M., Major F.
  venue: Journal of Biomedical Semantics
  doi: 10.1186/2041-1480-1-s1-s2
  citations: 2
  orcids:
