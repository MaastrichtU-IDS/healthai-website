  title: 'Systematic comparison of non-invasive measures for the assessment of atrial fibrillation complexity: a step forward towards standardization of atrial fibrillation electrogram analysis'
  authors: Bonizzi P., Zeemering S., Karel J. M. H., Di Marco L. Y., Uldry L., Van Zaen J., Vesin J., Schotten U.
  venue: Europace
  doi: 10.1093/europace/euu202
