  title: 'Sustainability-Oriented Innovations and Smart Farming Technologies in Wine Value Chains: Assessing their Impact on Sustainability Performance'
  authors: Kasimati A., Papadopoulos G., Manstretta V., Giannakopoulou M., Adamides G., Neocleous D., Vassiliou V., Savvides S., Stylianou A.
