  abstract: The formation, maintenance, and repair of epithelial barriers are of critical importance for whole-body homeostasis. However, the molecular events involved in epithelial tissue maturation are not fully established. To this end, we investigated the molecular processes involved in renal epithelial proximal-tubule monolayer maturation utilizing transcriptomic, metabolomic, and functional parameters. We uncovered profound dynamic alterations in transcriptional regulation, energy metabolism, and nutrient utilization over the maturation process. Proliferating cells exhibited high glycolytic rates and high transcript levels for fatty acid synthesis genes (FASN), whereas matured cells had low glycolytic rates, increased oxidative capacity, and preferentially expressed genes for beta oxidation. There were dynamic alterations in the expression and localization of several adherens (CDH1, -4, and -16) and tight junction (TJP3 and CLDN2 and -10) proteins. Genes involved in differentiated proximal-tubule function, cilium biogenesis (BBS1), and transport (ATP1A1 and ATP1B1) exhibited increased expression during epithelial maturation. Using TransAM transcription factor activity assays, we could demonstrate that p53 and FOXO1 were highly active in matured cells, whereas HIF1A and c-MYC were highly active in proliferating cells. The data presented here will be invaluable in the further delineation of the complex dynamic cellular processes involved in epithelial cell regulation.
  summary: Researchers investigated the molecular mechanisms underlying renal proximal tubule epithelial tissue maturation using transcriptomics, metabolomics, and functional analyses. They found that matured cells had increased oxidative capacity and a preference for beta-oxidation over glycolysis compared to proliferating cells. Adherens and tight junction proteins were also dynamically expressed during maturation. The transcription factors p53 and FOXO1 were highly active in mature cells, while HIF1A and c-MYC were more active in proliferating cells. This study provides insights into the complex dynamic cellular processes involved in epithelial cell regulation.
- year: 2013
  type: Journal
  title: 'DTW4Omics: Comparing Patterns in Biological Time Series'
  authors: Cavill R., Kleinjans J., Briedé J.
  venue: PLoS ONE
  doi: 10.1371/journal.pone.0071823
  citations: 22
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: When studying time courses of biological measurements and comparing these to other measurements eg. gene expression and phenotypic endpoints, the analysis is complicated by the fact that although the associated elements may show the same patterns of behaviour, the changes do not occur simultaneously. In these cases standard correlation-based measures of similarity will fail to find significant associations. Dynamic time warping (DTW) is a technique which can be used in these situations to find the optimal match between two time courses, which may then be assessed for its significance. We implement DTW4Omics, a tool for performing DTW in R. This tool extends existing R scripts for DTW making them applicable for "omics" datasets where thousands entities may need to be compared with a range of markers and endpoints. It includes facilities to estimate the significance of the matches between the supplied data, and provides a set of plots to enable the user to easily visualise the output. We illustrate the utility of this approach using a dataset linking the exposure of the colon carcinoma Caco-2 cell line to oxidative stress by hydrogen peroxide (H2O2) and menadione across 9 timepoints and show that on average 85% of the genes found are not obtained from a standard correlation analysis between the genes and the measured phenotypic endpoints. We then show that when we analyse the genes identified by DTW4Omics as significantly associated with a marker for oxidative DNA damage (8-oxodG), through over-representation, an Oxidative Stress pathway is identified as the most over-represented pathway demonstrating that the genes found by DTW4Omics are biologically relevant. In contrast, when the positively correlated genes were similarly analysed, no pathways were found. The tool is implemented as an R Package and is available, along with a user guide from http://web.tgx.unimaas.nl/svn/public/dtw/.
  summary: Researchers developed DTW4Omics, an extension of existing R scripts for Dynamic Time Warping (DTW), to analyze time courses in "omics" datasets. This tool helps find optimal matches between thousands of entities and markers/phenotypic endpoints, assessing significance through plots and visualizing results. The study demonstrates that 85% of genes identified by DTW4Omics are not found using standard correlation analysis, highlighting its potential for discovering biologically relevant pathways in complex datasets like gene expression and phenotypic measurements.
