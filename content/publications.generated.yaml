  title: High-density and high coverage composite mapping of repetitive atrial activation patterns
  authors: Özgül O., Hermans B. J., van Hunnik A., Verheule S., Schotten U., Bonizzi P., Zeemering S.
  venue: Computers in Biology and Medicine
  doi: 10.1016/j.compbiomed.2023.106920
  citations: 4
