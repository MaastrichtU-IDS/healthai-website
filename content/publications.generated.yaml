  title: Toward a complete dataset of drug–drug interaction information from publicly available sources
  authors: Ayvaz S., Horn J., Hassanzadeh O., Zhu Q., Stan J., Tatonetti N. P., Vilar S., Brochhausen M., Samwald M., Rastegar-Mojarad M., Dumontier M., Boyce R. D.
  venue: Journal of Biomedical Informatics
  doi: 10.1016/j.jbi.2015.04.006
  citations: 95
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Although potential drug-drug interactions (PDDIs) are a significant source of preventable drug-related harm, there is currently no single complete source of PDDI information. In the current study, all publically available sources of PDDI information that could be identified using a comprehensive and broad search were combined into a single dataset. The combined dataset merged fourteen different sources including 5 clinically-oriented information sources, 4 Natural Language Processing (NLP) Corpora, and 5 Bioinformatics/Pharmacovigilance information sources. As a comprehensive PDDI source, the merged dataset might benefit the pharmacovigilance text mining community by making it possible to compare the representativeness of NLP corpora for PDDI text extraction tasks, and specifying elements that can be useful for future PDDI extraction purposes. An analysis of the overlap between and across the data sources showed that there was little overlap. Even comprehensive PDDI lists such as DrugBank, KEGG, and the NDF-RT had less than 50% overlap with each other. Moreover, all of the comprehensive lists had incomplete coverage of two data sources that focus on PDDIs of interest in most clinical settings. Based on this information, we think that systems that provide access to the comprehensive lists, such as APIs into RxNorm, should be careful to inform users that the lists may be incomplete with respect to PDDIs that drug experts suggest clinicians be aware of. In spite of the low degree of overlap, several dozen cases were identified where PDDI information provided in drug product labeling might be augmented by the merged dataset. Moreover, the combined dataset was also shown to improve the performance of an existing PDDI NLP pipeline and a recently published PDDI pharmacovigilance protocol. Future work will focus on improvement of the methods for mapping between PDDI information sources, identifying methods to improve the use of the merged dataset in PDDI NLP algorithms, integrating high-quality PDDI information from the merged dataset into Wikidata, and making the combined dataset accessible as Semantic Web Linked Data.
  summary: Researchers created a comprehensive dataset by merging fourteen different sources of potential drug-drug interactions (PDDIs) data, including 5 clinical-oriented sources, 4 NLP corpora, and 5 bioinformatics/pharmacovigilance information sources. The merged dataset shows little overlap with existing PDDI lists like DrugBank and KEGG, highlighting the need for caution when using these lists in systems that provide access to them. The study also found that some cases of PDDIs could be augmented by the combined dataset, improving performance of NLP pipelines and protocols. Future work will focus on mapping methods between data sources, improving use of the merged dataset in algorithms, integrating high-quality information into Wikidata, and making the combined dataset accessible as Semantic Web Linked Data.
- year: 2015
  type: Journal
  title: Transcriptomic and metabolomic data integration
  authors: Cavill R., Jennen D., Kleinjans J., Briedé J. J.
  venue: Briefings in Bioinformatics
  doi: 10.1093/bib/bbv090
  citations: 280
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Many studies now produce parallel data sets from different omics technologies; however, the task of interpreting the acquired data in an integrated fashion is not trivial. This review covers those methods that have been used over the past decade to statistically integrate and interpret metabolomics and transcriptomic data sets. It defines four categories of approaches, correlation-based integration, concatenation-based integration, multivariate-based integration and pathway-based integration, into which all existing statistical methods fit. It also explores the choices in study design for generating samples for analysis by these omics technologies and the impact that these technical decisions have on the subsequent data analysis options.
  summary: This review summarizes various methods used to integrate and interpret parallel metabolomics and transcriptomic data sets from different omics technologies, categorizing them into correlation-based integration, concatenation-based integration, multivariate-based integration, and pathway-based integration. It also discusses study design choices for generating samples and the impact of technical decisions on subsequent analysis options.
- year: 2014
  type: Journal
  title: 'A cloud-based Farm Management System: Architecture and implementation'
  authors: Kaloxylos A., Groumas A., Sarris V., Katsikas L., Magdalinos P., Antoniou E., Politopoulou Z., Wolfert S., Brewster C., Eigenmann R., Maestre Terol C.
  venue: Computers and Electronics in Agriculture
  doi: 10.1016/j.compag.2013.11.014
  citations: 131
  orcids:
  - 0000-0001-6594-9178
  tags: []
  abstract: Recent technological advances have paved the way for developing and offering advanced services for the stakeholders in the agricultural sector. A paradigm shift is underway from proprietary and monolithic tools to Internet-based, cloud hosted, open systems that will enable more effective collaboration between stakeholders. This new paradigm includes the technological support of application developers to create specialized services that will seamlessly interoperate, thus creating a sophisticated and customisable working environment for the end users. We present the implementation of an open architecture that instantiates such an approach, based on a set of domain independent software tools called “generic enablers” that have been developed in the context of the FI-WARE project. The implementation is used to validate a number of innovative concepts for the agricultural sector such as the notion of a services’ market place and the system’s adaptation to network failures. During the design and implementation phase, the system has been evaluated by end users, offering us valuable feedback. The results of the evaluation process validate the acceptance of such a system and the need of farmers to have access to sophisticated services at affordable prices. A summary of this evaluation process is also presented in this paper.
  summary: Researchers developed an open architecture for agricultural technology that allows stakeholders to collaborate more effectively, enabling specialized services to seamlessly interoperate. This approach includes domain-independent software tools called "generic enablers" used in the FI-WARE project. The system was validated by end users and showed acceptance and a need for affordable sophisticated services.
- year: 2014
  type: Journal
  title: Automatically exposing OpenLifeData via SADI semantic Web Services
  authors: González A. R., Callahan A., Cruz-Toledo J., Garcia A., Egaña Aranguren M., Dumontier M., Wilkinson M. D.
  venue: Journal of Biomedical Semantics
  doi: 10.1186/2041-1480-5-46
  citations: 10
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background Two distinct trends are emerging with respect to how data is shared, collected, and analyzed within the bioinformatics community. First, Linked Data, exposed as SPARQL endpoints, promises to make data easier to collect and integrate by moving towards the harmonization of data syntax, descriptive vocabularies, and identifiers, as well as providing a standardized mechanism for data access. Second, Web Services, often linked together into workflows, normalize data access and create transparent, reproducible scientific methodologies that can, in principle, be re-used and customized to suit new scientific questions. Constructing queries that traverse semantically-rich Linked Data requires substantial expertise, yet traditional RESTful or SOAP Web Services cannot adequately describe the content of a SPARQL endpoint. We propose that content-driven Semantic Web Services can enable facile discovery of Linked Data, independent of their location. Results We use a well-curated Linked Dataset - OpenLifeData - and utilize its descriptive metadata to automatically configure a series of more than 22,000 Semantic Web Services that expose all of its content via the SADI set of design principles. The OpenLifeData SADI services are discoverable via queries to the SHARE registry and easy to integrate into new or existing bioinformatics workflows and analytical pipelines. We demonstrate the utility of this system through comparison of Web Service-mediated data access with traditional SPARQL, and note that this approach not only simplifies data retrieval, but simultaneously provides protection against resource-intensive queries. Conclusions We show, through a variety of different clients and examples of varying complexity, that data from the myriad OpenLifeData can be recovered without any need for prior-knowledge of the content or structure of the SPARQL endpoints. We also demonstrate that, via clients such as SHARE, the complexity of federated SPARQL queries is dramatically reduced.
  summary: Researchers developed a system using Semantic Web Services to discover and access Linked Data from OpenLifeData without requiring knowledge of specific endpoint structures. This approach simplifies data retrieval and reduces resource-intensive queries compared to traditional SPARQL methods.
