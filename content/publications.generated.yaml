  title: 'The Translational Medicine Ontology and Knowledge Base: driving personalized medicine by bridging the gap between bench and bedside'
  authors: Luciano J. S., Andersson B., Batchelor C., Bodenreider O., Clark T., Denney C. K., Domarew C., Gambet T., Harland L., Jentzsch A., Kashyap V., Kos P., Kozlovsky J., Lebo T., Marshall S. M., McCusker J. P., McGuinness D. L., Ogbuji C., Pichler E., Powers R. L., Prud’hommeaux E., Samwald M., Schriml L., Tonellato P. J., Whetzel P. L., Zhao J., Stephens S., Dumontier M.
  venue: Journal of Biomedical Semantics
