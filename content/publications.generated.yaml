  title: 'Forecasting Banned Substances: Leveraging GNN and Explainable AI for Sports Anti-Doping'
  authors: Gavrish A., Yang Y., Loesch J., Dumontier M.
  venue: Studies in Health Technology and Informatics
  doi: 10.3233/shti250287
  citations: 0
  orcids:
