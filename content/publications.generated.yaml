  tags: []
  abstract: Abstract “FAIRness” - the degree to which a digital resource is Findable, Accessible, Interoperable, and Reusable - is aspirational, yet the means of reaching it may be defined by increased adherence to measurable indicators. We report on the production of a core set of semi-quantitative metrics having universal applicability for the evaluation of FAIRness, and a rubric within which additional metrics can be generated by the community. This effort is the output from a stakeholder-representative group, founded by a core of FAIR principles’ co-authors and drivers. We now seek input from the community to more broadly discuss their merit.
  summary: A group of researchers created a set of semi-quantitative metrics for evaluating FAIRness (Findable, Accessible, Interoperable, Reusable) that can be applied universally across different resources. They also developed a rubric within which additional metrics can be generated by the community to further assess FAIRness. This effort aims to gather input from stakeholders to enhance the discussion on these metrics' merit.
