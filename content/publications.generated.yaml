  authors: Wimalaratne S. M., Bolleman J., Juty N., Katayama T., Dumontier M., Redaschi N., Le Novère N., Hermjakob H., Laibe C.
  venue: Bioinformatics
  doi: 10.1093/bioinformatics/btv064
  citations: 13
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Abstract Motivation: On the semantic web, in life sciences in particular, data is often distributed via multiple resources. Each of these sources is likely to use their own International Resource Identifier for conceptually the same resource or database record. The lack of correspondence between identifiers introduces a barrier when executing federated SPARQL queries across life science data. Results: We introduce a novel SPARQL-based service to enable on-the-fly integration of life science data. This service uses the identifier patterns defined in the Identifiers.org Registry to generate a plurality of identifier variants, which can then be used to match source identifiers with target identifiers. We demonstrate the utility of this identifier integration approach by answering queries across major producers of life science Linked Data. Availability and implementation: The SPARQL-based identifier conversion service is available without restriction at http://identifiers.org/services/sparql . Contact: sarala@ebi.ac.uk'
  summary: Researchers developed a novel SPARQL-based service to integrate life science data from multiple sources that use different identifiers, addressing the challenge of federated SPARQL queries. This approach uses identifier patterns defined in Identifiers.org Registry to generate variant identifiers and match them with source and target identifiers, enabling seamless integration across major producers of Linked Data.
