  title: Standardized 2D atrial mapping and its clinical applications
  authors: Wang T., Karel J., Invers-Rubio E., Hernández-Romero I., Peeters R., Bonizzi P., Guillem M. S.
  venue: Computers in Biology and Medicine
  doi: 10.1016/j.compbiomed.2023.107755
