  title: "Ablation of atrial fibrillation sources identified through sequential high-density mapping:\n                    <i>in silico</i>\n                    comparison against anatomy-based approaches"
  authors: Gonçalves Marques V., Gharaviri A., Özgül O., Pezzuto S., Auricchio A., Vernooy K., Linz D., Hermans B., Bonizzi P., Zeemering S., Schotten U.
  venue: Europace
  doi: 10.1093/europace/euaf304
  citations: 0
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: 'Abstract Aims Pulmonary vein isolation (PVI) is the cornerstone of atrial fibrillation (AF) ablation, but recurrences are frequent. Ablating AF sources beyond PVI may prevent re-initiations. This proof-of-principle in silico study compares a novel source-based ablation approach to conventional strategies in preventing AF re-initiation. Methods and results We compared two conventional ablation strategies [PVI and PVI + posterior wall isolation (box ablation)] with our source-based approach. After PVI, a high-density mapping catheter was guided sequentially upstream of local repetitive conduction patterns until a source was identified. Located targets were ablated, connecting them to non-conducting boundaries. Strategies were compared based on their AF re-initiation rates after incremental pacing and ablated and electrically isolated areas. Analyses were performed in seven different scenarios with atria of different sizes, without (n = 3) and with fibrosis (n = 4), to assess different AF progression stages. Compared to no ablation, PVI reduced initiation rates in non-fibrotic atria (23 ± 8% control vs. 15 ± 0% PVI) but was less effective with fibrosis (60 ± 4% vs. 53 ± 10%). Box ablation was not superior to PVI while isolating more of the left atrium (isolated area in PVI: 31.5 ± 0.7% vs. box: 43.6 ± 0.5%). Conversely, source ablation completely prevented AF initiation in all scenarios, achieving comparable left atrial isolation with box ablation (isolated area without fibrosis: 36.3 ± 1.4%; with fibrosis: 43.2 ± 2.6%) and including right atrial lesions. Although macro-re-entrant tachycardias occurred frequently after source ablation, they were terminated with minimal lesions. Conclusion Ablating AF sources using our high-density mapping approach was more efficient in preventing AF re-initiation in silico than anatomy-based strategies.'
  summary: A proof-of-principle study found that ablating the atrial source of atrial fibrillation (AF) using a high-density mapping catheter approach reduced AF initiation rates compared to conventional PVI and box ablation strategies, especially in non-fibrotic atria. Source ablation was more effective than anatomy-based approaches in preventing AF re-initiation across different AF progression stages, including those with fibrosis.
