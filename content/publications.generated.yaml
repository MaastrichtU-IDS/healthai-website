  title: Achieving human and machine accessibility of cited data in scholarly publications
  authors: Starr J., Castro E., Crosas M., Dumontier M., Downs R. R., Duerr R., Haak L. L., Haendel M., Herman I., Hodson S., Hourclé J., Kratz J. E., Lin J., Nielsen L. H., Nurnberger A., Proell S., Rauber A., Sacchi S., Smith A., Taylor M., Clark T.
  venue: PeerJ Computer Science
