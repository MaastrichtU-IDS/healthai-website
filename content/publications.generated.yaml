  title: Influence of the Tikhonov Regularization Parameter on the Accuracy of the Inverse Problem in Electrocardiography
  authors: Wang T., Karel J., Bonizzi P., Peeters R. L. M.
  venue: Sensors
  doi: 10.3390/s23041841
  citations: 11
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: The electrocardiogram (ECG) is the standard method in clinical practice to non-invasively analyze the electrical activity of the heart, from electrodes placed on the body’s surface. The ECG can provide a cardiologist with relevant information to assess the condition of the heart and the possible presence of cardiac pathology. Nonetheless, the global view of the heart’s electrical activity given by the ECG cannot provide fully detailed and localized information about abnormal electrical propagation patterns and corresponding substrates on the surface of the heart. Electrocardiographic imaging, also known as the inverse problem in electrocardiography, tries to overcome these limitations by non-invasively reconstructing the heart surface potentials, starting from the corresponding body surface potentials, and the geometry of the torso and the heart. This problem is ill-posed, and regularization techniques are needed to achieve a stable and accurate solution. The standard approach is to use zero-order Tikhonov regularization and the L-curve approach to choose the optimal value for the regularization parameter. However, different methods have been proposed for computing the optimal value of the regularization parameter. Moreover, regardless of the estimation method used, this may still lead to over-regularization or under-regularization. In order to gain a better understanding of the effects of the choice of regularization parameter value, in this study, we first focused on the regularization parameter itself, and investigated its influence on the accuracy of the reconstruction of heart surface potentials, by assessing the reconstruction accuracy with high-precision simultaneous heart and torso recordings from four dogs. For this, we analyzed a sufficiently large range of parameter values. Secondly, we evaluated the performance of five different methods for the estimation of the regularization parameter, also in view of the results of the first analysis. Thirdly, we investigated the effect of using a fixed value of the regularization parameter across all reconstructed beats. Accuracy was measured in terms of the quality of reconstruction of the heart surface potentials and estimation of the activation and recovery times, when compared with ground truth recordings from the experimental dog data. Results show that values of the regularization parameter in the range (0.01–0.03) provide the best accuracy, and that the three best-performing estimation methods (L-Curve, Zero-Crossing, and CRESO) give values in this range. Moreover, a fixed value of the regularization parameter could achieve very similar performance to the beat-specific parameter values calculated by the different estimation methods. These findings are relevant as they suggest that regularization parameter estimation methods may provide the accurate reconstruction of heart surface potentials only for specific ranges of regularization parameter values, and that using a fixed value of the regularization parameter may represent a valid alternative, especially when computational efficiency or consistency across time is required.
  summary: This study investigated how different choices of regularization parameters affect the accuracy of reconstructing heart surface potentials from ECG data in dogs. It found that values between 0.01 and 0.03 provide the best reconstruction quality, with three methods (L-Curve, Zero-Crossing, and CRESO) yielding similar performance when using fixed parameter values across all beats. This suggests that while specific regularization parameters may be necessary for accurate reconstruction in some ranges, a fixed value can still achieve good results under certain conditions.
- year: 2023
  type: Journal
  title: Investigation of the similarities between NDVI maps from different proximal and remote sensing platforms in explaining vineyard variability
  authors: Kasimati A., Psiroukis V., Darra N., Kalogrias A., Kalivas D., Taylor J. A., Fountas S.
  venue: Precision Agriculture
  doi: 10.1007/s11119-022-09984-2
  citations: 27
  orcids:
  - 0000-0002-7620-3782
  tags: []
  abstract: Abstract Vegetation indices (VI), especially the normalised difference vegetation index (NDVI), are used to determine management units (MU) and to explain quantity and quality of vineyard production. How do NDVI maps from different sensing technologies differ in a production context? What part of the variability of yield and quality can they explain? This study compares high-resolution multispectral, multi-temporal data from CropCircle, SpectroSense + GPS, Parrot Sequoia + multispectral camera equipped UAV, and Sentinel-2 imagery over two seasons (2019 and 2020). The objective was to assess whether the date of data collection (phenological growth stage) influences the correlations between NDVI and crop production. The comparison of vineyard NDVI data from proximal and remote sensing in both a statistical and a productive context showed strong similarities between NDVI values from similar sensors (0.69 &lt; r &lt; 0.96), but divergences between proximal and airborne/spaceborne observations. Exploratory correlation analysis between NDVI layers and grape yield and total soluble solids data (TSS) showed high correlations (maximum |r|= 0.91 and |r|= 0.74, respectively), with correlations increasing as the season progressed. No relationship with must titratable acidity or pH was found. Finally, proximal sensors explained better the variability in yield and quality for grapes in the early and late growth stages. The UAV's MUs described the yield of both years better than the other sensors. In 2019, the PCA-based MUs explained the TSS variability better than the UAV-related zones. Due to their coarse spatial resolution, the satellite data proved inconsistent in explaining the variability.
  summary: This study compared NDVI maps from various sensing technologies over two seasons and found that proximal sensors (CropCircle, SpectroSense + GPS) showed strong similarities with airborne/spaceborne observations (r > 0.69), while remote sensing methods had divergent results. Proximal sensors explained better the variability in yield and quality for grapes in early and late growth stages, whereas UAVs' MUs described yield better in 2019.
- year: 2023
  type: Journal
  title: 'PSnpBind-ML: predicting the effect of binding site mutations on protein-ligand binding affinity'
  authors: Ammar A., Cavill R., Evelo C., Willighagen E.
  venue: Journal of Cheminformatics
  doi: 10.1186/s13321-023-00701-3
  citations: 19
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Abstract Protein mutations, especially those which occur in the binding site, play an important role in inter-individual drug response and may alter binding affinity and thus impact the drug’s efficacy and side effects. Unfortunately, large-scale experimental screening of ligand-binding against protein variants is still time-consuming and expensive. Alternatively, in silico approaches can play a role in guiding those experiments. Methods ranging from computationally cheaper machine learning (ML) to the more expensive molecular dynamics have been applied to accurately predict the mutation effects. However, these effects have been mostly studied on limited and small datasets, while ideally a large dataset of binding affinity changes due to binding site mutations is needed. In this work, we used the PSnpBind database with six hundred thousand docking experiments to train a machine learning model predicting protein-ligand binding affinity for both wild-type proteins and their variants with a single-point mutation in the binding site. A numerical representation of the protein, binding site, mutation, and ligand information was encoded using 256 features, half of them were manually selected based on domain knowledge. A machine learning approach composed of two regression models is proposed, the first predicting wild-type protein-ligand binding affinity while the second predicting the mutated protein-ligand binding affinity. The best performing models reported an RMSE value within 0.5 $$-$$ - 0.6 kcal/mol -1 on an independent test set with an R 2 value of 0.87 $$-$$ - 0.90. We report an improvement in the prediction performance compared to several reported models developed for protein-ligand binding affinity prediction. The obtained models can be used as a complementary method in early-stage drug discovery. They can be applied to rapidly obtain a better overview of the ligand binding affinity changes across protein variants carried by people in the population and narrow down the search space where more time-demanding methods can be used to identify potential leads that achieve a better affinity for all protein variants.
  summary: Researchers trained a machine learning model using 600,000 docking experiments from the PSnpBind database to predict changes in protein-ligand binding affinity due to mutations in the binding site. The model was accurate and could be used as an early-stage drug discovery tool by providing a better overview of ligand binding affinity across protein variants, potentially narrowing down time-consuming methods for identifying leads with improved binding affinity for all protein variants.
- year: 2023
  type: Journal
  title: Retrieving Relevant EU Drone Legislation with Citation Analysis
  authors: Dijck G. v., On A., Snel J., Nanda R.
  venue: Drones
  doi: 10.3390/drones7080490
  citations: 3
  orcids:
  - 0000-0001-7124-4799
  tags: []
  abstract: Can the retrieval of relevant unmanned aircraft systems (UAS) legislation be automated? In this article, references from and to EU legislation are used to create an overview that is subsequently compared to legislation considered relevant by subject-matter experts. The overlap between the results of the citation analysis and the expert overview is promising. Additionally, an approach was proposed and tested where, first, a relatively large number of laws were identified and, second, the laws that were considered relevant were selected. The findings reveal that this approach was successful at retrieving the majority of relevant laws. The results are relevant to researchers, policymakers, practitioners, and laypeople searching for relevant EU legislation on UAS.
  summary: This study analyzed how to automate the retrieval of relevant unmanned aircraft systems (UAS) legislation by comparing citation analysis results with expert opinions. It proposed an approach that first identified a large number of laws and then selected those deemed relevant, achieving high success in retrieving most relevant laws. This method is valuable for researchers, policymakers, practitioners, and general users seeking EU UAS legislation.
- year: 2023
