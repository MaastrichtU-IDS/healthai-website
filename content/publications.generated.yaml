  title: Extended Modelling of Molecular Calcium Signalling in Platelets by Combined Recurrent Neural Network and Partial Least Squares Analyses
  authors: Tantiwong C., Cheung H. Y. F., Dunster J. L., Gibbins J. M., Heemskerk J. W. M., Cavill R.
  venue: International Journal of Molecular Sciences
  doi: 10.3390/ijms26146820
  citations: 0
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Platelets play critical roles in haemostasis and thrombosis. The platelet activation process is driven by agonist-induced rises in cytosolic [Ca2+]i, where the patterns of Ca2+ responses are still incompletely understood. In this study, we developed a number of techniques to model the [Ca2+]i curves of platelets from a single blood donor. Fura-2-loaded platelets were quasi-simultaneously stimulated with various agonists, i.e., thrombin, collagen, or CRP, in the presence or absence of extracellular Ca2+ entry, secondary mediator effects, or Ca2+ reuptake into intracellular stores. To understand the calibrated time curves of [Ca2+]i rises, we developed two non-linear models, a multilayer perceptron (MLP) network and an autoregressive network with exogenous inputs (NARX). The trained networks accurately predicted the [Ca2+]i curves for combinations of agonists and inhibitors, with the NARX model achieving an R2 of 0.64 for the trend prediction of unforeseen data. In addition, we used the same dataset for the construction of a partial least square (PLS) linear regression model, which estimated the explained variance of each input. The NARX model demonstrated that good fits could be obtained for the nanomolar [Ca2+]i curves modelled, whereas the PLS model gave useful interpretable information on the importance of each variable. These modelling results can be used for the development of novel platelet [Ca2+]i-inhibiting drugs, such as the drug 2-aminomethyl diphenylborinate, blocking Ca2+ entry in platelets, or for the evaluation of general platelet signalling defects in patients with a bleeding disorder.
  summary: Researchers developed models to predict calcium ion concentration rises (Ca2+) in platelets using agonists and inhibitors, achieving high accuracy with nonlinear models that can simulate unforeseen data and provide interpretable information from linear regression models. This could lead to the development of drugs targeting Ca2+ entry or help diagnose bleeding disorders by evaluating platelet signaling defects.
