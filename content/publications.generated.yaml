  abstract: 'Objective Repetitive atrial activation patterns (RAAPs) during complex atrial tachycardia could be associated with localized mechanisms that can be targeted. Clinically available electroanatomical mapping systems are limited by either the spatial coverage or electrode density of the mapping catheters, preventing the adequate visualization of transiently occurring RAAPs. This work proposes a technique to overcome this shortcoming by stitching spatially overlapping conduction patterns together to a larger image- called a composite map. Methods Simulated stable mechanisms and meandering reentries are sequentially mapped (4 × 4 grid, 3 mm spacing) and then reconstructed back to the original sizes with the proposed recurrence plot-based algorithm. Results The reconstruction of single linear waves presents minimal errors (local activation time (LAT) difference: 3.2 [1.6-4.9] ms, conduction direction difference: 5.2 [2.3-8.0] degrees). Errors significantly increase (p Conclusion Our findings underline the feasibility of generating composite maps by stitching spatially overlapping recordings. Significance Composite maps can be instrumental in personalized ablation strategies.'
  summary: This research proposes a technique to stitch together spatially overlapping conduction patterns using a recurrence plot-based algorithm, allowing visualization of repetitive atrial activation patterns (RAAPs) that are otherwise difficult to capture with current electroanatomical mapping systems due to limited coverage or density. The method reconstructs single linear waves with minimal errors and significantly higher error rates when combined, suggesting the potential for generating composite maps that could guide personalized ablation strategies in treating complex atrial tachycardia.
