  title: A Multiagent System for Dynamic Data Aggregation in Medical Research
  authors: Dubovitskaya A., Urovi V., Barba I., Aberer K., Schumacher M. I.
  venue: BioMed Research International
  doi: 10.1155/2016/9027457
