  doi: 10.3233/faia200856
  citations: 1
  orcids:
  - 0000-0001-7124-4799
  tags: []
  abstract: This paper presents a multilingual legal information retrieval system for mapping recitals to articles in European Union (EU) directives and normative provisions in national legislation. Such a system could be useful for purposive interpretation of norms. A previous work on mapping recitals and normative provisions was limited to EU legislation in English and only one lexical text similarity technique. In this paper, we develop state-of-the-art text similarity models to investigate the interplay between directive recitals, directive (sub-)articles and provisions of national implementing measures (NIMs) on a multilingual corpus (from Ireland, Italy and Luxembourg). Our results indicate that directive recitals do not have a direct influence on NIM provisions, but they sometimes contain additional information that is not present in the transposed directive sub-article, and can therefore facilitate purposive interpretation.
  summary: This paper presents a new multilingual legal information retrieval system for mapping EU directives and national legislation to articles, which could help with interpreting legal norms more accurately across different languages and jurisdictions. The study uses state-of-the-art text similarity models on a multilingual corpus of Irish, Italian, and Luxembourgish texts to better understand how directive recitals relate to NIMs, finding that they can provide additional information not present in the transposed directives, aiding interpretation.
- year: 2020
  type: Journal
  title: Ontology-based Access Control for FAIR Data
  authors: Brewster C., Nouwt B., Raaijmakers S., Verhoosel J.
  venue: Data Intelligence
  doi: 10.1162/dint_a_00029
  citations: 29
  orcids:
  - 0000-0001-6594-9178
  tags: []
  abstract: This paper focuses on fine-grained, secure access to FAIR data, for which we propose ontology-based data access policies. These policies take into account both the FAIR aspects of the data relevant to access (such as provenance and licence), expressed as metadata, and additional metadata describing users. With this tripartite approach (data, associated metadata expressing FAIR information, and additional metadata about users), secure and controlled access to object data can be obtained. This yields a security dimension to the “A” (accessible) in FAIR, which is clearly needed in domains like security and intelligence. These domains need data to be shared under tight controls, with widely varying individual access rights. In this paper, we propose an approach called Ontology-Based Access Control (OBAC), which utilizes concepts and relations from a data set's domain ontology. We argue that ontology-based access policies contribute to data reusability and can be reconciled with privacy-aware data access policies. We illustrate our OBAC approach through a proof-of-concept and propose that OBAC to be adopted as a best practice for access management of FAIR data.
  summary: This paper proposes an ontology-based data access policy system called Ontology-Based Access Control (OBAC) to ensure secure, controlled access to FAIR data while considering both the metadata expressing FAIR aspects and additional user metadata. This approach enhances reusability and compatibility with privacy-aware policies, making it crucial for domains requiring tight controls on shared data like security and intelligence.
