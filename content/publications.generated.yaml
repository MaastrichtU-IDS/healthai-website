  title: Evaluation of research in biomedical ontologies
  authors: Hoehndorf R., Dumontier M., Gkoutos G. V.
  venue: Briefings in Bioinformatics
  doi: 10.1093/bib/bbs053
  citations: 55
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Ontologies are now pervasive in biomedicine, where they serve as a means to standardize terminology, to enable access to domain knowledge, to verify data consistency and to facilitate integrative analyses over heterogeneous biomedical data. For this purpose, research on biomedical ontologies applies theories and methods from diverse disciplines such as information management, knowledge representation, cognitive science, linguistics and philosophy. Depending on the desired applications in which ontologies are being applied, the evaluation of research in biomedical ontologies must follow different strategies. Here, we provide a classification of research problems in which ontologies are being applied, focusing on the use of ontologies in basic and translational research, and we demonstrate how research results in biomedical ontologies can be evaluated. The evaluation strategies depend on the desired application and measure the success of using an ontology for a particular biomedical problem. For many applications, the success can be quantified, thereby facilitating the objective evaluation and comparison of research in biomedical ontology. The objective, quantifiable comparison of research results based on scientific applications opens up the possibility for systematically improving the utility of ontologies in biomedical research.
  summary: This paper classifies research problems involving biomedical ontologies into basic and translational areas, demonstrating how to evaluate research outcomes using these classifications. It proposes evaluation strategies that can be applied depending on the desired application, allowing for objective comparison and improvement of ontology utility in biomedical research.
- year: 2012
  type: Journal
  title: Identifying aberrant pathways through integrated analysis of knowledge in pharmacogenomics
  authors: Hoehndorf R., Dumontier M., Gkoutos G. V.
  venue: Bioinformatics
  doi: 10.1093/bioinformatics/bts350
  citations: 36
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Abstract Motivation: Many complex diseases are the result of abnormal pathway functions instead of single abnormalities. Disease diagnosis and intervention strategies must target these pathways while minimizing the interference with normal physiological processes. Large-scale identification of disease pathways and chemicals that may be used to perturb them requires the integration of information about drugs, genes, diseases and pathways. This information is currently distributed over several pharmacogenomics databases. An integrated analysis of the information in these databases can reveal disease pathways and facilitate novel biomedical analyses. Results: We demonstrate how to integrate pharmacogenomics databases through integration of the biomedical ontologies that are used as meta-data in these databases. The additional background knowledge in these ontologies can then be used to enable novel analyses. We identify disease pathways using a novel multi-ontology enrichment analysis over the Human Disease Ontology, and we identify significant associations between chemicals and pathways using an enrichment analysis over a chemical ontology. The drug–pathway and disease–pathway associations are a valuable resource for research in disease and drug mechanisms and can be used to improve computational drug repurposing. Availability: http://pharmgkb-owl.googlecode.com Contact: rh497@cam.ac.uk'
  summary: Researchers integrated pharmacogenomics databases using biomedical ontologies, enabling novel analyses of disease pathways and chemical associations, providing a valuable resource for research in disease mechanisms and improving computational drug repurposing.
