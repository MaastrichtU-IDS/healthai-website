  tags: []
  abstract: Abstract ECG-based representation of atrial fibrillation (AF) progression is currently limited. We propose a novel framework for a more sensitive noninvasive characterization of the AF substrate during persistent AF. An atrial activity (AA) recurrence signal is computed from body surface potential map (BSPM) recordings, and a set of characteristic indices is derived from it which captures the short- and long-term recurrent behaviour in the AA patterns. A novel measure of short- and long-term spatial variability of AA propagation is introduced, to provide an interpretation of the above indices, and to test the hypothesis that the variability in the oscillatory content of AA is due mainly to a spatially uncoordinated propagation of the AF waveforms. A simple model of atrial signal dynamics is proposed to confirm this hypothesis, and to investigate a possible influence of the AF substrate on the short-term recurrent behaviour of AA propagation. Results confirm the hypothesis, with the model also revealing the above influence. Once the characteristic indices are normalized to remove this influence, they show to be significantly associated with AF recurrence 4 to 6 weeks after electrical cardioversion. Therefore, the proposed framework improves noninvasive AF substrate characterization in patients with a very similar substrate.
  summary: A novel method was developed using atrial activity signals from body surface potential maps to characterize and predict the progression of atrial fibrillation (AF). The study found that this approach is more sensitive than existing methods, particularly for detecting changes in the AF substrate during persistent AF. The results suggest that this technique could provide a noninvasive way to identify patients with similar AF substrates who are at high risk of recurrence after electrical cardioversion.
- year: 2020
  type: Journal
  title: A Novel Tool for the Identification and Characterization of Repetitive Patterns in High-Density Contact Mapping of Atrial Fibrillation
  authors: Zeemering S., van Hunnik A., van Rosmalen F., Bonizzi P., Scaf B., Delhaas T., Verheule S., Schotten U.
  venue: Frontiers in Physiology
  doi: 10.3389/fphys.2020.570118
  citations: 15
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: 'Introduction Electrical contact mapping provides a detailed view of conduction patterns in the atria during atrial fibrillation (AF). Identification of repetitive wave front propagation mechanisms potentially initiating or sustaining AF might provide more insights into temporal and spatial distribution of candidate AF mechanism and identify targets for catheter ablation. We developed a novel tool based on recurrence plots to automatically identify and characterize repetitive conduction patterns in high-density contact mapping of AF. Materials and methods Recurrence plots were constructed by first transforming atrial electrograms recorded by a multi-electrode array to activation-phase signals and then quantifying the degree of similarity between snapshots of the activation-phase in the electrode array. An AF cycle length dependent distance threshold was applied to discriminate between repetitive and non-repetitive snapshots. Intervals containing repetitive conduction patterns were detected in a recurrence plot as regions with a high recurrence rate. Intervals that contained similar repetitive patterns were then grouped into clusters. To demonstrate the ability to detect and quantify the incidence, duration and size of repetitive patterns, the tool was applied to left and right atrial recordings in a goat model of different duration of persistent AF [3 weeks AF (3 wkAF, n = 8) and 22 weeks AF (22 wkAF, n = 8)], using a 249-electrode mapping array (2.4 mm inter-electrode distance). Results Recurrence plots identified frequent recurrences of activation patterns in all recordings and indicated a strong correlation between recurrence plot threshold and AF cycle length. Prolonged AF duration was associated with shorter repetitive pattern duration [mean maximum duration 3 wkAF: 74 cycles, 95% confidence interval (54-94) vs. 22 wkAF: 41 cycles (21-62), p = 0.03], and smaller recurrent regions within repetitive patterns [3 wkAF 1.7 cm 2 (1.0-2.3) vs. 22 wkAF 0.5 cm 2 (0.0-1.2), p = 0.02]. Both breakthrough patterns and re-entry were identified as repetitive conduction patterns. Conclusion Recurrence plots provide a novel way to delineate high-density contact mapping of AF. Dominant repetitive conduction patterns were identified in a goat model of sustained AF. Application of the developed methodology using the new generation of multi-electrode catheters could identify additional targets for catheter ablation of AF.'
  summary: Researchers developed a tool called recurrence plots to automatically detect and characterize repetitive wave front propagation mechanisms during atrial fibrillation (AF) in high-density contact mapping data from an electrocardiogram array. This method, applied to recordings from goats with different durations of persistent AF, identified patterns that were associated with longer cycle lengths and smaller recurrent regions compared to non-repetitive patterns, suggesting these repetitive patterns could be targets for catheter ablation therapy.
