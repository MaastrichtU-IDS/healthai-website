  title: Formalizing drug indications on the road to therapeutic intent
  authors: Nelson S. J., Oprea T. I., Ursu O., Bologa C. G., Zaveri A., Holmes J., Yang J. J., Mathias S. L., Mani S., Tuttle M. S., Dumontier M.
  venue: Journal of the American Medical Informatics Association
  doi: 10.1093/jamia/ocx064
  citations: 9
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Abstract Therapeutic intent, the reason behind the choice of a therapy and the context in which a given approach should be used, is an important aspect of medical practice. There are unmet needs with respect to current electronic mapping of drug indications. For example, the active ingredient sildenafil has 2 distinct indications, which differ solely on dosage strength. In progressing toward a practice of precision medicine, there is a need to capture and structure therapeutic intent for computational reuse, thus enabling more sophisticated decision-support tools and a possible mechanism for computer-aided drug repurposing. The indications for drugs, such as those expressed in the Structured Product Labels approved by the US Food and Drug Administration, appears to be a tractable area for developing an application ontology of therapeutic intent.
  summary: Researchers developed an ontology of therapeutic intent based on structured product labels from the FDA, aiming to improve precision medicine through computational reuse and computer-aided drug repurposing. This could lead to more sophisticated decision-support tools and potentially new mechanisms for repurposing drugs.
