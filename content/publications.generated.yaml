  title: Recurrence quantification analysis applied to spatiotemporal pattern analysis in high-density mapping of human atrial fibrillation
  authors: Zeemering S., Bonizzi P., Maesen B., Peeters R., Schotten U.
  venue: 2015 37th Annual International Conference of the IEEE Engineering in Medicine and Biology Society (EMBC)
  doi: 10.1109/embc.2015.7320177
  citations: 6
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: Spatiotemporal complexity of atrial fibrillation (AF) patterns is often quantified by annotated intracardiac contact mapping. We introduce a new approach that applies recurrence plot (RP) construction followed by recurrence quantification analysis (RQA) to epicardial atrial electrograms, recorded with a high-density grid of electrodes. In 32 patients with no history of AF (aAF, n=11), paroxysmal AF (PAF, n=12) and persistent AF (persAF, n=9), RPs were constructed using a phase space electrogram embedding dimension equal to the estimated AF cycle length. Spatial information was incorporated by 1) averaging the recurrence over all electrodes, and 2) by applying principal component analysis (PCA) to the matrix of embedded electrograms and selecting the first principal component as a representation of spatial diversity. Standard RQA parameters were computed on the constructed RPs and correlated to the number of fibrillation waves per AF cycle (NW). Averaged RP RQA parameters showed no correlation with NW. Correlations improved when applying PCA, with maximum correlation achieved between RP threshold and NW (RR1%, r=0.68, p <; 0.001) and RP determinism (DET, r=-0.64, p <; 0.001). All studied RQA parameters based on the PCA RP were able to discriminate between persAF and aAF/PAF (DET persAF 0.40 ± 0.11 vs. 0.59 ± 0.14/0.62 ± 0.16, p <; 0.01). RP construction and RQA combined with PCA provide a quick and reliable tool to visualize dynamical behaviour and to assess the complexity of contact mapping patterns in AF.
  summary: Researchers developed a new method using recurrence plots (RP) and principal component analysis (PCA) to analyze atrial fibrillation patterns captured by high-density electrograms. This approach improved upon traditional methods by incorporating spatial information through averaging across electrodes and selecting the first principal component as a representation of spatial diversity. The study found that PCA-RQA parameters could effectively distinguish between persistent AF, paroxysmal AF, and normal sinus rhythm (aAF/PAF), providing a quick and reliable tool for visualizing atrial fibrillation patterns.
