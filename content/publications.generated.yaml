  abstract: iCampus is a prototype multi-agent system whose goal is to provide the ambient intelligence required to connect people in a university campus and make that campus inclusive and accessible. Software agents called guides run on mobile phones to help students with information about people, places, and events, thus providing people real-time, location-based advice that makes them more aware of what is going on in the campus. The work outlines how to specify iCampus in the Ambient Event Calculus and implement it using the agent environment GOLEM to deploy guide agents over a campus network. The work is illustrated by showing how iCampus improves the mobility of blind or partially sighted students within a campus, which has been the main motivation behind the work.
  summary: iCampus is a prototype system that uses mobile phone software agents called guides to provide real-time location-based advice on people, places, and events in a university campus, making it more inclusive and accessible for all students, including those with disabilities. This research outlines how iCampus can be specified using the Ambient Event Calculus and implemented using GOLEM to deploy guide agents over a campus network. The main motivation behind this work is improving the mobility of blind or partially sighted students within the campus environment.
