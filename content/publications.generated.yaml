  - 0000-0001-7769-4272
  tags: []
  abstract: It is essential for the advancement of science that researchers share, reuse and reproduce each other’s workflows and protocols. The FAIR principles are a set of guidelines that aim to maximize the value and usefulness of research data, and emphasize the importance of making digital objects findable and reusable by others. The question of how to apply these principles not just to data but also to the workflows and protocols that consume and produce them is still under debate and poses a number of challenges. In this paper we describe a two-fold approach of simultaneously applying the FAIR principles to scientific workflows as well as the involved data. We apply and evaluate our approach on the case of the PREDICT workflow, a highly cited drug repurposing workflow. This includes FAIRification of the involved datasets, as well as applying semantic technologies to represent and store data about the detailed versions of the general protocol, of the concrete workflow instructions, and of their execution traces. We propose a semantic model to address these specific requirements and was evaluated by answering competency questions. This semantic model consists of classes and relations from a number of existing ontologies, including Workflow4ever, PROV, EDAM, and BPMN. This allowed us then to formulate and answer new kinds of competency questions. Our evaluation shows the high degree to which our FAIRified OpenPREDICT workflow now adheres to the FAIR principles and the practicality and usefulness of being able to answer our new competency questions.
  summary: Researchers are encouraged to share, reuse, and reproduce each other's workflows and protocols for advancing science. This paper describes a two-fold approach that applies FAIR principles to both data and workflows, specifically focusing on the PREDICT drug repurposing workflow. By FAIRifying datasets, representing protocol details with semantic technologies, and storing execution traces, researchers can make their workflows more findable and reusable. The resulting semantic model allows for answering new types of competency questions effectively, demonstrating that applying FAIR principles to workflows significantly improves adherence to the guidelines and practicality in addressing specific research needs.
- year: 2020
  type: Journal
  title: Use of deep learning methods to translate drug-induced gene expression changes from rat to human primary hepatocytes
  authors: O’Donovan S. D., Driessens K., Lopatta D., Wimmenauer F., Lukas A., Neeven J., Stumm T., Smirnov E., Lenz M., Ertaylan G., Jennen D. G. J., van Riel N. A. W., Cavill R., Peeters R. L. M., de Kok T. M. C. M.
  venue: PLOS ONE
  doi: 10.1371/journal.pone.0236392
  citations: 5
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: In clinical trials, animal and cell line models are often used to evaluate the potential toxic effects of a novel compound or candidate drug before progressing to human trials. However, relating the results of animal and in vitro model exposures to relevant clinical outcomes in the human in vivo system still proves challenging, relying on often putative orthologs. In recent years, multiple studies have demonstrated that the repeated dose rodent bioassay, the current gold standard in the field, lacks sufficient sensitivity and specificity in predicting toxic effects of pharmaceuticals in humans. In this study, we evaluate the potential of deep learning techniques to translate the pattern of gene expression measured following an exposure in rodents to humans, circumventing the current reliance on orthologs, and also from in vitro to in vivo experimental designs. Of the applied deep learning architectures applied in this study the convolutional neural network (CNN) and a deep artificial neural network with bottleneck architecture significantly outperform classical machine learning techniques in predicting the time series of gene expression in primary human hepatocytes given a measured time series of gene expression from primary rat hepatocytes following exposure in vitro to a previously unseen compound across multiple toxicologically relevant gene sets. With a reduction in average mean absolute error across 76 genes that have been shown to be predictive for identifying carcinogenicity from 0.0172 for a random regression forest to 0.0166 for the CNN model (p < 0.05). These deep learning architecture also perform well when applied to predict time series of in vivo gene expression given measured time series of in vitro gene expression for rats.
  summary: This study evaluates the potential of deep learning techniques, specifically convolutional neural networks and a bottleneck-based artificial neural network, to translate gene expression patterns from rodents to humans, improving prediction accuracy for toxic effects assessment compared to traditional methods like random regression forests. The CNN model showed significant improvement in predicting carcinogenicity from 0.0172 to 0.0166 (p < 0.05), indicating enhanced predictive power for human exposure scenarios.
