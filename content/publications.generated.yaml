  tags: []
  abstract: 'Abstract Job seekers find themselves increasingly duped and misled by fraudulent job advertisements, posing a threat to their privacy, security and well-being. There is a clear need for solutions that can protect innocent job seekers. Existing approaches to detecting fraudulent jobs do not scale well, function like a black-box, and lack interpretability, which is essential to guide applicants’ decision-making. Moreover, commonly used lexical features may be insufficient as the representation does not capture contextual semantics of the underlying document. Hence, this paper explores to what extent different categorizations of fraudulent jobs can be classified. In addition, this paper seeks to find what type of features are most relevant in classifying the type of fraudulent job. In this paper, we develop and validate a machine learning system for identifying identity theft, corporate identity theft and multi-level marketing amongst fraudulent job advertisements. We utilized four classes of features: empirical rule set-based features, bag-of-word models, most recent state-of-the-art word embeddings and transformer models for various machine learning classifiers. The machine learning models were validated by evaluating them on a publicly available job description dataset. Our results indicate that the word embeddings and transformer-based features consistently outperformed the handcrafted rule-set based features class. Ultimately, a Gradient Boosting classifier with a combination of empirical rule-set based features, parts-of-speech tags and bag-of-words vectors achieved the best performance with an F1-score of 0.88.'
  summary: 'Researchers developed a machine learning system to identify fraudulent job advertisements by analyzing four types of features: empirical rule set-based features, bag-of-word models, most recent word embeddings, and transformer models. The system was validated using a publicly available dataset and achieved an F1-score of 0.88 with the combination of these features.'
- year: 2022
  type: Journal
  title: A machine learning approach to recognize bias and discrimination in job advertisements
  authors: Frissen R., Adebayo K. J., Nanda R.
  venue: AI &amp; SOCIETY
