  tags: []
  abstract: ABSTRACT In this research, we present an alternative methodology to search for ring-like structures in the sky with unusually large temperature gradients, namely, Hawking points (HPs), in the Cosmic Microwave Background (CMB), which are possible observational effects associated with Conformal Cyclic Cosmology (CCC). To assess the performance of our method, we constructed an artificial data set of HP, according to CCC, and we were able to retrieve $95 {{\ \rm per\ cent}}$ of ring-like anomalies from it. Furthermore, we scanned the Planck CMB sky map and compared it to simulations according to ΛCDM, where we applied robust statistical tests to assess the existence of HP. Even though no significant ring-like structures were observed, we report the largest excess of HP candidates found at α =1 per cent significance level for the analysed sky maps (CMB at 70GHz, SEVEM, SMICA, and Commander-Ruler), and we stress the need to continue the theoretical and experimental research in this direction.
  summary: Researchers developed a new method using Conformal Cyclic Cosmology to search for Hawking points in the Cosmic Microwave Background (CMB). They created an artificial data set of these points and successfully identified 95% of them from it. By scanning real Planck CMB sky maps, they found no significant ring-like structures but reported a large excess of HP candidates at α =1 per cent significance level for specific maps. This study highlights the importance of further theoretical and experimental research in this area.
