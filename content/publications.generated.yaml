  title: State Space Embedding of Atrial Electrograms to Detect Repetitive Conduction Patterns During Atrial Fibrillation
  authors: Ozgul O., Maesen B., Schotten U., Bonizzi P., Zeemering S.
  venue: 2021 43rd Annual International Conference of the IEEE Engineering in Medicine &amp; Biology Society (EMBC)
