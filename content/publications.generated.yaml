  title: Interoperability and FAIRness through a novel combination of Web technologies
  authors: Wilkinson M. D., Verborgh R., Bonino da Silva Santos L. O., Clark T., Swertz M. A., Kelpin F. D., Gray A. J., Schultes E. A., van Mulligen E. M., Ciccarese P., Kuzniar A., Gavai A., Thompson M., Kaliyaperumal R., Bolleman J. T., Dumontier M.
  venue: PeerJ Computer Science
