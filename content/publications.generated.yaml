  title: '3D topography of noncompact zone Golgi tubules in rat spermatids: A computer-assisted serial section reconstruction study'
  authors: Thorne-Tjomsland G., Dumontier M., Jamieson J. C.
  venue: The Anatomical Record
  doi: 10.1002/(sici)1097-0185(199804)250:4<381::aid-ar1>3.0.co;2-0
  citations: 11
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background In the Golgi apparatus, the 3D topography of saccules in the compact zones (CZs) is better understood than that of tubules in the noncompact zones (NCZs). The positioning of NCZ tubules relative to each other and to CZ saccules was studied in rat spermatids by computer-assisted serial section microscopy. Methods Twenty-four (semi) serials (3-6 consecutive sections each) in total were collected from untreated tissues and from tissues treated for glucose-6-phosphatase (G6P) cytochemistry as an alignment tool. The serials proceeded along either the cis-trans or the medial-lateral axes of the Golgi and collectively sampled all portions of this organelle. Selected serials were computer reconstructed and the final models displayed in red-green/red-blue stereo. Results In single thin sections, NCZ tubules typically appeared randomly oriented; however, in serial sections a high degree of organization was evident. Most tubules were traceable to the type of tubular networks (TNs) that interconnect equivalent CZ saccules (see review Rambourg and Clermont, 1990) Such TNs were present at consecutive saccular levels through each NCZ, were stacked like the saccules from which they originate, and in many regions were aligned from cis-trans. The cis-most of the TNs projected above the cis-pole of the stacked saccules and were penetrated by coated and uncoated ER buds. Conclusions The function of the extensive NCZ tubular domain, consisting of the stacked and aligned TNs, will have to be addressed in future studies. However, the specific topography of the cis-most TNs make them candidates to serve as acceptor membranes in ER-Golgi transport.
  summary: Researchers used computer-assisted serial section microscopy to study the organization of tubules in non-compact zones (NCZs) of rat spermatids. They found that NCZ tubules were highly organized and aligned with each other and with saccules, suggesting a specific function for these structures in ER-Golgi transport.
