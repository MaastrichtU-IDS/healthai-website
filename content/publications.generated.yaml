  tags: []
  abstract: Abstract Blockchain technology promises enhanced data ownership, control, and interoperability in healthcare, yet security and privacy concerns continue to hinder its adoption. Existing surveys examine blockchain-based privacy challenges, but they lack a systematic analysis and maturity evaluation of privacy-preserving techniques tailored to healthcare data sharing. This paper presents a systematic review of blockchain-based privacy-preserving solutions, analyzing blockchain details, applied privacy methods, regulatory compliance, and maturity levels using Technology Readiness Levels (TRLs). Our findings reveal that authentication and authorization is the most explored stage, dominated by smart contracts and ciphertext-policy attribute-based encryption. Proxy re-encryption is frequently used for data transfer, while privacy-preserving search and verification remain underexplored. On/off-chain mechanisms are commonly applied to balance privacy and storage efficiency. TRL assessment shows that most solutions remain at the proof-of-concept stage (TRL3), with only limited progress to prototype validation (TRL4–TRL5), highlighting the gap between experimental designs and real-world deployment. To guide developers and researchers, we identify two primary patterns of blockchain integration and propose a framework for system design. We also compare methods across data-sharing stages, outlining their strengths and limitations to support informed selection. In conclusion, while research interest is growing, the field remains at an early stage of maturity. Addressing this gap requires stronger implementation capacity, access to clinical data, and robust regulatory alignment. We emphasize the importance of clinical validation and real-world testing to advance privacy-preserving blockchain solutions toward practical adoption in healthcare.
  summary: This paper presents a systematic review of blockchain-based privacy-preserving solutions tailored for healthcare data sharing, focusing on authentication, authorization, proxy re-encryption, privacy-preserving search/verification, and TRL assessment. The findings highlight the most explored stages (authentication/authorization, smart contracts/ciphertext-policy attribute-based encryption) with frequent use of proxy re-encryption and underexplored methods like privacy-preserving search/verification. Most solutions are at proof-of-concept stage (TRL3), highlighting a gap between experimental designs and real-world deployment. The paper identifies two primary patterns for blockchain integration and proposes a framework to guide system design, while emphasizing the importance of clinical validation and real-world testing for practical adoption in healthcare.
