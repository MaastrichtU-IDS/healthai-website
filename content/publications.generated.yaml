  title: Global investigation of protein–protein interactions in yeast Saccharomyces cerevisiae using re-occurring short polypeptide sequences
  authors: Pitre S., North C., Alamgir M., Jessulat M., Chan A., Luo X., Green J. R., Dumontier M., Dehne F., Golshani A.
  venue: Nucleic Acids Research
  doi: 10.1093/nar/gkn390
  citations: 51
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Protein-protein interaction (PPI) maps provide insight into cellular biology and have received considerable attention in the post-genomic era. While large-scale experimental approaches have generated large collections of experimentally determined PPIs, technical limitations preclude certain PPIs from detection. Recently, we demonstrated that yeast PPIs can be computationally predicted using re-occurring short polypeptide sequences between known interacting protein pairs. However, the computational requirements and low specificity made this method unsuitable for large-scale investigations. Here, we report an improved approach, which exhibits a specificity of approximately 99.95% and executes 16,000 times faster. Importantly, we report the first all-to-all sequence-based computational screen of PPIs in yeast, Saccharomyces cerevisiae in which we identify 29,589 high confidence interactions of approximately 2 x 10(7) possible pairs. Of these, 14,438 PPIs have not been previously reported and may represent novel interactions. In particular, these results reveal a richer set of membrane protein interactions, not readily amenable to experimental investigations. From the novel PPIs, a novel putative protein complex comprised largely of membrane proteins was revealed. In addition, two novel gene functions were predicted and experimentally confirmed to affect the efficiency of non-homologous end-joining, providing further support for the usefulness of the identified PPIs in biological investigations.
  summary: Researchers have developed a new computational method that identifies all-to-all protein-protein interactions (PPIs) in yeast cells at high specificity and speed, significantly improving upon previous methods. This approach has discovered 29,589 novel interactions with approximately 2 x 10(7) possible pairs, including membrane protein interactions not previously observed experimentally.
- year: 2008
