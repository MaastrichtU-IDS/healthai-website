  authors: Anastasiou E., Kasimati A., Papadopoulos G., Vatsanidou A., Gemtou M., Kantelhardt J., Gabriel A., Schwierz F., Matavel C. E., Meyer-Aurich A., Maritan E., Behrendt K., Moroder A., Bellingrath-Kimura S. D., Pedersen S. M., Landi A., Pesonen L., Rojic J., Kim M., Denzer H., Fountas S.
