  title: 'Body Surface Mapping of Ventricular Repolarization Heterogeneity: An Ex-vivo Multiparameter Study'
  authors: Meo M., Bonizzi P., Bear L. R., Cluitmans M., Abell E., Haïssaguerre M., Bernus O., Dubois R.
  venue: Frontiers in Physiology
  doi: 10.3389/fphys.2020.00933
  citations: 8
