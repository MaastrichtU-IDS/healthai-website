  title: 'Artificial intelligence based data curation: enabling a patient-centric European health data space'
  authors: de Zegher I., Norak K., Steiger D., Müller H., Kalra D., Scheenstra B., Cina I., Schulz S., Uma K., Kalendralis P., Lotman E., Benedikt M., Dumontier M., Celebi R.
  venue: Frontiers in Medicine
