  abstract: Abstract INTRODUCTION The established link between DNA methylation and pathophysiology of dementia, along with its potential role as a molecular mediator of lifestyle and environmental influences, positions blood‐derived DNA methylation as a promising tool for early dementia risk detection. METHODS In conjunction with an extensive array of machine learning techniques, we employed whole blood genome‐wide DNA methylation data as a surrogate for 14 modifiable and non‐modifiable factors in the assessment of dementia risk in independent dementia cohorts. RESULTS We established a multivariate methylation risk score (MMRS) for identifying mild cognitive impairment cross‐sectionally, independent of age and sex ( P = 2.0 × 10 −3 ). This score significantly predicted the prospective development of cognitive impairments in independent studies of Alzheimer's disease (hazard ratio for Rey's Auditory Verbal Learning Test (RAVLT)‐Learning = 2.47) and Parkinson's disease (hazard ratio for MCI/dementia = 2.59). DISCUSSION Our work shows the potential of employing blood‐derived DNA methylation data in the assessment of dementia risk. Highlights We used whole blood DNA methylation as a surrogate for 14 dementia risk factors. Created a multivariate methylation risk score for predicting cognitive impairment. Emphasized the role of machine learning and omics data in predicting dementia. The score predicts cognitive impairment development at the population level.
  summary: Researchers developed a method using whole blood DNA methylation to predict dementia risk, finding it effective in detecting mild cognitive impairment and predicting future cognitive decline across different types of dementia. This approach could significantly advance early detection and prevention strategies for dementia.
- year: 2024
  type: Journal
  title: Bridging auditory perception and natural language processing with semantically informed deep neural networks
  authors: Esposito M., Valente G., Plasencia-Calaña Y., Dumontier M., Giordano B. L., Formisano E.
  venue: Scientific Reports
  doi: 10.1038/s41598-024-71693-9
  citations: 7
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Sound recognition is effortless for humans but poses a significant challenge for artificial hearing systems. Deep neural networks (DNNs), especially convolutional neural networks (CNNs), have recently surpassed traditional machine learning in sound classification. However, current DNNs map sounds to labels using binary categorical variables, neglecting the semantic relations between labels. Cognitive neuroscience research suggests that human listeners exploit such semantic information besides acoustic cues. Hence, our hypothesis is that incorporating semantic information improves DNN''s sound recognition performance, emulating human behaviour. In our approach, sound recognition is framed as a regression problem, with CNNs trained to map spectrograms to continuous semantic representations from NLP models (Word2Vec, BERT, and CLAP text encoder). Two DNN types were trained: semDNN with continuous embeddings and catDNN with categorical labels, both with a dataset extracted from a collection of 388,211 sounds enriched with semantic descriptions. Evaluations across four external datasets, confirmed the superiority of semantic labeling from semDNN compared to catDNN, preserving higher-level relations. Importantly, an analysis of human similarity ratings for natural sounds, showed that semDNN approximated human listener behaviour better than catDNN, other DNNs, and NLP models. Our work contributes to understanding the role of semantics in sound recognition, bridging the gap between artificial systems and human auditory perception.'
  summary: This research explores how incorporating semantic information into deep neural networks (DNNs) can enhance their performance in recognizing sounds compared to traditional binary categorical labels. By framing sound recognition as a regression problem using continuous embeddings from NLP models like Word2Vec, BERT, and CLAP text encoder, the study shows that semDNN outperforms catDNN across multiple datasets, better approximating human auditory perception.
- year: 2024
  type: Journal
  title: 'Case Studies on Sustainability-Oriented Innovations and Smart Farming Technologies in the Wine Industry: A Comparative Analysis of Pilots in Cyprus and Italy'
  authors: Kasimati A., Papadopoulos G., Manstretta V., Giannakopoulou M., Adamides G., Neocleous D., Vassiliou V., Savvides S., Stylianou A.
  venue: Agronomy
  doi: 10.3390/agronomy14040736
  citations: 12
  orcids:
  - 0000-0002-7620-3782
  tags: []
  abstract: Addressing the urgent sustainability challenges in the wine industry, this study explores the efficacy of sustainability-oriented innovations (SOIs) and smart farming technologies (SFTs) across wine value chains in Cyprus and Italy. Utilising a mixed-methods approach that includes quantitative analysis through Key Performance Indicators (KPIs) and qualitative assessments to understand stakeholders’ perspectives, this research delves into the environmental, economic, and social impacts of these technologies. In Cyprus, the integration of digital labelling and smart farming solutions led to a substantial reduction in pesticide usage by up to 75% and enhanced the perceived quality of wine by an average of 8%. A pilot study in Italy witnessed a 33.4% decrease in greenhouse gas emissions, with the additional benefit of a 5.3% improvement in intrinsic product quality. The pilot introduced a carbon credit system, potentially generating an average annual revenue of EUR 4140 per farm. These findings highlight the transformative potential of SOIs and SFTs in promoting sustainable practices within the wine industry, demonstrating significant advancements in reducing environmental impact, improving product quality, and enhancing economic viability. This study underscores the critical role of innovative technologies in achieving sustainability goals and provides a compelling case for their wider adoption within the agricultural sector.
  summary: This research explores how sustainability-oriented innovations (SOIs) and smart farming technologies (SFTs) can enhance the environmental, economic, and social impacts of wine production across Cyprus and Italy. It uses mixed-methods analysis to assess these technologies' effectiveness in reducing pesticide use, improving product quality, lowering greenhouse gas emissions, and generating revenue for farmers. The findings show promising results, with significant reductions in environmental impact and improvements in economic viability, making SOIs and SFTs a compelling case for wider adoption within the agricultural sector.
- year: 2024
  type: Journal
  title: 'CrowdED 1.0: Statistical Guideline for Designing Optimal Crowdsourcing Experiments'
  authors: Zaveri A., Hernandez Serrano P. V., Dumontier M.
  venue: Human Computation
  doi: 10.15346/hc.v11i1.125
  citations: 0
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Crowdsourcing involves employing a large number of workers, creating HITs (Human Intelligent Tasks), submitting them to a crowdsourcing platform and providing a monetary reward for each HIT. One of the advantages of using crowdsourcing is that the tasks can be highly parallelized, that is, the work is performed by a high number of people in a decentralized setting. The design also offers a means to cross-check the accuracy of the answers by assigning each task to more than one person thus relying on majority consensus as well as rewarding the workers according to their performance and productivity. Since each worker is paid per task, the costs can significantly increase, irrespective of the overall accuracy of the results. Thus, one important question when designing such crowdsourcing tasks that arise is can we estimate apriori - before launching the experiment - how many workers to employ and how many tasks to assign to each worker when dealing with large amounts of tasks. Thus, the main research question we aim to answer is: ‘Can we a-priori estimate optimal workers and tasks’ assignment to obtain maximum accuracy on all tasks?’.We introduce a two-staged statistical guideline, CrowdED, for optimal crowdsourcing experimental design in order to a-priori, via simulations, estimate optimal workers and tasks’ assignment to obtain maximum accuracy for crowdsourcing tasks. We describe the methodology and evaluate it by comparing with real-world experiments and show that the method performs better than random selection of values.'
  summary: This research introduces CrowdED, a statistical guideline designed to optimize crowdsourcing task assignments based on simulations, aiming to predict optimal worker and task allocation for maximum accuracy in large-scale tasks without prior knowledge of workers' performance or productivity. The method significantly outperforms random assignment by improving accuracy across various experiments compared to real-world data.
- year: 2024
  type: Journal
  title: 'Data sharing in agricultural supply chains: Using semantics to enable sustainable food systems'
  authors: Brewster C., Kalatzis N., Nouwt B., Kruiger H., Verhoosel J.
  venue: Semantic Web
  doi: 10.3233/sw-233287
  citations: 7
  orcids:
  - 0000-0001-6594-9178
  tags: []
  abstract: The agrifood system faces a great many economic, social and environmental challenges. One of the biggest practical challenges has been to achieve greater data sharing throughout the agrifood system and the supply chain, both to inform other stakeholders about a product and equally to incentivise greater environmental sustainability. In this paper, a data sharing architecture is described built on three principles (a) reuse of existing semantic standards; (b) integration with legacy systems; and (c) a distributed architecture where stakeholders control access to their own data. The system has been developed based on the requirements of commercial users and is designed to allow queries across a federated network of agrifood stakeholders. The Ploutos semantic model is built on an integration of existing ontologies. The Ploutos architecture is built on a discovery directory and interoperability enablers, which use graph query patterns to traverse the network and collect the requisite data to be shared. The system is exemplified in the context of a pilot involving commercial stakeholders in the processed fruit sector. The data sharing approach is highly extensible with considerable potential for capturing sustainability related data.
  summary: This paper describes a new data-sharing architecture designed specifically for the agrifood industry, focusing on environmental sustainability. It integrates existing semantic standards and legacy systems while allowing controlled access to data through a distributed network. The Ploutos system uses ontologies and graph query patterns to share relevant information across stakeholders in the processed fruit sector, demonstrating its potential for capturing sustainability-related data.
- year: 2024
  type: Journal
  title: 'Deep embedded clustering generalisability and adaptation for integrating mixed datatypes: two critical care cohorts'
  authors: de Kok J. W. T. M., van Rosmalen F., Koeze J., Keus F., van Kuijk S. M. J., Castela Forte J., Schnabel R. M., Driessen R. G. H., van Herpt T. T. W., Sels J. E. M., Bergmans D. C. J. J., Lexis C. P. H., van Doorn W. P. T. M., Meex S. J. R., Xu M., Borrat X., Cavill R., van der Horst I. C. C., van Bussel B. C. T.
  venue: Scientific Reports
  doi: 10.1038/s41598-024-51699-z
  citations: 14
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Abstract We validated a Deep Embedded Clustering (DEC) model and its adaptation for integrating mixed datatypes (in this study, numerical and categorical variables). Deep Embedded Clustering (DEC) is a promising technique capable of managing extensive sets of variables and non-linear relationships. Nevertheless, DEC cannot adequately handle mixed datatypes. Therefore, we adapted DEC by replacing the autoencoder with an X-shaped variational autoencoder (XVAE) and optimising hyperparameters for cluster stability. We call this model “X-DEC”. We compared DEC and X-DEC by reproducing a previous study that used DEC to identify clusters in a population of intensive care patients. We assessed internal validity based on cluster stability on the development dataset. Since generalisability of clustering models has insufficiently been validated on external populations, we assessed external validity by investigating cluster generalisability onto an external validation dataset. We concluded that both DEC and X-DEC resulted in clinically recognisable and generalisable clusters, but X-DEC produced much more stable clusters.
  summary: Researchers developed a modified version of Deep Embedded Clustering (X-DEC) to handle mixed data types by replacing the autoencoder with an X-shaped variational autoencoder and optimizing hyperparameters for stability. The study compared DEC and X-DEC using a previous dataset, finding that while both methods produced stable clusters, X-DEC resulted in more stable clusters.
- year: 2024
  type: Journal
  title: Developing a multi-variate prediction model for COVID-19 from crowd-sourced respiratory voice data
  authors: Yan Y., Aljbawi W., Simons S. O., Urovi V.
  venue: Exploration of Digital Health Technologies
  doi: 10.37349/edht.2024.00022
  citations: 4
  orcids:
  - 0000-0003-2817-3950
  tags: []
  abstract: 'Aim: COVID-19 has affected more than 223 countries worldwide and in the post-COVID era, there is a pressing need for non-invasive, low-cost, and highly scalable solutions to detect COVID-19. This study focuses on the analysis of voice features and machine learning models in the automatic detection of COVID-19. Methods: We develop a deep learning model to identify COVID-19 from voice recording data. The novelty of this work is in the development of deep learning models for COVID-19 identification from only voice recordings. We use the Cambridge COVID-19 Sound database which contains 893 speech samples, crowd-sourced from 4,352 participants via a COVID-19 Sounds app. Voice features including Mel-spectrograms and Mel-frequency cepstral coefficients (MFCC) and convolutional neural network (CNN) Encoder features are extracted. Based on the voice data, we develop deep learning classification models to detect COVID-19 cases. These models include long short-term memory (LSTM), CNN and Hidden-Unit BERT (HuBERT). Results: We compare their predictive power to baseline machine learning models. HuBERT achieves the highest accuracy of 86% and the highest AUC of 0.93. Conclusions: The results achieved with the proposed models suggest promising results in COVID-19 diagnosis from voice recordings when compared to the results obtained from the state-of-the-art.'
  summary: This study developed deep learning models specifically for detecting COVID-19 using only voice recording data, achieving an accuracy of 86% and AUC of 0.93, surpassing baseline machine learning models.
