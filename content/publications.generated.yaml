  title: Role of the Built and Online Social Environments on Expression of Dining on Instagram
  authors: Mhasawade V., Elghafari A., Duncan D. T., Chunara R.
  venue: International Journal of Environmental Research and Public Health
  doi: 10.3390/ijerph17030735
  citations: 6
  orcids:
  - 0000-0001-5335-9998
  tags: []
  abstract: Online social communities are becoming windows for learning more about the health of populations, through information about our health-related behaviors and outcomes from daily life. At the same time, just as public health data and theory has shown that aspects of the built environment can affect our health-related behaviors and outcomes, it is also possible that online social environments (e.g., posts and other attributes of our online social networks) can also shape facets of our life. Given the important role of the online environment in public health research and implications, factors which contribute to the generation of such data must be well understood. Here we study the role of the built and online social environments in the expression of dining on Instagram in Abu Dhabi; a ubiquitous social media platform, city with a vibrant dining culture, and a topic (food posts) which has been studied in relation to public health outcomes. Our study uses available data on user Instagram profiles and their Instagram networks, as well as the local food environment measured through the dining types (e.g., casual dining restaurants, food court restaurants, lounges etc.) by neighborhood. We find evidence that factors of the online social environment (profiles that post about dining versus profiles that do not post about dining) have different influences on the relationship between a user’s built environment and the social dining expression, with effects also varying by dining types in the environment and time of day. We examine the mechanism of the relationships via moderation and mediation analyses. Overall, this study provides evidence that the interplay of online and built environments depend on attributes of said environments and can also vary by time of day. We discuss implications of this synergy for precisely-targeting public health interventions, as well as on using online data for public health research.
  summary: This study examines how factors in both the physical environment (built) and online social environment (Instagram profiles) influence dining behavior among users in Abu Dhabi. It finds that posts about dining have different effects on built environment-dining relationships depending on the type of restaurant and time of day, suggesting a complex interplay between these environments for public health research.
