  title: "Validation of polymorphic Gompertzian model of cancer through\n                  <i>in vitro</i>\n                  and\n                  <i>in vivo</i>\n                  data"
  authors: Soboleva A., Kaznatcheev A., Cavill R., Schneider K., Staňková K.
  venue: ''
