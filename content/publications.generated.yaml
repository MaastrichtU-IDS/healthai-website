  title: Feasibility of Prioritizing Drug–Drug-Event Associations Found in Electronic Health Records
  authors: Banda J. M., Callahan A., Winnenburg R., Strasberg H. R., Cami A., Reis B. Y., Vilar S., Hripcsak G., Dumontier M., Shah N. H.
  venue: Drug Safety
  doi: 10.1007/s40264-015-0352-2
  citations: 32
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Background and objective Several studies have demonstrated the ability to detect adverse events potentially related to multiple drug exposure via data mining. However, the number of putative associations produced by such computational approaches is typically large, making experimental validation difficult. We theorized that those potential associations for which there is evidence from multiple complementary sources are more likely to be true, and explored this idea using a published database of drug-drug-adverse event associations derived from electronic health records (EHRs). Methods We prioritized drug-drug-event associations derived from EHRs using four sources of information: (1) public databases, (2) sources of spontaneous reports, (3) literature, and (4) non-EHR drug-drug interaction (DDI) prediction methods. After pre-filtering the associations by removing those found in public databases, we devised a ranking for associations based on the support from the remaining sources, and evaluated the results of this rank-based prioritization. Results We collected information for 5983 putative EHR-derived drug-drug-event associations involving 345 drugs and ten adverse events from four data sources and four prediction methods. Only seven drug-drug-event associations ( Conclusions Our proof-of-concept method for scoring putative drug-drug-event associations from EHRs offers a systematic and reproducible way of prioritizing associations for further study. Our findings also quantify the agreement (or lack thereof) among complementary sources of evidence for drug-drug-event associations and highlight the challenges of developing a robust approach for prioritizing signals of these associations.'
  summary: Researchers developed a method to prioritize potential adverse drug events based on multiple data sources, finding that associations with strong support from diverse evidence are more likely to be accurate, offering a systematic way to identify reliable signals for further study.
- year: 2015
