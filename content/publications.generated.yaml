  title: 'Towards FAIR protocols and workflows: the OpenPREDICT use case'
  authors: Celebi R., Rebelo Moreira J., Hassan A. A., Ayyar S., Ridder L., Kuhn T., Dumontier M.
  venue: PeerJ Computer Science
  doi: 10.7717/peerj-cs.281
  citations: 14
