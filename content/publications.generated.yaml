  title: User incentives for blockchain-based data sharing platforms
  authors: Jaiman V., Pernice L., Urovi V.
  venue: PLOS ONE
  doi: 10.1371/journal.pone.0266624
  citations: 33
  orcids:
  - 0000-0003-2817-3950
