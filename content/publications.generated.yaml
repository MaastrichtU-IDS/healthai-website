  title: Performance of Dower's inverse transform and Frank lead system for Identification of Myocardial Infarction
  authors: Aranda A., Bonizzi P., Karel J., Peeters R.
  venue: 2015 37th Annual International Conference of the IEEE Engineering in Medicine and Biology Society (EMBC)
  doi: 10.1109/embc.2015.7319393
  citations: 5
  orcids:
