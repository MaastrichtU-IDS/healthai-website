  title: 'Interpreting the lipidome: bioinformatic approaches to embrace the complexity'
  authors: Kyle J. E., Aimo L., Bridge A. J., Clair G., Fedorova M., Helms J. B., Molenaar M. R., Ni Z., Orešič M., Slenter D., Willighagen E., Webb-Robertson B. M.
  venue: Metabolomics
  doi: 10.1007/s11306-021-01802-6
  citations: 23
  orcids:
  - 0000-0001-8449-1318
  tags: []
  abstract: 'Background Improvements in mass spectrometry (MS) technologies coupled with bioinformatics developments have allowed considerable advancement in the measurement and interpretation of lipidomics data in recent years. Since research areas employing lipidomics are rapidly increasing, there is a great need for bioinformatic tools that capture and utilize the complexity of the data. Currently, the diversity and complexity within the lipidome is often concealed by summing over or averaging individual lipids up to (sub)class-based descriptors, losing valuable information about biological function and interactions with other distinct lipids molecules, proteins and/or metabolites. Aim of review To address this gap in knowledge, novel bioinformatics methods are needed to improve identification, quantification, integration and interpretation of lipidomics data. The purpose of this mini-review is to summarize exemplary methods to explore the complexity of the lipidome. Key scientific concepts of review Here we describe six approaches that capture three core focus areas for lipidomics: (1) lipidome annotation including a resolvable database identifier, (2) interpretation via pathway- and enrichment-based methods, and (3) understanding complex interactions to emphasize specific steps in the analytical process and highlight challenges in analyses associated with the complexity of lipidome data.'
  summary: 'This mini-review summarizes six novel bioinformatics methods designed to improve identification, quantification, integration, and interpretation of lipidomics data by capturing three core focus areas: lipidome annotation (resolvable database identifier), pathway- and enrichment-based interpretations, and understanding complex interactions highlighting challenges in analyses associated with the complexity of lipidome data.'
