  abstract: 'Purpose Blockchain systems have been proposed as a solution for exchanging electronic health records (EHR) because they enable data sharing in decentralised networks. This paper aims to analyse the user acceptability of blockchain technology in enabling EHR exchange and to formulate practical implications for increasing user acceptability. Design/methodology/approach A technology acceptance model [extended Unified Theory of Acceptance and Use of Technology (UTAUT) model] was used as a framework to measure the effects of 13 factors. The authors conducted a survey and analysed data from 214 participants using partial least square path modelling. Findings The acceptance of blockchain for EHR sharing is positively influenced by performance expectancy, social influence and perceived trust. Effort expectancy and facilitating conditions do not influence acceptance. The UTAUT model explains the variance in acceptance at 58.4%. Self-efficacy influences effort expectancy, incentives influence facilitating conditions and security predicts perceived trust. Practical implications Three implications are drawn: (1) Users need to clearly understand system’s purpose, functions, security mechanism and environmental impacts. (2) Users are incentivised to share health data via a blockchain solution if the technology offers personalising options and health information. (3) Health personnel can socially impact patients to use blockchain-based solutions. Originality/value Studies have shown that blockchain technology is a valuable solution for exchanging EHR. The novelty of this work is to identify how and why patients may accept this emerging technology for EHR exchange.'
  summary: 'This study uses the Technology Acceptance Model (UTAUT) framework to analyze user acceptance of blockchain technology for electronic health record sharing, finding that performance expectancy, social influence, and perceived trust positively impact acceptance. Effort expectancy and facilitating conditions do not significantly affect it. Self-efficacy influences effort expectancy, incentives influence facilitating conditions, and security predicts perceived trust. The study identifies three practical implications: clear communication about system purpose and security, personalization incentives for patients, and patient-socially influenced adoption by healthcare providers.'
- year: 2023
