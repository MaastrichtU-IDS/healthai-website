  abstract: Abstract Poly(2‐alkyl‐2‐oxazoline)s (PAOx) are regaining interest for biomedical applications. However, their full potential is hampered by the inability to synthesise uniform high‐molar mass PAOx. In this work, we proposed alternative intrinsic chain transfer mechanisms based on 2‐oxazoline and oxazolinium chain‐end tautomerisation and derived improved polymerization conditions to suppress chain transfer, allowing the synthesis of highly defined poly(2‐ethyl‐2‐oxazoline)s up to ca. 50 kDa (dispersity ( Ð ) &lt;1.05) and defined polymers up to at least 300 kDa ( Ð &lt;1.2). The determination of the chain transfer constants for the polymerisations hinted towards the tautomerisation of the oxazolinium chain end as most plausible cause for chain transfer. Finally, the method was applied for the preparation of up to 60 kDa molar mass copolymers of 2‐ethyl‐2‐oxazoline and 2‐methoxycarbonylethyl‐2‐oxazoline.
  summary: This study proposes alternative intrinsic chain transfer mechanisms in PAOx synthesis, leading to the synthesis of highly defined poly(2-ethyl-2-oxazoline)s up to ca. 50 kDa and copolymers of 2-ethyl-2-oxazoline and 2-methoxycarbonylethyl-2-oxazoline up to 60 kDa, improving the synthesis conditions for uniform high-molar mass PAOx.
