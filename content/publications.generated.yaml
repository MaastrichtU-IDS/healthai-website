  abstract: Data integration for the purposes of tracking, tracing and transparency are important challenges in the agri-food supply chain. The Electronic Product Code Information Services (EPCIS) is an event-oriented GS1 standard that aims to enable tracking and tracing of products through the sharing of event-based datasets that encapsulate the Electronic Product Code (EPC). In this paper, the authors propose a framework that utilises events and EPCs in the generation of “linked pedigrees” - linked datasets that enable the sharing of traceability information about products as they move along the supply chain. The authors exploit two ontology based information models, EEM and CBVVocab within a distributed and decentralised framework that consumes real time EPCIS events as linked data to generate the linked pedigrees. The authors exemplify the usage of linked pedigrees within the fresh fruit and vegetables supply chain in the agri-food sector.
  summary: Researchers developed a method using Event-Object Model (EEM) and Common Business Vocabulary (CBV) ontologies to create "linked pedigrees" for tracking products in the agri-food supply chain, sharing event-based datasets from EPCIS events. This approach enables transparency and traceability throughout the supply chain.
