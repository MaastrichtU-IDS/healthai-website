  authors: Jacobs P. G., Herrero P., Facchinetti A., Vehi J., Kovatchev B., Breton M. D., Cinar A., Nikita K. S., Doyle F. J., Bondia J., Battelino T., Castle J. R., Zarkogianni K., Narayan R., Mosquera-Lopez C.
