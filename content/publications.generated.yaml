  title: Self-organizing ontology of biochemically relevant small molecules
  authors: Chepelev L. L., Hastings J., Ennis M., Steinbeck C., Dumontier M.
  venue: BMC Bioinformatics
  doi: 10.1186/1471-2105-13-3
  citations: 13
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background The advent of high-throughput experimentation in biochemistry has led to the generation of vast amounts of chemical data, necessitating the development of novel analysis, characterization, and cataloguing techniques and tools. Recently, a movement to publically release such data has advanced biochemical structure-activity relationship research, while providing new challenges, the biggest being the curation, annotation, and classification of this information to facilitate useful biochemical pattern analysis. Unfortunately, the human resources currently employed by the organizations supporting these efforts (e.g. ChEBI) are expanding linearly, while new useful scientific information is being released in a seemingly exponential fashion. Compounding this, currently existing chemical classification and annotation systems are not amenable to automated classification, formal and transparent chemical class definition axiomatization, facile class redefinition, or novel class integration, thus further limiting chemical ontology growth by necessitating human involvement in curation. Clearly, there is a need for the automation of this process, especially for novel chemical entities of biological interest. Results To address this, we present a formal framework based on Semantic Web technologies for the automatic design of chemical ontology which can be used for automated classification of novel entities. We demonstrate the automatic self-assembly of a structure-based chemical ontology based on 60 MeSH and 40 ChEBI chemical classes. This ontology is then used to classify 200 compounds with an accuracy of 92.7%. We extend these structure-based classes with molecular feature information and demonstrate the utility of our framework for classification of functionally relevant chemicals. Finally, we discuss an iterative approach that we envision for future biochemical ontology development. Conclusions We conclude that the proposed methodology can ease the burden of chemical data annotators and dramatically increase their productivity. We anticipate that the use of formal logic in our proposed framework will make chemical classification criteria more transparent to humans and machines alike and will thus facilitate predictive and integrative bioactivity model development.
  summary: Researchers developed a formal framework using Semantic Web technologies for automatically designing and classifying chemical ontologies, which significantly increased the accuracy of classifying novel compounds with an 92.7% success rate. This method can help automate the curation process, making it easier and more efficient for annotators while also improving transparency in classification criteria.
- year: 2012
  type: Journal
  title: Semantically Enabling Pharmacogenomic Data for the Realization of Personalized Medicine
  authors: Samwald M., Coulet A., Huerga I., Powers R. L., Luciano J. S., Freimuth R. R., Whipple F., Pichler E., Prud‘hommeaux E., Dumontier M., Marshall M. S.
  venue: Pharmacogenomics
  doi: 10.2217/pgs.11.179
  citations: 16
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Understanding how each individual's genetics and physiology influences pharmaceutical response is crucial to the realization of personalized medicine and the discovery and validation of pharmacogenomic biomarkers is key to its success. However, integration of genotype and phenotype knowledge in medical information systems remains a critical challenge. The inability to easily and accurately integrate the results of biomolecular studies with patients' medical records and clinical reports prevents us from realizing the full potential of pharmacogenomic knowledge for both drug development and clinical practice. Herein, we describe approaches using Semantic Web technologies, in which pharmacogenomic knowledge relevant to drug development and medical decision support is represented in such a way that it can be efficiently accessed both by software and human experts. We suggest that this approach increases the utility of data, and that such computational technologies will become an essential part of personalized medicine, alongside diagnostics and pharmaceutical products.
  summary: Researchers developed Semantic Web approaches to integrate pharmacogenomic knowledge with medical records for better drug development and clinical practice in personalized medicine. This method enhances data accessibility and utility, making it a crucial advancement in the field.
- year: 2012
