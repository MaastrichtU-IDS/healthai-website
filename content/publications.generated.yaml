  tags: []
  abstract: Knowledge management is an ongoing challenge for the biological community such that large, diverse and continuously growing information requires more sophisticated methods to store, integrate and query their knowledge. The semantic web initiative provides a new knowledge engineering framework to represent, share and discover information. In this paper, we describe our efforts towards the development of an ontology-based knowledge base, including aspects from ontology design and population using "semantic" data mashup, to automated reasoning and semantic query answering. Based on yeast data obtained from the Saccharomyces Genome Database and UniProt, we discuss the challenges encountered during the building of the knowledge base and how they were overcome.
  summary: Researchers developed an ontology-based knowledge base for biological information using "semantic" data mashup techniques to address the challenge of storing, integrating, and querying large, diverse, and continuously growing biological information. Challenges included overcoming issues in ontology design and population as well as implementing automated reasoning and semantic query answering methods. The study used yeast data from Saccharomyces Genome Database and UniProt for building the knowledge base.
