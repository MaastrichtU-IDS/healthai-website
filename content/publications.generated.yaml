  authors: Samwald Matthias, Freimuth Robert, Luciano Joanne S., Lin Simon, Powers Robert L., Marshall M. Scott, Adlassnig Klaus-Peter, Dumontier Michel, Boyce Richard D.
  venue: Studies in Health Technology and Informatics
