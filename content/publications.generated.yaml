  abstract: 'A significant portion of biomedical literature is represented in a manner that makes it difficult for consumers to find or aggregate content through a computational query. One approach to facilitate reuse of the scientific literature is to structure this information as linked data using standardized web technologies. In this paper we present the second version of Biotea, a semantic, linked data version of the open-access subset of PubMed Central that has been enhanced with specialized annotation pipelines that uses existing infrastructure from the National Center for Biomedical Ontology. We expose our models, services, software and datasets. Our infrastructure enables manual and semi-automatic annotation, resulting data are represented as RDF-based linked data and can be readily queried using the SPARQL query language. We illustrate the utility of our system with several use cases. Availability: Our datasets, methods and techniques are available at http://biotea.github.io'
  summary: Researchers developed Biotea, a semantic, linked data version of PubMed Central that uses existing infrastructure from NCBO for annotation pipelines. The models, services, software, and datasets are exposed to facilitate reuse through computational queries using SPARQL. This allows easy querying of the structured biomedical literature.
- year: 2017
  type: Journal
  title: 'Cleaning by clustering: methodology for addressing data quality issues in biomedical metadata'
  authors: Hu W., Zaveri A., Qiu H., Dumontier M.
  venue: BMC Bioinformatics
  doi: 10.1186/s12859-017-1832-4
  citations: 14
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Background The ability to efficiently search and filter datasets depends on access to high quality metadata. While most biomedical repositories require data submitters to provide a minimal set of metadata, some such as the Gene Expression Omnibus (GEO) allows users to specify additional metadata in the form of textual key-value pairs (e.g. sex: female). However, since there is no structured vocabulary to guide the submitter regarding the metadata terms to use, consequently, the 44,000,000+ key-value pairs in GEO suffer from numerous quality issues including redundancy, heterogeneity, inconsistency, and incompleteness. Such issues hinder the ability of scientists to hone in on datasets that meet their requirements and point to a need for accurate, structured and complete description of the data. Methods In this study, we propose a clustering-based approach to address data quality issues in biomedical, specifically gene expression, metadata. First, we present three different kinds of similarity measures to compare metadata keys. Second, we design a scalable agglomerative clustering algorithm to cluster similar keys together. Results Our agglomerative cluster algorithm identified metadata keys that were similar, based on (i) name, (ii) core concept and (iii) value similarities, to each other and grouped them together. We evaluated our method using a manually created gold standard in which 359 keys were grouped into 27 clusters based on six types of characteristics: (i) age, (ii) cell line, (iii) disease, (iv) strain, (v) tissue and (vi) treatment. As a result, the algorithm generated 18 clusters containing 355 keys (four clusters with only one key were excluded). In the 18 clusters, there were keys that were identified correctly to be related to that cluster, but there were 13 keys which were not related to that cluster. We compared our approach with four other published methods. Our approach significantly outperformed them for most metadata keys and achieved the best average F-Score (0.63). Conclusion Our algorithm identified keys that were similar to each other and grouped them together. Our intuition that underpins cleaning by clustering is that, dividing keys into different clusters resolves the scalability issues for data observation and cleaning, and keys in the same cluster with duplicates and errors can easily be found. Our algorithm can also be applied to other biomedical data types.'
  summary: Researchers developed a method called clustering to organize metadata keys from gene expression datasets like GEO more efficiently. This approach helped identify similar key-value pairs that were redundant or inconsistent, improving the quality of the dataset for scientists searching for specific information. The study found that clustering significantly improved the accuracy and completeness of metadata compared to existing methods, achieving an average F-Score of 0.63.
- year: 2017
  type: Journal
  title: Cloudy, increasingly FAIR; revisiting the FAIR Data guiding principles for the European Open Science Cloud
  authors: Mons B., Neylon C., Velterop J., Dumontier M., da Silva Santos L. O. B., Wilkinson M. D.
  venue: Information Services and Use
  doi: 10.3233/isu-170824
  citations: 255
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: The FAIR Data Principles propose that all scholarly output should be Findable, Accessible, Interoperable, and Reusable. As a set of guiding principles, expressing only the kinds of behaviours that researchers should expect from contemporary data resources, how the FAIR principles should manifest in reality was largely open to interpretation. As support for the Principles has spread, so has the breadth of these interpretations. In observing this creeping spread of interpretation, several of the original authors felt it was now appropriate to revisit the Principles, to clarify both what FAIRness is, and is not.
  summary: The FAIR Data Principles were originally proposed as guidelines for researchers' behavior with data resources. The study aimed to clarify these principles by defining what FAIR means in practice and why it matters.
- year: 2017
  type: Journal
  title: 'COMPOSE: Using temporal patterns for interpreting wearable sensor data with computer interpretable guidelines'
  authors: Urovi V., Jimenez-del-Toro O., Dubosson F., Ruiz Torres A., Schumacher M.
  venue: Computers in Biology and Medicine
  doi: 10.1016/j.compbiomed.2016.11.015
  citations: 4
  orcids:
  - 0000-0003-2817-3950
  tags: []
  abstract: This paper describes a novel temporal logic-based framework for reasoning with continuous data collected from wearable sensors. The work is motivated by the Metabolic Syndrome, a cluster of conditions which are linked to obesity and unhealthy lifestyle. We assume that, by interpreting the physiological parameters of continuous monitoring, we can identify which patients have a higher risk of Metabolic Syndrome. We define temporal patterns for reasoning with continuous data and specify the coordination mechanisms for combining different sets of clinical guidelines that relate to this condition. The proposed solution is tested with data provided by twenty subjects, which used sensors for four days of continuous monitoring. The results are compared to the gold standard. The novelty of the framework stands in extending a temporal logic formalism, namely the Event Calculus, with temporal patterns. These patterns are helpful to specify the rules for reasoning with continuous data and in combining new knowledge into one consistent outcome that is tailored to the patient's profile. The overall approach opens new possibilities for delivering patient-tailored interventions and educational material before the patients present the symptoms of the disease.
  summary: This paper introduces a novel framework using temporal logic to reason with continuous data from wearable sensors, aiming to identify patients at higher risk of Metabolic Syndrome through monitoring physiological parameters. The proposed solution extends Event Calculus with temporal patterns for reasoning with continuous data and combining clinical guidelines, tested on 20 subjects over four days. It offers new possibilities for personalized interventions before symptoms appear.
- year: 2017
  type: Book Chapter
  title: Concept Recognition in European and National Law
  authors: Nanda Rohan, Siragusa Giovanni, Di Caro Luigi, Theobald Martin, Boella Guido, Robaldo Livio, Costamagna Francesco
  venue: Frontiers in Artificial Intelligence and Applications
  doi: 10.3233/978-1-61499-838-9-193
  citations: 1
  orcids:
  - 0000-0001-7124-4799
  tags: []
  abstract: This paper presents a concept recognition system for European and national legislation. Current named entity recognition (NER) systems do not focus on identifying concepts which are essential for interpretation and harmonization of European and national law. We utilized the IATE (Inter-Active Terminology for Europe) vocabulary, a state-of-the-art named entity recognition system and Wikipedia to generate an annotated corpus for concept recognition. We applied conditional random fields (CRF) to identify concepts on a corpus of European directives and Statutory Instruments (SIs) of the United Kingdom. The CRF-based concept recognition system achieved an F1 score of 0.71 over the combined corpus of directives and SIs. Our results indicate the usability of a CRF-based learning system over dictionary tagging and state-of-the-art methods.
  summary: This paper presents a new concept recognition system for European and national legislation using IATE vocabulary, Wikipedia, and conditional random fields to improve understanding and harmonization of laws across Europe. The system achieved an F1 score of 0.71 on a corpus of directives and SIs, demonstrating its usability over traditional methods.
- year: 2017
  type: Journal
  title: 'Cytotoxicity of polycations: Relationship of molecular weight and the hydrolytic theory of the mechanism of toxicity'
  authors: Monnery B. D., Wright M., Cavill R., Hoogenboom R., Shaunak S., Steinke J. H., Thanou M.
  venue: International Journal of Pharmaceutics
  doi: 10.1016/j.ijpharm.2017.02.048
  citations: 209
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: The mechanism of polycation cytotoxicity and the relationship to polymer molecular weight is poorly understood. To gain an insight into this important phenomenon a range of newly synthesised uniform (near monodisperse) linear polyethylenimines, commercially available poly(l-lysine)s and two commonly used PEI-based transfectants (broad 22kDa linear and 25kDa branched) were tested for their cytotoxicity against the A549 human lung carcinoma cell line. Cell membrane damage assays (LDH release) and cell viability assays (MTT) showed a strong relationship to dose and polymer molecular weight, and increasing incubation times revealed that even supposedly "non-toxic" low molecular weight polymers still damage cell membranes. The newly proposed mechanism of cell membrane damage is acid catalysed hydrolysis of lipidic phosphoester bonds, which was supported by observations of the hydrolysis of DOPC liposomes.
  summary: Researchers tested three types of polycation drugs on lung cancer cells to understand how they cause harm and why some are more toxic than others. They found that low molecular weight polymers can still damage cell membranes even if they're not harmful in small doses, and this damage is likely due to acid catalyzed hydrolysis of lipidic phosphoester bonds.
