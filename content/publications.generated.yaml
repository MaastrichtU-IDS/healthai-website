  abstract: Addressing the urgent sustainability challenges in the wine industry, this study explores the efficacy of sustainability-oriented innovations (SOIs) and smart farming technologies (SFTs) across wine value chains in Cyprus and Italy. Employing KPIs for a rigorous assessment, the research delves into the environmental, economic, and social impacts of these technologies. In Cyprus (SIP7), the integration of digital labelling and smart farming solutions led to a substantial reduction in pesticide usage by up to 75% and enhanced the perceived quality of wine by an average of 8%. Italy&amp;#039;s SIP10 witnessed a 33.4% decrease in greenhouse gas emissions, with an additional benefit of a 5.3% improvement in intrinsic product quality. Notably, SIP10 also introduced a carbon credit system, potentially generating an average annual revenue of €4,140 per farm. These findings highlight the transformative potential of SOIs and SFTs in promoting sustainable practices within the wine industry, demonstrating significant advancements in reducing environmental impact, improving product quality, and enhancing economic viability. The study underscores the critical role of innovative technologies in achieving sustainability goals and provides a compelling case for wider adoption within the agricultural sector.
  summary: This research evaluates the effectiveness of sustainability-oriented innovations (SOIs) and smart farming technologies (SFTs) on wine value chains in Cyprus and Italy, using KPIs to assess environmental, economic, and social impacts. It found that digital labelling and SFTs led to significant reductions in pesticide use and improved product quality while also contributing to greenhouse gas emission reduction and generating revenue for farmers. These findings demonstrate the transformative potential of SOIs and SFTs in promoting sustainable practices within the wine industry, highlighting their critical role in achieving sustainability goals and encouraging wider adoption in agriculture.
