  title: 'Aptamer base: a collaborative knowledge base to describe aptamers and SELEX experiments'
  authors: Cruz-Toledo J., McKeague M., Zhang X., Giamberardino A., McConnell E., Francis T., DeRosa M. C., Dumontier M.
  venue: Database
  doi: 10.1093/database/bas006
  citations: 62
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Over the past several decades, rapid developments in both molecular and information technology have collectively increased our ability to understand molecular recognition. One emerging area of interest in molecular recognition research includes the isolation of aptamers. Aptamers are single-stranded nucleic acid or amino acid polymers that recognize and bind to targets with high affinity and selectivity. While research has focused on collecting aptamers and their interactions, most of the information regarding experimental methods remains in the unstructured and textual format of peer reviewed publications. To address this, we present the Aptamer Base, a database that provides detailed, structured information about the experimental conditions under which aptamers were selected and their binding affinity quantified. The open collaborative nature of the Aptamer Base provides the community with a unique resource that can be updated and curated in a decentralized manner, thereby accommodating the ever evolving field of aptamer research. DATABASE URL: http://aptamer.freebase.com.'
  summary: The researchers created an online database called the Aptamer Base to provide detailed information about how aptamers were isolated and their binding affinities measured, which can help advance the field of aptamer research by making experimental methods more accessible and up-to-date.
