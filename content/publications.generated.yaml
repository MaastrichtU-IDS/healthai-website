  title: Developing a multi-feature fusion model for exacerbation classification in asthma and COPD
  authors: Yan Y., van Bemmel L., Franssen F. M., Simons S. O., Urovi V.
  venue: Computer Methods and Programs in Biomedicine
  doi: 10.1016/j.cmpb.2025.108796
  citations: 5
