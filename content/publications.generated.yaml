  title: Application of transfer learning to predict drug-induced human in vivo gene expression changes using rat in vitro and in vivo data
  authors: O’Donovan S. D., Cavill R., Wimmenauer F., Lukas A., Stumm T., Smirnov E., Lenz M., Ertaylan G., Jennen D. G. J., van Riel N. A. W., Driessens K., Peeters R. L. M., de Kok T. M. C. M.
