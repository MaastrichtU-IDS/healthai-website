  title: 'PubChemRDF: towards the semantic annotation of PubChem compound and substance databases'
  authors: Fu G., Batchelor C., Dumontier M., Hastings J., Willighagen E., Bolton E.
  venue: Journal of Cheminformatics
  doi: 10.1186/s13321-015-0084-4
  citations: 103
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background PubChem is an open repository for chemical structures, biological activities and biomedical annotations. Semantic Web technologies are emerging as an increasingly important approach to distribute and integrate scientific data. Exposing PubChem data to Semantic Web services may help enable automated data integration and management, as well as facilitate interoperable web applications. Description This work, one of a series covering the PubChemRDF project, describes an approach to translate PubChem Substance and Compound information into Resource Description Framework (RDF) format. Basic examples are provided to demonstrate its use. The aim of this effort is to provide two new primary benefits to researchers in a cost-effective manner. Firstly, we aim to remove the inherent limitations of using the web-based resource PubChem by allowing a researcher to use readily available semantic technologies (namely, RDF triple stores and their corresponding SPARQL query engines) to query and analyze PubChem data on local computing resources. Secondly, this work intends to help improve data sharing, analysis, and integration of PubChem data to resources external to NCBI and across scientific domains, by means of the association of PubChem data to existing ontological frameworks, including CHEMical INFormation ontology, Semanticscience Integrated Ontology, and others. Conclusions With the goal of semantically describing information available in the PubChem archive, pre-existing ontological frameworks were used, rather than creating new ones. Semantic relationships between compounds and substances, chemical descriptors associated with compounds and substances, interrelationships between chemicals, as well as provenance and attribute metadata of substances are described. Graphical abstract:Schematic representation of the semantic links for PubChem compounds and substances.
  summary: 'This research describes an approach to translate PubChem Substance and Compound information into RDF format, providing two primary benefits: enabling researchers to query and analyze PubChem data using existing semantic technologies on local computing resources, and improving data sharing, analysis, and integration of PubChem data across scientific domains through the association with ontological frameworks.'
- year: 2015
  type: Book Chapter
  title: 'Publishing Without Publishers: A Decentralized Approach to Dissemination, Retrieval, and Archiving of Data'
  authors: Kuhn T., Chichester C., Krauthammer M., Dumontier M.
  venue: Lecture Notes in Computer Science
  doi: 10.1007/978-3-319-25007-6_38
  citations: 8
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Making available and archiving scientific results is for the most part still considered the task of classical publishing companies, despite the fact that classical forms of publishing centered around printed narrative articles no longer seem well-suited in the digital age. In particular, there exist currently no efficient, reliable, and agreed-upon methods for publishing scientific datasets, which have become increasingly important for science. Here we propose to design scientific data publishing as a Web-based bottom-up process, without top-down control of central authorities such as publishing companies. Based on a novel combination of existing concepts and technologies, we present a server network to decentrally store and archive data in the form of nanopublications, an RDF-based format to represent scientific data. We show how this approach allows researchers to publish, retrieve, verify, and recombine datasets of nanopublications in a reliable and trustworthy manner, and we argue that this architecture could be used for the Semantic Web in general. Evaluation of the current small network shows that this system is efficient and reliable.
  summary: Researchers propose an open-source, decentralized method to publish scientific data using RDF-based nanopublications on a peer-to-peer server network, aiming to replace traditional publishing models with more flexible and trustworthy methods suitable for the digital age.
- year: 2015
  type: Journal
  title: Ranking Adverse Drug Reactions With Crowdsourcing
  authors: Gottlieb A., Hoehndorf R., Dumontier M., Altman R. B.
  venue: Journal of Medical Internet Research
  doi: 10.2196/jmir.3962
  citations: 39
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background There is no publicly available resource that provides the relative severity of adverse drug reactions (ADRs). Such a resource would be useful for several applications, including assessment of the risks and benefits of drugs and improvement of patient-centered care. It could also be used to triage predictions of drug adverse events. Objective The intent of the study was to rank ADRs according to severity. Methods We used Internet-based crowdsourcing to rank ADRs according to severity. We assigned 126,512 pairwise comparisons of ADRs to 2589 Amazon Mechanical Turk workers and used these comparisons to rank order 2929 ADRs. Results There is good correlation (rho=.53) between the mortality rates associated with ADRs and their rank. Our ranking highlights severe drug-ADR predictions, such as cardiovascular ADRs for raloxifene and celecoxib. It also triages genes associated with severe ADRs such as epidermal growth-factor receptor (EGFR), associated with glioblastoma multiforme, and SCN1A, associated with epilepsy. Conclusions ADR ranking lays a first stepping stone in personalized drug risk assessment. Ranking of ADRs using crowdsourcing may have useful clinical and financial implications, and should be further investigated in the context of health care decision making.
  summary: Researchers used Amazon Mechanical Turk to rank adverse drug reactions (ADRs) by severity, finding good correlation between mortality rates and rankings. The study highlights severe ADR predictions for drugs like raloxifene and celecoxib, as well as genes associated with severe ADRs such as EGFR and SCN1A. This ranking could aid in personalized risk assessment and improve patient-centered care.
