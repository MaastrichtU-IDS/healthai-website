  title: Analysis of In Vitro Aptamer Selection Parameters
  authors: McKeague M., McConnell E. M., Cruz-Toledo J., Bernard E. D., Pach A., Mastronardi E., Zhang X., Beking M., Francis T., Giamberardino A., Cabecinha A., Ruscito A., Aranda-Rodriguez R., Dumontier M., DeRosa M. C.
