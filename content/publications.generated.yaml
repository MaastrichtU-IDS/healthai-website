  title: Mouse model phenotypes provide information about human drug targets
  authors: Hoehndorf R., Hiebert T., Hardy N. W., Schofield P. N., Gkoutos G. V., Dumontier M.
  venue: Bioinformatics
  doi: 10.1093/bioinformatics/btt613
  citations: 34
  orcids:
