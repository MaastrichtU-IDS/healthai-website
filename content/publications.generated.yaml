  tags: []
  abstract: Abstract Receptor diffusion plays an essential role in cellular signalling via the plasma membrane microenvironment and receptor interactions, but the regulation is not well understood. To aid in understanding of the key determinants of receptor diffusion and signalling, we developed agent-based models (ABMs) to explore the extent of dimerisation of the platelet- and megakaryocyte-specific receptor for collagen glycoprotein VI (GPVI). This approach assessed the importance of glycolipid enriched raft-like domains within the plasma membrane that lower receptor diffusivity. Our model simulations demonstrated that GPVI dimers preferentially concentrate in confined domains and, if diffusivity within domains is decreased relative to outside of domains, dimerisation rates are increased. While an increased amount of confined domains resulted in further dimerisation, merging of domains, which may occur upon membrane rearrangements, was without effect. Modelling of the proportion of the cell membrane which constitutes lipid rafts indicated that dimerisation levels could not be explained by these alone. Crowding of receptors by other membrane proteins was also an important determinant of GPVI dimerisation. Together, these results demonstrate the value of ABM approaches in exploring the interactions on a cell surface, guiding the experimentation for new therapeutic avenues.
  summary: Researchers developed agent-based models to study how platelet and megakaryocyte-specific receptor GPVI diffuses across the plasma membrane. They found that GPVI dimers preferentially concentrate in confined domains with lower diffusion rates. The model showed that increased confinement of these domains led to higher dimerisation, but merging of domains was not effective. Additionally, crowding by other membrane proteins also influenced GPVI dimerization levels. This study highlights the importance of ABM approaches for understanding receptor interactions and guiding new therapeutic strategies.
