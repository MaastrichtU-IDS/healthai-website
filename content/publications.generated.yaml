  abstract: Abstract The effectiveness of most cancer targeted therapies is short-lived. Tumors often develop resistance that might be overcome with drug combinations. However, the number of possible combinations is vast, necessitating data-driven approaches to find optimal patient-specific treatments. Here we report AstraZeneca’s large drug combination dataset, consisting of 11,576 experiments from 910 combinations across 85 molecularly characterized cancer cell lines, and results of a DREAM Challenge to evaluate computational strategies for predicting synergistic drug pairs and biomarkers. 160 teams participated to provide a comprehensive methodological development and benchmarking. Winning methods incorporate prior knowledge of drug-target interactions. Synergy is predicted with an accuracy matching biological replicates for &gt;60% of combinations. However, 20% of drug combinations are poorly predicted by all methods. Genomic rationale for synergy predictions are identified, including ADAM17 inhibitor antagonism when combined with PIK3CB/D inhibition contrasting to synergy when combined with other PI3K-pathway inhibitors in PIK3CA mutant cells.
  summary: AstraZeneca released a large dataset of 11,576 drug combinations across 910 experiments from 85 cancer cell lines, aiming to predict synergistic drug pairs and biomarkers for personalized cancer treatment using computational strategies. The study involved 160 teams participating in the DREAM Challenge, which resulted in methods that accurately predicted synergy for 60% of combinations but struggled with predicting 20% of poorly paired drugs. Genomic rationale identified antagonism between ADAM17 inhibitors and PIK3CB/D inhibition compared to other PI3K-pathway inhibitors in cells with PIK3CA mutations, highlighting the importance of understanding drug interactions at a molecular level for effective treatment.
