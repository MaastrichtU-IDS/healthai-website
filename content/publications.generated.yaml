  title: 'Alternative Tactics to Herbicides in Integrated Weed Management: A Europe-Centered Systematic Literature Review'
  authors: Gagliardi L., Tramacere L. G., Antichi D., Frasconi C., Sbrana M., Sileoni G., Monacci E., Pagano L., Darra N., Kriezi O., Garcia B. E., Kasimati A., Tataridas A., Antonopoulos N., Gazoulis I., Lazarou E., Godfrey K., Tatnell L., Guilbert C., Prezman F., Börjesson T., Rodríguez-Rigueiro F. J., Mosquera-Losada M. R., Filipovics M., Zagorska V., Fountas S.
  venue: Agronomy
  doi: 10.3390/agronomy16020220
  citations: 0
  orcids:
  - 0000-0002-7620-3782
  tags: []
  abstract: Weeds pose a significant threat to crop yields, both in quantitative and qualitative terms. Modern agriculture relies heavily on herbicides; however, their excessive use can lead to negative environmental impacts. As a result, recent research has increasingly focused on Integrated Weed Management (IWM), which employs multiple complementary strategies to control weeds in a holistic manner. Nevertheless, large-scale adoption of this approach requires a solid understanding of the underlying tactics. This systematic review analyses recent studies (2013–2022) on herbicide alternatives for weed control across major cropping systems in the EU-27 and the UK, providing an overview of current knowledge, the extent to which IWM tactics have been investigated, and the main gaps that help define future research priorities. The review relied on the IWMPRAISE framework, which classifies weed control tactics into five pillars (direct control, field and soil management, cultivar choice and crop establishment, diverse cropping systems, and monitoring and evaluation) and used Scopus as a scientific database. The search yielded a total of 666 entries, and the most represented pillars were Direct Control (193), Diverse Cropping System (183), and Field and Soil Management (172). The type of crop most frequently studied was arable crops (450), and the macro-area where the studies were mostly conducted was Southern Europe (268). The tactics with the highest number of entries were Tillage Type and Cultivation Depth (110), Cover Crops (82), and Biological Control (72), while those with the lowest numbers were Seed Vigor (2) and Sowing Depth (2). Overall, this review identifies research gaps and sets priorities to boost IWM adoption, leading policy and funding to expand sustainable weed management across Europe.
  summary: This systematic review analyzed herbicide alternatives for weed control in major cropping systems in the EU-27 and UK, focusing on Integrated Weed Management tactics. It identified a need for better understanding of these strategies due to their increasing importance and limited research focus. The study found that direct control, diverse cropping systems, and field and soil management were the pillars most frequently investigated, with arable crops being the crop type studied the most. The review highlighted gaps in knowledge regarding tillage types, cover crops, biological control methods, and seed vigor/sowing depth, which could help guide future research priorities to improve IWM adoption and promote sustainable weed management across Europe.
