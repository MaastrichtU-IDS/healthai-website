  title: Exploring the influence of cytosolic and membrane FAK activation on YAP/TAZ nuclear translocation
  authors: Eroumé K. S., Cavill R., Staňková K., de Boer J., Carlier A.
  venue: Biophysical Journal
  doi: 10.1016/j.bpj.2021.09.009
  citations: 16
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Membrane binding and unbinding dynamics play a crucial role in the biological activity of several nonintegral membrane proteins, which have to be recruited to the membrane to perform their functions. By localizing to the membrane, these proteins are able to induce downstream signal amplification in their respective signaling pathways. Here, we present a 3D computational approach using reaction-diffusion equations to investigate the relation between membrane localization of focal adhesion kinase (FAK), Ras homolog family member A (RhoA), and signal amplification of the YAP/TAZ signaling pathway. Our results show that the theoretical scenarios in which FAK is membrane bound yield robust and amplified YAP/TAZ nuclear translocation signals. Moreover, we predict that the amount of YAP/TAZ nuclear translocation increases with cell spreading, confirming the experimental findings in the literature. In summary, our in silico predictions show that when the cell membrane interaction area with the underlying substrate increases, for example, through cell spreading, this leads to more encounters between membrane-bound signaling partners and downstream signal amplification. Because membrane activation is a motif common to many signaling pathways, this study has important implications for understanding the design principles of signaling networks.
  summary: This research used computational methods to simulate how proteins interact with membranes in cells, focusing on focal adhesion kinase (FAK), Ras homolog family member A (RhoA), and YAP/TAZ signaling pathway. The findings suggest that when FAK is localized to the membrane, it can lead to increased nuclear translocation of YAP/TAZ, which amplifies downstream signals. This study provides insights into how cell shape affects signal pathways in cells, with implications for understanding signaling network design principles across many biological systems.
- year: 2021
  type: Journal
  title: 'Fake It Till You Make It: Guidelines for Effective Synthetic Data Generation'
  authors: Dankar F. K., Ibrahim M.
  venue: Applied Sciences
  doi: 10.3390/app11052158
  citations: 103
  orcids:
  - 0000-0002-5099-7609
  tags: []
  abstract: Synthetic data provides a privacy protecting mechanism for the broad usage and sharing of healthcare data for secondary purposes. It is considered a safe approach for the sharing of sensitive data as it generates an artificial dataset that contains no identifiable information. Synthetic data is increasing in popularity with multiple synthetic data generators developed in the past decade, yet its utility is still a subject of research. This paper is concerned with evaluating the effect of various synthetic data generation and usage settings on the utility of the generated synthetic data and its derived models. Specifically, we investigate (i) the effect of data pre-processing on the utility of the synthetic data generated, (ii) whether tuning should be applied to the synthetic datasets when generating supervised machine learning models, and (iii) whether sharing preliminary machine learning results can improve the synthetic data models. Lastly, (iv) we investigate whether one utility measure (Propensity score) can predict the accuracy of the machine learning models generated from the synthetic data when employed in real life. We use two popular measures of synthetic data utility, propensity score and classification accuracy, to compare the different settings. We adopt a recent mechanism for the calculation of propensity, which looks carefully into the choice of model for the propensity score calculation. Accordingly, this paper takes a new direction with investigating the effect of various data generation and usage settings on the quality of the generated data and its ensuing models. The goal is to inform on the best strategies to follow when generating and using synthetic data.
  summary: This research evaluates how different methods for creating and using synthetic healthcare data affect their utility, focusing on pre-processing, model tuning, sharing results, and predicting accuracy with a specific measure called propensity score. The study aims to provide guidance on optimal practices for generating and utilizing synthetic data in healthcare settings.
