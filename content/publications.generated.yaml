  title: The Semanticscience Integrated Ontology (SIO) for biomedical research and knowledge discovery
  authors: Dumontier M., Baker C. J., Baran J., Callahan A., Chepelev L., Cruz-Toledo J., Del Rio N. R., Duck G., Furlong L. I., Keath N., Klassen D., McCusker J. P., Queralt-Rosinach N., Samwald M., Villanueva-Rosales N., Wilkinson M. D., Hoehndorf R.
