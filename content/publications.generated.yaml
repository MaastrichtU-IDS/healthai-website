  abstract: Purpose Decision-making structures are commonly associated with the logistics challenges experienced during disaster operations. However, the alignment between the operational level and the decision-making structure is commonly overlooked. The purpose of this paper is to provide an analysis of the fit of both levels and its impact on performance. Design/methodology/approach The research is developed around a case study in Mexico. Through a review of the disaster management policy in the country, interviews and secondary data, the paper provides an analysis of the current decision-making structure, the logistics activities undertaken by authorities and the impact of the alignment between both components on logistics performance. Findings The analysis suggests that several of the challenges commonly associated with centralisation are actually rooted on its alignment with the operational level. The logistics performance is negatively affected by faulty assumptions, poorly planned procedures, inconsistent decision-making and poorly designed structures. The case showed the need to align the operational level with a centralised perspective to increase responsiveness, flexibility and the interaction between different organisations. Originality/value This paper identifies the impact of the misalignment between the decision-making structure and the operational level on logistics performance, an area currently understudied. It moves from the current argument about the appropriate decision-making structure for disaster management to the identification of components to implement an efficient and effective disaster management system. Additionally, this paper provides recommendations for best practices in humanitarian logistics, which are applicable to Mexico and other countries using a centralised decision-making approach.
  summary: This research analyzes how alignment between the operational level and decision-making structure impacts logistics performance during disaster operations in Mexico. It identifies misalignment as causing poor assumptions, poorly planned procedures, inconsistent decisions, and poorly designed structures, leading to negative effects on logistics performance. The findings suggest that aligning the operational level with a centralised perspective can improve responsiveness, flexibility, and coordination among different organizations, which is crucial for effective disaster management.
