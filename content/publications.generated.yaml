  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: 'Abstract In haemostasis and thrombosis, platelet, coagulation and anticoagulation pathways act together to produce fibrin-containing thrombi. We developed a microspot-based technique, in which we assessed platelet adhesion, platelet activation, thrombus structure and fibrin clot formation in real time using flowing whole blood. Microspots were made from distinct platelet-adhesive surfaces in the absence or presence of tissue factor, thrombomodulin or activated protein C. Kinetics of platelet activation, thrombus structure and fibrin formation were assessed by fluorescence microscopy. This work revealed: ( 1 ) a priming role of platelet adhesion in thrombus contraction and subsequent fibrin formation; ( 2 ) a surface-independent role of tissue factor, independent of the shear rate; ( 3 ) a mechanism of tissue factor-enhanced activation of the intrinsic coagulation pathway; ( 4 ) a local, suppressive role of the anticoagulant thrombomodulin/protein C pathway under flow. Multiparameter analysis using blood samples from patients with (anti)coagulation disorders indicated characteristic defects in thrombus formation, in cases of factor V, XI or XII deficiency; and in contrast, thrombogenic effects in patients with factor V-Leiden. Taken together, this integrative phenotyping approach of platelet–fibrin thrombus formation has revealed interaction mechanisms of platelet-primed key haemostatic pathways with alterations in patients with (anti)coagulation defects. It can help as an important functional add-on whole-blood phenotyping.'
  summary: Researchers developed a microspot-based technique to assess platelet adhesion, activation, thrombus structure, and fibrin clot formation in real-time using flowing whole blood. This method revealed the priming role of platelet adhesion in thrombus contraction and subsequent fibrin formation, as well as the surface-independent role of tissue factor and its mechanism of enhancing the intrinsic coagulation pathway under flow. The technique can help identify defects in thrombus formation in patients with (anti)coagulation disorders and provide a functional add-on whole-blood phenotyping method for platelet-fibrin thrombus formation interactions.
