  tags: []
  abstract: 'Background: This study addresses the complexities of utilizing blockchain technology in healthcare, aiming to provide a decision-making tool for healthcare professionals and policymakers evaluating blockchain’s suitability for healthcare data sharing applications. Methods: A tertiary review was conducted on existing systematic literature reviews concerning blockchain in the healthcare domain. Reviews that focused on data sharing were selected, and common key factors assessing blockchain’s suitability in healthcare were extracted. Results: Our review synthesized findings from 27 systematic literature reviews, which led to the development of a refined decision-making flowchart. This tool outlines criteria such as scalability, integrity/immutability, interoperability, transparency, patient involvement, cost, and public verifiability, essential for assessing the suitability of blockchain in healthcare data sharing. This flowchart was validated through multiple case studies from various healthcare domains, testing its utility in real-world scenarios. Discussion: Blockchain technology could significantly benefit healthcare data sharing, provided its application is carefully evaluated against tailored criteria for healthcare needs. The decision-making flowchart developed from this review offers a systematic approach to assist stakeholders in navigating the complexities of implementing blockchain technology in healthcare settings.'
  summary: This study synthesized findings from 27 systematic literature reviews on blockchain's suitability for healthcare data sharing, developing a refined decision-making flowchart with criteria such as scalability, integrity/immutability, interoperability, transparency, patient involvement, cost, and public verifiability. The tool was validated through multiple case studies, offering stakeholders a systematic approach to assessing the suitability of blockchain technology in healthcare settings.
