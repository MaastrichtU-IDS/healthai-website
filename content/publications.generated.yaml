- year: 2011
  type: Journal
  title: Building an HIV data mashup using Bio2RDF
  authors: Nolin M., Dumontier M., Belleau F., Corbeil J.
  venue: Briefings in Bioinformatics
  doi: 10.1093/bib/bbr003
  citations: 11
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: We present an update to the Bio2RDF Linked Data Network, which now comprises ∼30 billion statements across 30 data sets. Significant changes to the framework include the accommodation of global mirrors, offline data processing and new search and integration services. The utility of this new network of knowledge is illustrated through a Bio2RDF-based mashup with microarray gene expression results and interaction data obtained from the HIV-1, Human Protein Interaction Database (HHPID) with respect to the infection of human macrophages with the human immunodeficiency virus type 1 (HIV-1).
  summary: This research updates Bio2RDF's Linked Data Network by adding more statements across 30 data sets and introducing new services. It demonstrates the network's utility through a mashup using microarray gene expression and HIV-1 interaction data, showing how it can be used to analyze human macrophage infection with HIV-1.
- year: 2011
  type: Journal
  title: 'Chemical Entity Semantic Specification: Knowledge representation for efficient semantic cheminformatics and facile data integration'
  authors: Chepelev L. L., Dumontier M.
  venue: Journal of Cheminformatics
  doi: 10.1186/1758-2946-3-20
  citations: 19
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background Over the past several centuries, chemistry has permeated virtually every facet of human lifestyle, enriching fields as diverse as medicine, agriculture, manufacturing, warfare, and electronics, among numerous others. Unfortunately, application-specific, incompatible chemical information formats and representation strategies have emerged as a result of such diverse adoption of chemistry. Although a number of efforts have been dedicated to unifying the computational representation of chemical information, disparities between the various chemical databases still persist and stand in the way of cross-domain, interdisciplinary investigations. Through a common syntax and formal semantics, Semantic Web technology offers the ability to accurately represent, integrate, reason about and query across diverse chemical information. Results Here we specify and implement the Chemical Entity Semantic Specification (CHESS) for the representation of polyatomic chemical entities, their substructures, bonds, atoms, and reactions using Semantic Web technologies. CHESS provides means to capture aspects of their corresponding chemical descriptors, connectivity, functional composition, and geometric structure while specifying mechanisms for data provenance. We demonstrate that using our readily extensible specification, it is possible to efficiently integrate multiple disparate chemical data sources, while retaining appropriate correspondence of chemical descriptors, with very little additional effort. We demonstrate the impact of some of our representational decisions on the performance of chemically-aware knowledgebase searching and rudimentary reaction candidate selection. Finally, we provide access to the tools necessary to carry out chemical entity encoding in CHESS, along with a sample knowledgebase. Conclusions By harnessing the power of Semantic Web technologies with CHESS, it is possible to provide a means of facile cross-domain chemical knowledge integration with full preservation of data correspondence and provenance. Our representation builds on existing cheminformatics technologies and, by the virtue of RDF specification, remains flexible and amenable to application- and domain-specific annotations without compromising chemical data integration. We conclude that the adoption of a consistent and semantically-enabled chemical specification is imperative for surviving the coming chemical data deluge and supporting systems science research.
  summary: Researchers developed CHESS, a Semantic Web technology-based representation system for polyatomic chemical entities, substructures, bonds, atoms, and reactions. This approach aims to unify diverse chemical databases by accurately representing, integrating, reasoning about, and querying across them efficiently while preserving data correspondence and provenance.
- year: 2011
  type: Journal
  title: Consensus-Phenotype Integration of Transcriptomic and Metabolomic Data Implies a Role for Metabolism in the Chemosensitivity of Tumour Cells
  authors: Cavill R., Kamburov A., Ellis J. K., Athersuch T. J., Blagrove M. S. C., Herwig R., Ebbels T. M. D., Keun H. C.
  venue: PLoS Computational Biology
  doi: 10.1371/journal.pcbi.1001113
  citations: 80
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Using transcriptomic and metabolomic measurements from the NCI60 cell line panel, together with a novel approach to integration of molecular profile data, we show that the biochemical pathways associated with tumour cell chemosensitivity to platinum-based drugs are highly coincident, i.e. they describe a consensus phenotype. Direct integration of metabolome and transcriptome data at the point of pathway analysis improved the detection of consensus pathways by 76%, and revealed associations between platinum sensitivity and several metabolic pathways that were not visible from transcriptome analysis alone. These pathways included the TCA cycle and pyruvate metabolism, lipoprotein uptake and nucleotide synthesis by both salvage and de novo pathways. Extending the approach across a wide panel of chemotherapeutics, we confirmed the specificity of the metabolic pathway associations to platinum sensitivity. We conclude that metabolic phenotyping could play a role in predicting response to platinum chemotherapy and that consensus-phenotype integration of molecular profiling data is a powerful and versatile tool for both biomarker discovery and for exploring the complex relationships between biological pathways and drug response.
  summary: Researchers used transcriptomic and metabolomic measurements from the NCI60 cell line panel combined with a novel approach to integrate molecular profile data to identify consensus phenotypes associated with tumour chemosensitivity to platinum-based drugs, revealing metabolic pathways previously undetected in transcriptome analysis alone. This method improved pathway detection by 76% and confirmed specific associations between these pathways and platinum sensitivity across various chemotherapeutics, suggesting a role for metabolic profiling in predicting response to platinum chemotherapy and as a versatile tool for biomarker discovery and exploring complex relationships between biological pathways and drug response.
- year: 2011
  type: Journal
  title: Controlled vocabularies and semantics in systems biology
  authors: Courtot M., Juty N., Knüpfer C., Waltemath D., Zhukova A., Dräger A., Dumontier M., Finney A., Golebiewski M., Hastings J., Hoops S., Keating S., Kell D. B., Kerrien S., Lawson J., Lister A., Lu J., Machne R., Mendes P., Pocock M., Rodriguez N., Villeger A., Wilkinson D. J., Wimalaratne S., Laibe C., Hucka M., Le Novère N.
  venue: Molecular Systems Biology
  doi: 10.1038/msb.2011.77
  citations: 247
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: The use of computational modeling to describe and analyze biological systems is at the heart of systems biology. Model structures, simulation descriptions and numerical results can be encoded in structured formats, but there is an increasing need to provide an additional semantic layer. Semantic information adds meaning to components of structured descriptions to help identify and interpret them unambiguously. Ontologies are one of the tools frequently used for this purpose. We describe here three ontologies created specifically to address the needs of the systems biology community. The Systems Biology Ontology (SBO) provides semantic information about the model components. The Kinetic Simulation Algorithm Ontology (KiSAO) supplies information about existing algorithms available for the simulation of systems biology models, their characterization and interrelationships. The Terminology for the Description of Dynamics (TEDDY) categorizes dynamical features of the simulation results and general systems behavior. The provision of semantic information extends a model's longevity and facilitates its reuse. It provides useful insight into the biology of modeled processes, and may be used to make informed decisions on subsequent simulation experiments.
  summary: 'Researchers created three ontologies specifically for the systems biology community: SBO (Semantic Information About Model Components), KiSAO (Kinetic Simulation Algorithm Ontology), and TEDDY (Terminology for the Description of Dynamics). These ontologies provide semantic information to help identify and interpret model components, algorithms, and simulation results more unambiguously. This extends a model''s longevity and reuse, provides useful insight into modeled processes, and can inform decisions on subsequent experiments.'
