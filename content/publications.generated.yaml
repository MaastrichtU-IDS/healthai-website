  title: 'Identifiers for the 21st century: How to design, provision, and reuse persistent identifiers to maximize utility and impact of life science data'
  authors: McMurry J. A., Juty N., Blomberg N., Burdett T., Conlin T., Conte N., Courtot M., Deck J., Dumontier M., Fellows D. K., Gonzalez-Beltran A., Gormanns P., Grethe J., Hastings J., Hermjakob H., Hériché J., Ison J. C., Jimenez R. C., Jupp S., Kunze J., Laibe C., Le Novère N., Malone J., Martin M. J., McEntyre J. R., Morris C., Muilu J., Müller W., Rocca-Serra P., Sansone S., Sariyar M., Snoep J. L., Stanford N. J., Soiland-Reyes S., Swainston N., Washington N., Williams A. R., Wimalaratne S., Winfree L., Wolstencroft K., Goble C., Mungall C. J., Haendel M. A., Parkinson H.
