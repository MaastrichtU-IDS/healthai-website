  tags: []
  abstract: 'Abstract Assays measuring platelet aggregation (thrombus formation) at arterial shear rate mostly use collagen as only platelet-adhesive surface. Here we report a multi-surface and multi-parameter flow assay to characterize thrombus formation in whole blood from healthy subjects and patients with platelet function deficiencies. A systematic comparison is made of 52 adhesive surfaces with components activating the main platelet-adhesive receptors, and of eight output parameters reflecting distinct stages of thrombus formation. Three types of thrombus formation can be identified with a predicted hierarchy of the following receptors: glycoprotein (GP)VI, C-type lectin-like receptor-2 (CLEC-2)&gt;GPIb&gt;α 6 β 1 , α IIb β 3 &gt;α 2 β 1 &gt;CD36, α 5 β 1 , α v β 3 . Application with patient blood reveals distinct abnormalities in thrombus formation in patients with severe combined immune deficiency, Glanzmann’s thrombasthenia, Hermansky–Pudlak syndrome, May–Hegglin anomaly or grey platelet syndrome. We suggest this test may be useful for the diagnosis of patients with suspected bleeding disorders or a pro-thrombotic tendency.'
  summary: This study developed a new method to measure how well different surfaces promote blood clotting in whole blood from healthy people and those with various blood clotting problems. The results showed that some clotting factors are more important than others, like GPVI, CLEC-2, GPIbα6β1, αIIbβ3, etc., and this can help doctors diagnose certain bleeding or clotting issues.
