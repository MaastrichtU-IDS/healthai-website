  authors: Fecho K., Thessen A. E., Baranzini S. E., Bizon C., Hadlock J. J., Huang S., Roper R. T., Southall N., Ta C., Watkins P. B., Williams M. D., Xu H., Byrd W., Dančík V., Duby M. P., Dumontier M., Glusman G., Harris N. L., Hinderer E. W., Hyde G., Johs A., Su A. I., Qin G., Zhu Q.
