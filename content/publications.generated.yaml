  tags: []
  abstract: Background Repetitive atrial activation patterns (RAAPs) during atrial fibrillation (AF) may be associated with localized mechanisms that maintain AF. Current electro-anatomical mapping systems are unsuitable for analyzing RAAPs due to the trade-off between spatial coverage and electrode density in clinical catheters. This work proposes a technique to overcome this trade-off by constructing composite maps from spatially overlapping sequential recordings. Methods High-density epicardial contact mapping was performed during open-chest surgery in goats (n=16, left and right atria) with 3 or 22 weeks of sustained AF (249-electrode array, electrode distance 2.4 mm). A dataset mimicking sequential recordings was generated by segmenting the grid into four spatially overlapping regions (each region 6.5 cm 2 , 48±10% overlap) without temporal overlap. RAAPs were detected in each region using recurrence plots of activation times. RAAPs in two different regions were joined in case of RAAP cross-recurrence between overlapping electrodes. We quantified the reconstruction success rate and quality of the composite maps. Results Of 1021 RAAPs found in the full mapping array (32±13 per recording), 328 spatiotemporally stable RAAPs were analyzed. 247 composite maps were generated (75% success) with a quality of 0.86±0.21 (Pearson correlation). Success was significantly affected by the RAAP area. Quality was weakly correlated with the number of repetitions of RAAPs (r=0.13, p Conclusions Constructing composite maps by combining spatially overlapping sequential recordings is feasible. Interpretation of these maps can play a central role in ablation planning.
  summary: Researchers developed a technique to analyze repetitive atrial activation patterns during AF using high-density epicardial contact mapping data from goats with sustained AF. They created composite maps from spatially overlapping regions without temporal overlap, resulting in 247 successful composite maps with a quality of 0.86 and significantly affected by the RAAP area. This method can aid ablation planning by interpreting these maps.
