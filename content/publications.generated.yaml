  tags: []
  abstract: The collection of medical data for research purposes is a challenging and long-lasting process. In an effort to accelerate and facilitate this process we propose a new framework for dynamic aggregation of medical data from distributed sources. We use agent-based coordination between medical and research institutions. Our system employs principles of peer-to-peer network organization and coordination models to search over already constructed distributed databases and to identify the potential contributors when a new database has to be built. Our framework takes into account both the requirements of a research study and current data availability. This leads to better definition of database characteristics such as schema, content, and privacy parameters. We show that this approach enables a more efficient way to collect data for medical research.
  summary: A new framework is proposed to dynamically aggregate medical data from distributed sources using agent-based coordination between medical and research institutions. The system searches over existing databases and identifies potential contributors when building a new database, considering both study requirements and current availability. This approach leads to better-defined database characteristics such as schema, content, and privacy parameters, enabling more efficient data collection for medical research.
