  title: A novel framework for noninvasive analysis of short-term atrial activity dynamics during persistent atrial fibrillation
  authors: Bonizzi P., Meste O., Zeemering S., Karel J., Lankveld T., Crijns H., Schotten U., Peeters R.
  venue: Medical &amp; Biological Engineering &amp; Computing
