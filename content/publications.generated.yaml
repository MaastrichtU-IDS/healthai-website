  title: Evaluation of Spray Application Techniques and Air Induction Nozzles as Spray Drift Mitigation Measures in Vineyards
  authors: Bourodimos G., Koutsiaras M., Psiroukis V., Kasimati A., Fountas S.
  venue: AgriEngineering
  doi: 10.3390/agriengineering8040132
  citations: 0
  orcids:
  - 0000-0002-7620-3782
  tags: []
  abstract: Spray drift is one of the most significant challenges in the application of Plant Protection Products (PPPs), as it contributes to water, soil, and food contamination and is highly associated with health risks to agricultural workers, bystanders, and rural residents. Spray drift is defined as the fraction of PPP that is carried away from the target area by air currents during application. Factors such as high wind speeds, low relative humidity, and elevated temperatures increase the risk of drift by promoting droplet evaporation and off-target movement. Technological advancements in spraying equipment, such as low-drift and air induction nozzles, have been shown to significantly reduce drift potential. Air induction nozzles mix air with the spray liquid, creating larger droplets that are less susceptible to drift. The primary objective of this study was to quantify the spray drift reduction achieved using cost-effective and easily applicable drift mitigation techniques that do not require specialized and expensive equipment compared to conventional application methods in vineyards under Southern European conditions. Field measurements followed the ISO 22866:2005 protocol, using a conventional axial fan air-assisted sprayer that is commonly used by vineyard farmers in Greece. This study was conducted on Savatiano vines, the most widely cultivated winemaking variety in the Attica region, characterized by its low height. The spraying techniques evaluated as spray drift mitigation measures were one-sided spraying applications of the outer vineyard row; one-sided spraying applications of the two last rows; spraying with closed air assistance on the outer rows; and finally, spraying with the use of air induction nozzles. Results indicated that each technique produced varying amounts of sedimenting drift over distance. Spraying without air assistance consistently generated the lowest levels of drift at almost all distances. While air induction nozzles initially increased drift deposition within the first 4 m, they significantly reduced drift beyond 5 m. These findings demonstrate that simple operational adjustments to conventional vineyard sprayers, particularly reducing or switching off air assistance in outer rows, can substantially decrease spray drift without requiring additional investment in specialized equipment. Overall, spraying without air support achieved the greatest drift reduction across all distances from the vineyard, followed by air induction nozzles, which were equally effective at further distances (past 5 m) but less so near the application area. The results provide practical guidance for vineyard growers seeking low-cost strategies to minimize agricultural input losses, environmental contamination, and improve the sustainability of pesticide applications.
  summary: This study quantified spray drift reduction achieved using simple operational adjustments to conventional vineyard sprayers, particularly reducing or switching off air assistance in outer rows, compared to conventional application methods. Results showed that spraying without air support produced the lowest levels of drift at almost all distances, with air induction nozzles being equally effective beyond 5 m but less so near the application area. These findings provide practical guidance for vineyard growers seeking low-cost strategies to minimize agricultural input losses and improve pesticide applications' sustainability.
