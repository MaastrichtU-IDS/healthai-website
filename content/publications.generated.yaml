  title: Automated Generation of Core Outcome Measures for Clinical Trials
  authors: Elghafari A., Finkelstein J.
  venue: Studies in Health Technology and Informatics
  doi: 10.3233/shti210784
  citations: 1
  orcids:
  - 0000-0001-5335-9998
  tags: []
  abstract: Common outcome sets are vital for ensuring usability of clinical trial results and enabling inter-study comparisons. The task of identifying clinical outcomes for a particular field is cumbersome and time-consuming. The aim of this work was to develop an automated pipeline for identifying common outcomes by analyzing outcomes from relevant trials reported at ClinicalTrials.gov and to assess the pipeline accuracy. We validated the output of our pipeline by comparing the outcomes it identified for acute coronary syndromes and coronary artery disease with the set of outcomes recommended for these conditions by a panel of experts in a widely cited report. We found that our pipeline identified the same or similar outcomes for 100% of the outcomes recommended in the experts’ report. The coverage of the pipeline’s results dropped only slightly (to 21 out of 23 outcome domains, 91%) when we restricted the pipeline to trials posted before the publication of the report, indicating a great potential for this pipeline to be used in aiding and informing the future development of core outcome measures in clinical trials.
  summary: This research developed an automated pipeline that identifies common outcomes for specific medical fields by analyzing data from ClinicalTrials.gov. The pipeline was validated against expert recommendations and found 100% agreement on recommended outcomes, with minor coverage issues when restricted to older studies, indicating high potential for future use in core outcome measures development.
- year: 2021
  type: Journal
  title: 'Automated Identification of Common Disease-Specific Outcomes for Comparative Effectiveness Research Using ClinicalTrials.gov: Algorithm Development and Validation Study'
  authors: Elghafari A., Finkelstein J.
  venue: JMIR Medical Informatics
  doi: 10.2196/18298
  citations: 7
  orcids:
  - 0000-0001-5335-9998
  tags: []
  abstract: Background Common disease-specific outcomes are vital for ensuring comparability of clinical trial data and enabling meta analyses and interstudy comparisons. Traditionally, the process of deciding which outcomes should be recommended as common for a particular disease relied on assembling and surveying panels of subject-matter experts. This is usually a time-consuming and laborious process. Objective The objectives of this work were to develop and evaluate a generalized pipeline that can automatically identify common outcomes specific to any given disease by finding, downloading, and analyzing data of previous clinical trials relevant to that disease. Methods An automated pipeline to interface with ClinicalTrials.gov’s application programming interface and download the relevant trials for the input condition was designed. The primary and secondary outcomes of those trials were parsed and grouped based on text similarity and ranked based on frequency. The quality and usefulness of the pipeline’s output were assessed by comparing the top outcomes identified by it for chronic obstructive pulmonary disease (COPD) to a list of 80 outcomes manually abstracted from the most frequently cited and comprehensive reviews delineating clinical outcomes for COPD. Results The common disease-specific outcome pipeline successfully downloaded and processed 3876 studies related to COPD. Manual verification indicated that the pipeline was downloading and processing the same number of trials as were obtained from the self-service ClinicalTrials.gov portal. Evaluating the automatically identified outcomes against the manually abstracted ones showed that the pipeline achieved a recall of 92% and precision of 79%. The precision number indicated that the pipeline was identifying many outcomes that were not covered in the literature reviews. Assessment of those outcomes indicated that they are relevant to COPD and could be considered in future research. Conclusions An automated evidence-based pipeline can identify common clinical trial outcomes of comparable breadth and quality as the outcomes identified in comprehensive literature reviews. Moreover, such an approach can highlight relevant outcomes for further consideration.
  summary: This study developed a pipeline that automatically identifies common disease-specific outcomes from previous clinical trials related to COPD using text similarity and frequency ranking. The pipeline successfully downloaded 3876 studies and achieved a recall of 92% and precision of 79% when compared to manually abstracted outcomes, highlighting relevant outcomes for future research.
