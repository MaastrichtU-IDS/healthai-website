  abstract: Abstract WikiPathways (wikipathways.org) is an open-source biological pathway database. Collaboration and open science are pivotal to the success of WikiPathways. Here we highlight the continuing efforts supporting WikiPathways, content growth and collaboration among pathway researchers. As an evolving database, there is a growing need for WikiPathways to address and overcome technical challenges. In this direction, WikiPathways has undergone major restructuring, enabling a renewed approach for sharing and curating pathway knowledge, thus providing stability for the future of community pathway curation. The website has been redesigned to improve and enhance user experience. This next generation of WikiPathways continues to support existing features while improving maintainability of the database and facilitating community input by providing new functionality and leveraging automation.
  summary: This paper highlights the ongoing efforts to support, grow, and collaborate on WikiPathways, an open-source biological pathway database that emphasizes collaboration and open science principles. The research discusses how WikiPathways has undergone major restructuring to address technical challenges and improve user experience while maintaining stability for future community curation.
