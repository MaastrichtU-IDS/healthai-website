  abstract: Abstract Rheumatoid arthritis (RA) affects millions world-wide. While anti-TNF treatment is widely used to reduce disease progression, treatment fails in ∼one-third of patients. No biomarker currently exists that identifies non-responders before treatment. A rigorous community-based assessment of the utility of SNP data for predicting anti-TNF treatment efficacy in RA patients was performed in the context of a DREAM Challenge ( http://www.synapse.org/RA_Challenge ). An open challenge framework enabled the comparative evaluation of predictions developed by 73 research groups using the most comprehensive available data and covering a wide range of state-of-the-art modelling methodologies. Despite a significant genetic heritability estimate of treatment non-response trait ( h 2 =0.18, P value=0.02), no significant genetic contribution to prediction accuracy is observed. Results formally confirm the expectations of the rheumatology community that SNP information does not significantly improve predictive performance relative to standard clinical traits, thereby justifying a refocusing of future efforts on collection of other data.
  summary: A study evaluated the utility of single nucleotide polymorphisms (SNPs) for predicting treatment response in patients with rheumatoid arthritis using a community-based challenge framework. Despite high genetic heritability estimates and state-of-the-art modeling methodologies, SNPs did not significantly improve prediction accuracy over clinical traits, suggesting that other data sources may be more effective.
