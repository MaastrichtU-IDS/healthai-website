  title: Hybrid quantum singular spectrum decomposition for time series analysis
  authors: Postema J. J., Bonizzi P., Koekoek G., Westra R. L., Kokkelmans S. J. J. M. F.
  venue: AVS Quantum Science
  doi: 10.1116/5.0139846
  citations: 2
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: Classical data analysis requires computational efforts that become intractable in the age of Big Data. An essential task in time series analysis is the extraction of physically meaningful information from a noisy time series. One algorithm devised for this very purpose is singular spectrum decomposition (SSD), an adaptive method that allows for the extraction of narrow-banded components from non-stationary and non-linear time series. The main computational bottleneck of this algorithm is the singular value decomposition (SVD). Quantum computing could facilitate a speedup in this domain through superior scaling laws. We propose quantum SSD by assigning the SVD subroutine to a quantum computer. The viability for implementation and performance of this hybrid algorithm on a near term hybrid quantum computer is investigated. In this work, we show that by employing randomized SVD, we can impose a qubit limit on one of the circuits to improve scalibility. Using this, we efficiently perform quantum SSD on simulations of local field potentials recorded in brain tissue, as well as GW150914, the first detected gravitational wave event.
  summary: Researchers propose Quantum Singular Spectrum Decomposition (QSSD), an algorithm that uses quantum computing to speed up singular value decomposition for time series analysis, specifically for extracting narrow-banded components from noisy data. This approach could significantly reduce computational costs in analyzing large datasets and has been demonstrated on simulations of brain tissue local field potentials and the first gravitational wave event detected by LIGO.
