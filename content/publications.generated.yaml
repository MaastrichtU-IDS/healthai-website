  title: A Combination of Transcriptomics and Metabolomics Uncovers Enhanced Bile Acid Biosynthesis in HepG2 Cells Expressing CCAAT/Enhancer-Binding Protein β (C/EBPβ), Hepatocyte Nuclear Factor 4α (HNF4α), and Constitutive Androstane Receptor (CAR)
  authors: Blazquez M., Carretero A., Ellis J. K., Athersuch T. J., Cavill R., Ebbels T. M. D., Keun H. C., Castell J. V., Lahoz A., Bort R.
  venue: Journal of Proteome Research
