  title: 'Developing a framework for digital objects in the Big Data to Knowledge (BD2K) commons: Report from the Commons Framework Pilots workshop'
  authors: Jagodnik K. M., Koplev S., Jenkins S. L., Ohno-Machado L., Paten B., Schurer S. C., Dumontier M., Verborgh R., Bui A., Ping P., McKenna N. J., Madduri R., Pillai A., Ma'ayan A.
  venue: Journal of Biomedical Informatics
