  title: The center for expanded data annotation and retrieval
  authors: Musen M. A., Bean C. A., Cheung K., Dumontier M., Durante K. A., Gevaert O., Gonzalez-Beltran A., Khatri P., Kleinstein S. H., O’Connor M. J., Pouliot Y., Rocca-Serra P., Sansone S., Wiser J. A.
  venue: Journal of the American Medical Informatics Association
