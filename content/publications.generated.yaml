  authors: Ostaszewski M., Niarakis A., Mazein A., Kuperstein I., Phair R., Orta‐Resendiz A., Singh V., Aghamiri S. S., Acencio M. L., Glaab E., Ruepp A., Fobo G., Montrone C., Brauner B., Frishman G., Monraz Gómez L. C., Somers J., Hoch M., Kumar Gupta S., Scheel J., Borlinghaus H., Czauderna T., Schreiber F., Montagud A., Ponce de Leon M., Funahashi A., Hiki Y., Hiroi N., Yamada T. G., Dräger A., Renz A., Naveez M., Bocskei Z., Messina F., Börnigen D., Fergusson L., Conti M., Rameil M., Nakonecnij V., Vanhoefer J., Schmiester L., Wang M., Ackerman E. E., Shoemaker J. E., Zucker J., Oxford K., Teuton J., Kocakaya E., Summak G. Y., Hanspers K., Kutmon M., Coort S., Eijssen L., Ehrhart F., Rex D. A. B., Slenter D., Martens M., Pham N., Haw R., Jassal B., Matthews L., Orlic‐Milacic M., Senff-Ribeiro A., Rothfels K., Shamovsky V., Stephan R., Sevilla C., Varusai T., Ravel J., Fraser R., Ortseifen V., Marchesi S., Gawron P., Smula E., Heirendt L., Satagopam V., Wu G., Riutta A., Golebiewski M., Owen S., Goble C., Hu X., Overall R. W., Maier D., Bauch A., Gyori B. M., Bachman J. A., Vega C., Grouès V., Vazquez M., Porras P., Licata L., Iannuccelli M., Sacco F., Nesterova A., Yuryev A., de Waard A., Turei D., Luna A., Babur O., Soliman S., Valdeolivas A., Esteban‐Medina M., Peña‐Chilet M., Rian K., Helikar T., Puniya B. L., Modos D., Treveil A., Olbei M., De Meulder B., Ballereau S., Dugourd A., Naldi A., Noël V., Calzone L., Sander C., Demir E., Korcsmaros T., Freeman T. C., Augé F., Beckmann J. S., Hasenauer J., Wolkenhauer O., Willighagen E. L., Pico A. R., Evelo C. T., Gillespie M. E., Stein L. D., Hermjakob H., D'Eustachio P., Saez‐Rodriguez J., Dopazo J., Valencia A., Kitano H., Barillot E., Auffray C., Balling R., Schneider R.
  venue: Molecular Systems Biology
