  title: Integrated pathway-level analysis of transcriptomics and metabolomics data with IMPaLA
  authors: Kamburov A., Cavill R., Ebbels T. M. D., Herwig R., Keun H. C.
  venue: Bioinformatics
  doi: 10.1093/bioinformatics/btr499
  citations: 365
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: 'Abstract Summary:Pathway-level analysis is a powerful approach enabling interpretation of post-genomic data at a higher level than that of individual biomolecules. Yet, it is currently hard to integrate more than one type of omics data in such an approach. Here, we present a web tool ‘IMPaLA’ for the joint pathway analysis of transcriptomics or proteomics and metabolomics data. It performs over-representation or enrichment analysis with user-specified lists of metabolites and genes using over 3000 pre-annotated pathways from 11 databases. As a result, pathways can be identified that may be disregulated on the transcriptional level, the metabolic level or both. Evidence of pathway disregulation is combined, allowing for the identification of additional pathways with changed activity that would not be highlighted when analysis is applied to any of the functional levels alone. The tool has been implemented both as an interactive website and as a web service to allow a programming interface. Availability:The web interface of IMPaLA is available at http://impala.molgen.mpg.de. A web services programming interface is provided at http://impala.molgen.mpg.de/wsdoc. Contact: kamburov@molgen.mpg.de; r.cavill@imperial.ac.uk; h.keun@imperial.ac.uk Supplementary Information: Supplementary data are available at Bioinformatics online.'
  summary: The IMPaLA tool integrates transcriptomics, proteomics, and metabolomics data to identify pathways that may be regulated on the transcriptional, metabolic, or both levels, providing a comprehensive view of biological processes affected by omics data.
- year: 2011
  type: Journal
  title: Integrating systems biology models and biomedical ontologies
  authors: Hoehndorf R., Dumontier M., Gennari J. H., Wimalaratne S., de Bono B., Cook D. L., Gkoutos G. V.
  venue: BMC Systems Biology
  doi: 10.1186/1752-0509-5-124
  citations: 40
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background Systems biology is an approach to biology that emphasizes the structure and dynamic behavior of biological systems and the interactions that occur within them. To succeed, systems biology crucially depends on the accessibility and integration of data across domains and levels of granularity. Biomedical ontologies were developed to facilitate such an integration of data and are often used to annotate biosimulation models in systems biology. Results We provide a framework to integrate representations of in silico systems biology with those of in vivo biology as described by biomedical ontologies and demonstrate this framework using the Systems Biology Markup Language. We developed the SBML Harvester software that automatically converts annotated SBML models into OWL and we apply our software to those biosimulation models that are contained in the BioModels Database. We utilize the resulting knowledge base for complex biological queries that can bridge levels of granularity, verify models based on the biological phenomenon they represent and provide a means to establish a basic qualitative layer on which to express the semantics of biosimulation models. Conclusions We establish an information flow between biomedical ontologies and biosimulation models and we demonstrate that the integration of annotated biosimulation models and biomedical ontologies enables the verification of models as well as expressive queries. Establishing a bi-directional information flow between systems biology and biomedical ontologies has the potential to enable large-scale analyses of biological systems that span levels of granularity from molecules to organisms.
  summary: Researchers developed a framework for integrating in silico systems biology with in vivo biology using biomedical ontologies, demonstrating it through SBML Harvester software applied to BioModels Database models. This integration enables verifying models based on their biological phenomenon and provides a basic qualitative layer for expressing the semantics of biosimulation models.
- year: 2011
  type: Journal
  title: Integration and publication of heterogeneous text-mined relationships on the Semantic Web
  authors: Coulet A., Garten Y., Dumontier M., Altman R. B., Musen M. A., Shah N. H.
  venue: Journal of Biomedical Semantics
  doi: 10.1186/2041-1480-2-s2-s10
  citations: 24
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Abstract Background Advances in Natural Language Processing (NLP) techniques enable the extraction of fine-grained relationships mentioned in biomedical text. The variability and the complexity of natural language in expressing similar relationships causes the extracted relationships to be highly heterogeneous, which makes the construction of knowledge bases difficult and poses a challenge in using these for data mining or question answering. Results We report on the semi-automatic construction of the PHARE relationship ontology (the PHArmacogenomic RElationships Ontology) consisting of 200 curated relations from over 40,000 heterogeneous relationships extracted via text-mining. These heterogeneous relations are then mapped to the PHARE ontology using synonyms, entity descriptions and hierarchies of entities and roles. Once mapped, relationships can be normalized and compared using the structure of the ontology to identify relationships that have similar semantics but different syntax. We compare and contrast the manual procedure with a fully automated approach using WordNet to quantify the degree of integration enabled by iterative curation and refinement of the PHARE ontology. The result of such integration is a repository of normalized biomedical relationships, named PHARE-KB, which can be queried using Semantic Web technologies such as SPARQL and can be visualized in the form of a biological network. Conclusions The PHARE ontology serves as a common semantic framework to integrate more than 40,000 relationships pertinent to pharmacogenomics. The PHARE ontology forms the foundation of a knowledge base named PHARE-KB. Once populated with relationships, PHARE-KB ( i ) can be visualized in the form of a biological network to guide human tasks such as database curation and ( ii ) can be queried programmatically to guide bioinformatics applications such as the prediction of molecular interactions. PHARE is available at http://purl.bioontology.org/ontology/PHARE .
  summary: Researchers developed the PHARE relationship ontology, a curated repository of 200 relationships from over 40,000 heterogeneous biomedical text-mining-derived relations, using WordNet for hierarchical integration and comparison. This ontology serves as a common semantic framework to integrate more than 40,000 pharmacogenomics-related relationships, forming the foundation of PHARE-KB, which can be visualized in a biological network or queried programmatically for bioinformatics applications.
- year: 2011
  type: Journal
  title: Interoperability between Biomedical Ontologies through Relation Expansion, Upper-Level Ontologies and Automatic Reasoning
  authors: Hoehndorf R., Dumontier M., Oellrich A., Rebholz-Schuhmann D., Schofield P. N., Gkoutos G. V.
  venue: PLoS ONE
  doi: 10.1371/journal.pone.0022006
  citations: 30
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Researchers design ontologies as a means to accurately annotate and integrate experimental data across heterogeneous and disparate data- and knowledge bases. Formal ontologies make the semantics of terms and relations explicit such that automated reasoning can be used to verify the consistency of knowledge. However, many biomedical ontologies do not sufficiently formalize the semantics of their relations and are therefore limited with respect to automated reasoning for large scale data integration and knowledge discovery. We describe a method to improve automated reasoning over biomedical ontologies and identify several thousand contradictory class definitions. Our approach aligns terms in biomedical ontologies with foundational classes in a top-level ontology and formalizes composite relations as class expressions. We describe the semi-automated repair of contradictions and demonstrate expressive queries over interoperable ontologies. Our work forms an important cornerstone for data integration, automatic inference and knowledge discovery based on formal representations of knowledge. Our results and analysis software are available at http://bioonto.de/pmwiki.php/Main/ReasonableOntologies.
  summary: Researchers developed a method to improve automated reasoning in biomedical ontologies by aligning terms with foundational classes in a top-level ontology, formalizing composite relations as class expressions, and repairing contradictions through semi-automated means. This approach enables more accurate integration of large-scale data and supports knowledge discovery.
