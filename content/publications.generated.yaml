  title: Finding melanoma drugs through a probabilistic knowledge graph
  authors: McCusker J. P., Dumontier M., Yan R., He S., Dordick J. S., McGuinness D. L.
  venue: PeerJ Computer Science
  doi: 10.7717/peerj-cs.106
  citations: 17
  orcids:
