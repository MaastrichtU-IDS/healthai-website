  title: Validation of polymorphic Gompertzian model of cancer through in vitro and in vivo data
  authors: Soboleva A., Kaznatcheev A., Cavill R., Schneider K., Staňková K.
  venue: PLOS ONE
  doi: 10.1371/journal.pone.0310844
  citations: 4
  orcids:
