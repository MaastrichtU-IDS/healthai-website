  title: Studying the association of diabetes and healthcare cost on distributed data from the Maastricht Study and Statistics Netherlands using a privacy-preserving federated learning infrastructure
  authors: Sun C., van Soest J., Koster A., Eussen S. J., Schram M. T., Stehouwer C. D., Dagnelie P. C., Dumontier M.
