  abstract: Background COPD and asthma cause significant morbidity and mortality across the globe. The development of non-invasive telemonitoring solutions offers the potential to improve patient care. Objective To examine whether breathing and speech patterns extracted from audio recordings enhance model generalizability of distinguishing stable from exacerbation periods in COPD and asthma. Methods Patterns related to breathing and speech were extracted from a dataset that combined daily audio speech recordings with a patient-reported outcome measure (EXACT). Medical experts categorized patient health status as stable or exacerbation. A tree-based model was investigated for exacerbation prediction. The model was trained on signal-related features, breathing and speech patterns, and combination of both. Results were examined for variability among all people and feature importance. Results The study included 21 people (mean age 62.7 years; 66.7% female), 61.9% diagnosed with COPD and 38.1% with asthma. Minimum breath duration and speech duration differed between stable and exacerbation states (p Conclusion Combining signal derived features with breathing and speech patterns helps models to balance performance across metrics. Detected clusters within the study group indicate patient-level variability. Presented results position breathing and speech patterns as valuable tool for remote patient screening.
  summary: Researchers examined how breathing and speech patterns in audio recordings can improve distinguishing between stable and exacerbation periods in COPD and asthma patients, using a tree-based model trained on signal features, breathing, speech, and their combination. The study found that combining these features helps balance performance across metrics and indicates patient-level variability through detected clusters. Breathing and speech patterns are valuable tools for remote patient screening.
