  title: 'Trusty URIs: Verifiable, Immutable, and Permanent Digital Artifacts for Linked Data'
  authors: Kuhn T., Dumontier M.
  venue: Lecture Notes in Computer Science
  doi: 10.1007/978-3-319-07443-6_27
  citations: 19
  orcids:
