  title: Domain-based small molecule binding site annotation
  authors: Snyder K. A., Feldman H. J., Dumontier M., Salama J. J., Hogue C. W.
  venue: BMC Bioinformatics
  doi: 10.1186/1471-2105-7-152
  citations: 22
