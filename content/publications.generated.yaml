  title: 'Privacy preservation in blockchain-based healthcare data sharing: A systematic review'
  authors: Li K., Lohachab A., Dumontier M., Urovi V.
  venue: Peer-to-Peer Networking and Applications
  doi: 10.1007/s12083-025-02148-9
  citations: 7
