  title: Half human, half machine – augmenting service employees with AI for interpersonal emotion regulation
  authors: Henkel A. P., Bromuri S., Iren D., Urovi V.
  venue: Journal of Service Management
  doi: 10.1108/josm-05-2019-0160
  citations: 123
  orcids:
  - 0000-0003-2817-3950
  tags: []
  abstract: Purpose With the advent of increasingly sophisticated AI, the nature of work in the service frontline is changing. The next frontier is to go beyond replacing routine tasks and augmenting service employees with AI. The purpose of this paper is to investigate whether service employees augmented with AI-based emotion recognition software are more effective in interpersonal emotion regulation (IER) and whether and how IER impacts their own affective well-being. Design/methodology/approach For the underlying study, an AI-based emotion recognition software was developed in order to assist service employees in managing customer emotions. A field study based on 2,459 call center service interactions assessed the effectiveness of the AI in augmenting service employees for IER and the immediate downstream consequences for well-being relevant outcomes. Findings Augmenting service employees with AI significantly improved their IER activities. Employees in the AI (vs control) condition were significantly more effective in regulating customer emotions. IER goal attainment, in turn, mediated the effect on employee affective well-being. Perceived stress related to exposure to the AI augmentation acted as a competing mediator. Practical implications Service firms can benefit from state-of-the-art AI technology by focusing on its capacity to augment rather than merely replacing employees. Furthermore, signaling IER goal attainment with the help of technology may provide uplifting consequences for service employee affective well-being. Originality/value The present study is among the first to empirically test the introduction of an AI-fueled technology to augment service employees in handling customer emotions. This paper further complements the literature by investigating IER in a real-life setting and by uncovering goal attainment as a new mechanism underlying the effect of IER on the well-being of the sender.
  summary: This study investigated whether adding AI-based emotion recognition software to frontline service workers improved their ability to regulate customer emotions, which in turn enhanced their own affective well-being. The results showed that employees using the AI were significantly better at managing customer emotions compared to those not using it. This improvement was mediated by higher goal attainment of IER activities and partially explained through reduced stress related to exposure to the technology.
