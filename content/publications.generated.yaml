  tags: []
  abstract: Although lipids are crucial molecules for cell structure, metabolism, and signaling in most organs, they have additional specific functions in the skin. Lipids are required for the maintenance and regulation of the epidermal barrier, physical properties of the skin, and defense against microbes. Analysis of the lipidome-the totality of lipids-is of similar complexity to those of proteomics or other omics, with lipid structures ranging from simple, linear, to highly complex structures. In addition, the ordering and chemical modifications of lipids have consequences on their biological function, especially in the skin. Recent advances in analytic capability (usually with mass spectrometry), bioinformatic processing, and integration with other dermatological big data have allowed researchers to increasingly understand the roles of specific lipid species in skin biology. In this paper, we review the techniques used to analyze skin lipidomics and epilipidomics.
  summary: Researchers analyzed lipids in human skin using advanced analytical methods, revealing their importance for maintaining the skin's barrier function, physical properties, and defense against microbes. This study highlights the complex roles of specific lipid species in skin biology, providing new insights into dermatological research.
