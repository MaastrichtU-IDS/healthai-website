  title: A comprehensive longitudinal study of magnetic resonance imaging identifies novel features of the Mecp2 deficient mouse brain
  authors: Carli S., Chaabane L., De Rocco G., Albizzati E., Sormonta I., Calligaro S., Bonizzi P., Frasca A., Landsberger N.
  venue: Neurobiology of Disease
  doi: 10.1016/j.nbd.2023.106083
