  title: Extending inherited metabolic disorder diagnostics with biomarker interaction visualizations
  authors: Slenter D. N., Hemel I. M. G. M., Evelo C. T., Bierau J., Willighagen E. L., Steinbusch L. K. M.
  venue: Orphanet Journal of Rare Diseases
  doi: 10.1186/s13023-023-02683-9
  citations: 2
