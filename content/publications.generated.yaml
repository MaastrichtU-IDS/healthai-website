  title: 'Predicting biomedical metadata in CEDAR: A study of Gene Expression Omnibus (GEO)'
  authors: Panahiazar M., Dumontier M., Gevaert O.
  venue: Journal of Biomedical Informatics
  doi: 10.1016/j.jbi.2017.06.017
  citations: 13
  orcids:
  - 0000-0003-4727-9435
