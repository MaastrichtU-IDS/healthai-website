  tags: []
  abstract: Abstract Cognitive impairment is a debilitating symptom in Parkinson’s disease (PD). We aimed to establish an accurate multivariate machine learning (ML) model to predict cognitive outcome in newly diagnosed PD cases from the Parkinson’s Progression Markers Initiative (PPMI). Annual cognitive assessments over an 8-year time span were used to define two cognitive outcomes of (i) cognitive impairment, and (ii) dementia conversion. Selected baseline variables were organized into three subsets of clinical, biofluid and genetic/epigenetic measures and tested using four different ML algorithms. Irrespective of the ML algorithm used, the models consisting of the clinical variables performed best and showed better prediction of cognitive impairment outcome over dementia conversion. We observed a marginal improvement in the prediction performance when clinical, biofluid, and epigenetic/genetic variables were all included in one model. Several cerebrospinal fluid measures and an epigenetic marker showed high predictive weighting in multiple models when included alongside clinical variables.
  summary: Researchers developed a machine learning model to predict cognitive outcomes in Parkinson's disease patients using various baseline variables, including clinical, biofluid, and genetic/epigenetic measurements over 8 years. The best-performing model consisted of clinical variables alone, with additional measures showing significant predictive weight when included together.
