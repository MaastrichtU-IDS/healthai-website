  tags: []
  abstract: Increasingly sophisticated knowledge about RNA structure and function requires an inclusive knowledge representation that facilitates the integration of independently -generated information arising from such efforts as genome sequencing projects, microarray analyses, structure determination and RNA SELEX experiments. While RNAML, an XML-based representation, has been proposed as an exchange format for a select subset of information, it lacks domain-specific semantics that are essential for answering questions that require expert knowledge. Here, we describe an RNA knowledge base (RKB) for structure-based knowledge using RDF/OWL Semantic Web technologies. RKB extends a number of ontologies and contains basic terminology for nucleic acid composition along with context/model-specific structural features such as sugar conformations, base pairings and base stackings. RKB (available at http://semanticscience.org/projects/rkb) is populated with PDB entries and MC-Annotate structural annotation. We show queries to the RKB using description logic reasoning, thus opening the door to question answering over independently-published RNA knowledge using Semantic Web technologies.
  summary: Researchers have developed an RDF/OWL-based RNA knowledge base (RKB) that integrates domain-specific semantics for structure-based information from various sources such as genome sequencing projects, microarray analyses, and RNA SELEX experiments. This RKB extends ontologies with context-specific structural features like sugar conformations, base pairings, and stackings, and includes PDB entries and MC-Annotate annotations. The system allows querying this knowledge using description logic reasoning, enabling question answering over independently generated RNA information through Semantic Web technologies.
