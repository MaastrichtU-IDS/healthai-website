  title: Blood-based multivariate methylation risk score for cognitive impairment and dementia
  authors: Koetsier J., Cavill R., Reijnders R., Harvey J., Deckers K., Köhler S., Eijssen L., Smith R. G., Smith A. R., Burrage J., Walker E. M., Shireby G., Hannon E., Dempster E., Frayling T., Mill J., Dobricic V., Sommerer Y., Johannsen P., Wittig M., Franke A., Vandenberghe R., Schaeverbeke J., Freund-Levi Y., Frölich L., Scheltens P., Teunissen C., Frisoni G., Blin O., Richardson J., Bordet R., Engelborghs S., de Roeck E., Martinez-Lage P., Tainta M., Lleó A., Sala I., Popp J., Peyratout G., Verhey F., Tsolaki M., Andreasson U., Blennow K., Zetterberg H., Streffer J., Vos S. J. B., Lovestone S., Visser P., Bertram L., Lunnon K., Pishva E.
