  title: 'The impact of controlled breathing on autonomic nervous system modulation: analysis using phase-rectified signal averaging, entropy and heart rate variability'
  authors: Uryga A., Najda M., Berent I., Mataczyński C., Urbański P., Kasprowicz M., Buchner T.
  venue: Physiological Measurement
  doi: 10.1088/1361-6579/ad7778
  citations: 3
  orcids:
  - 0009-0004-2548-3309
  tags: []
  abstract: 'Abstract Objective. The present study investigated how breathing stimuli affect both non-linear and linear metrics of the autonomic nervous system (ANS). Approach. The analysed dataset consisted of 70 young, healthy volunteers, in whom arterial blood pressure (ABP) was measured noninvasively during 5 min sessions of controlled breathing at three different frequencies: 6, 10 and 15 breaths min −1 . CO 2 concentration and respiratory rate were continuously monitored throughout the controlled breathing sessions. The ANS was characterized using non-linear methods, including phase-rectified signal averaging (PRSA) for estimating heart acceleration and deceleration capacity (AC, DC), multiscale entropy, approximate entropy, sample entropy, and fuzzy entropy, as well as time and frequency-domain measures (low frequency, LF; high-frequency, HF; total power, TP) of heart rate variability (HRV). Main results. Higher breathing rates resulted in a significant decrease in end-tidal CO 2 concentration ( p &lt; 0.001), accompanied by increases in both ABP ( p &lt; 0.001) and heart rate (HR, p &lt; 0.001). A strong, linear decline in AC and DC ( p &lt; 0.001 for both) was observed with increasing breathing rate. All entropy metrics increased with breathing frequency ( p &lt; 0.001). In the time-domain, HRV metrics significantly decreased with breathing frequency ( p &lt; 0.01 for all). In the frequency-domain, HRV LF and HRV HF decreased ( p = 0.038 and p = 0.040, respectively), although these changes were modest. There was no significant change in HRV TP with breathing frequencies. Significance. Alterations in CO 2 levels, a potent chemoreceptor trigger, and changes in HR most likely modulate ANS metrics. Non-linear PRSA and entropy appear to be more sensitive to breathing stimuli compared to frequency-dependent HRV metrics. Further research involving a larger cohort of healthy subjects is needed to validate our observations.'
  summary: This study investigated how different breathing frequencies affect the autonomic nervous system (ANS) by measuring blood pressure, heart rate, CO2 concentration, and respiratory rate in 70 young volunteers. Higher breathing rates led to lower CO2 levels and increased blood pressure and heart rate. Non-linear metrics like PRSA showed stronger responses than frequency-dependent HRV measures to changes in breathing rate. The findings suggest that the ANS is more sensitive to non-linear metrics compared to traditional HRV methods, and further research with a larger sample size is needed to validate these results.
