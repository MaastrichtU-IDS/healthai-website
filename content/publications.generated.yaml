  abstract: Increasingly, multiple parallel omics datasets are collected from biological samples. Integrating these datasets for classification is an open area of research. Additionally, whilst multiple datasets may be available for the training samples, future samples may only be measured by a single technology requiring methods which do not rely on the presence of all datasets for sample prediction. This enables us to directly compare the protein and the gene profiles. New samples with just one set of measurements (e.g., just protein) can then be mapped to this latent common space where classification is performed. Using this approach, we achieved an improvement of up to 12 percent in accuracy when classifying samples based on their protein measurements compared with baseline methods which were trained on the protein data alone. We illustrate that the additional inclusion of the gene expression or protein expression in the training process enabled the separation between the classes to become clearer.
  summary: Researchers developed a method to integrate multiple parallel omics datasets for sample classification, especially when only one dataset is available for future samples. This approach improved accuracy by up to 12% compared to methods using only protein data alone. The inclusion of gene expression or protein expression in the training process clarified class separation.
- year: 2020
  type: Journal
  title: Improving Prediction of Favourable Outcome After 6 Months in Patients with Severe Traumatic Brain Injury Using Physiological Cerebral Parameters in a Multivariable Logistic Regression Model
  authors: Bennis F. C., Teeuwen B., Zeiler F. A., Elting J. W., van der Naalt J., Bonizzi P., Delhaas T., Aries M. J.
  venue: Neurocritical Care
  doi: 10.1007/s12028-020-00930-6
  citations: 47
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: Abstract Background/Objective Current severe traumatic brain injury (TBI) outcome prediction models calculate the chance of unfavourable outcome after 6 months based on parameters measured at admission. We aimed to improve current models with the addition of continuously measured neuromonitoring data within the first 24 h after intensive care unit neuromonitoring. Methods Forty-five severe TBI patients with intracranial pressure/cerebral perfusion pressure monitoring from two teaching hospitals covering the period May 2012 to January 2019 were analysed. Fourteen high-frequency physiological parameters were selected over multiple time periods after the start of neuromonitoring (0–6 h, 0–12 h, 0–18 h, 0–24 h). Besides systemic physiological parameters and extended Corticosteroid Randomisation after Significant Head Injury (CRASH) score, we added estimates of (dynamic) cerebral volume, cerebral compliance and cerebrovascular pressure reactivity indices to the model. A logistic regression model was trained for each time period on selected parameters to predict outcome after 6 months. The parameters were selected using forward feature selection. Each model was validated by leave-one-out cross-validation. Results A logistic regression model using CRASH as the sole parameter resulted in an area under the curve (AUC) of 0.76. For each time period, an increased AUC was found using up to 5 additional parameters. The highest AUC (0.90) was found for the 0–6 h period using 5 parameters that describe mean arterial blood pressure and physiological cerebral indices. Conclusions Current TBI outcome prediction models can be improved by the addition of neuromonitoring bedside parameters measured continuously within the first 24 h after the start of neuromonitoring. As these factors might be modifiable by treatment during the admission, testing in a larger (multicenter) data set is warranted.
  summary: Researchers aimed to improve severe traumatic brain injury outcome prediction models by incorporating continuous neuromonitoring parameters measured within the first 24 hours after ICU monitoring. They found that adding cerebral volume, compliance, and pressure reactivity indices increased model accuracy significantly, with a highest AUC of 0.90 for the 0-6 hour period using mean arterial blood pressure and physiological cerebral indices as predictors. The study suggests that these factors might be modifiable by treatment during admission and calls for further validation in larger multicenter data sets.
