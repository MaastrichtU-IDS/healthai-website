  tags: []
  abstract: Mathematical modeling plays an important role in our understanding and targeting therapy resistance mechanisms in cancer. The polymorphic Gompertzian model, analyzed theoretically and numerically by Viossat and Noble to demonstrate the benefits of adaptive therapy in metastatic cancer, describes a heterogeneous cancer population consisting of therapy-sensitive and therapy-resistant cells. In this study, we demonstrate that the polymorphic Gompertzian model successfully captures trends in both in vitro and in vivo data on non-small cell lung cancer (NSCLC) dynamics under treatment. Additionally, for the in vivo data of tumor dynamics in patients undergoing treatment, we compare the goodness of fit of the polymorphic Gompertzian model to that of the classical oncologic models, which were previously identified as the models that fit this data best. We show that the polymorphic Gompertzian model can successfully capture the U-shape trend in tumor size during cancer relapse, which can not be fitted with the classical oncologic models. In general, the polymorphic Gompertzian model corresponds well to both in vitro and in vivo real-world data, suggesting it as a candidate for improving the efficacy of cancer therapy, for example, through evolutionary/adaptive therapies.
  summary: This study demonstrates that a mathematical model called the polymorphic Gompertzian model can accurately predict the dynamics of non-small cell lung cancer (NSCLC) under treatment in both laboratory and patient settings. The model successfully captures trends not well described by traditional oncologic models, particularly during tumor relapse where it shows an "U-shape" trend that cannot be modeled by classical approaches. This suggests the polymorphic Gompertzian model could improve the efficacy of cancer therapy through evolutionary/adaptive therapies.
