  tags: []
  abstract: 'Abstract Motivation: Methods for computational drug target identification use information from diverse information sources to predict or prioritize drug targets for known drugs. One set of resources that has been relatively neglected for drug repurposing is animal model phenotype. Results: We investigate the use of mouse model phenotypes for drug target identification. To achieve this goal, we first integrate mouse model phenotypes and drug effects, and then systematically compare the phenotypic similarity between mouse models and drug effect profiles. We find a high similarity between phenotypes resulting from loss-of-function mutations and drug effects resulting from the inhibition of a protein through a drug action, and demonstrate how this approach can be used to suggest candidate drug targets. Availability and implementation: Analysis code and supplementary data files are available on the project Web site at https://drugeffects.googlecode.com. Contact: leechuck@leechuck.de or roh25@aber.ac.uk Supplementary information: Supplementary data are available at Bioinformatics online.'
  summary: This research investigates how mouse model phenotypes can be used for drug target identification, finding high similarity between loss-of-function mutations and drug effects on protein inhibition. It suggests a method to suggest candidate drug targets based on this approach.
