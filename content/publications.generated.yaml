  title: 'The effect of tumor composition on the success of adaptive therapy: The case of metastatic Castrate-Resistant Prostate Cancer'
  authors: Salvioli M., Vandelaer L., Baena E., Schneider K., Cavill R., Staňková K.
  venue: PLOS ONE
  doi: 10.1371/journal.pone.0308173
