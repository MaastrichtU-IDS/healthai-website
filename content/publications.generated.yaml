  title: High-throughput elucidation of thrombus formation reveals sources of platelet function variability
  authors: van Geffen J. P., Brouns S. L., Batista J., McKinney H., Kempster C., Nagy M., Sivapalaratnam S., Baaten C. C., Bourry N., Frontini M., Jurk K., Krause M., Pillitteri D., Swieringa F., Verdoold R., Cavill R., Kuijpers M. J. E., Ouwehand W. H., Downes K., Heemskerk J. W.
