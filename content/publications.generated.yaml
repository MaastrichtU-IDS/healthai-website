  title: Singular spectrum analysis improves analysis of local field potentials from macaque V1 in active fixation task
  authors: Bonizzi P., Karel J., De Weerd P., Lowet E., Roberts M., Westra R., Meste O., Peeters R.
  venue: 2012 Annual International Conference of the IEEE Engineering in Medicine and Biology Society
  doi: 10.1109/embc.2012.6346581
  citations: 4
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: Local field potentials (LFPs) represent the relatively slow varying components of the neural signal, and their analysis is instrumental in understanding normal brain function. To be properly analyzed, this signal needs to be separated in its fundamental frequency bands. Recent studies have shown that empirical mode decomposition (EMD) can be exploited to pre-process LFP recordings in order to achieve a proper separation. However, depending on the analyzed signal, EMD is known to generate components that may cover a too wide frequency range to be considered as narrow banded. As an alternative, we present here an improved version of the singular spectrum analysis (SSA) algorithm, validated by numerical simulations, and applied to LFP recordings in V1 of a macaque monkey exposed to simple visual stimuli. The components generated by the improved SSA algorithm are shown to be more meaningful than those generated by EMD, paving the way for its use in LFP analysis.
  summary: Researchers developed an improved version of Singular Spectrum Analysis (SSA) that better separates local field potentials (LFPs), which represent slow neural signals. This new method is validated using simulations and applied to visual stimuli in macaque monkey brains, showing it produces more meaningful components than the traditional Empirical Mode Decomposition (EMD).
- year: 2011
  type: Journal
  title: A common layer of interoperability for biomedical ontologies based on OWL EL
  authors: Hoehndorf R., Dumontier M., Oellrich A., Wimalaratne S., Rebholz-Schuhmann D., Schofield P., Gkoutos G. V.
  venue: Bioinformatics
  doi: 10.1093/bioinformatics/btr058
  citations: 31
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Abstract Motivation: Ontologies are essential in biomedical research due to their ability to semantically integrate content from different scientific databases and resources. Their application improves capabilities for querying and mining biological knowledge. An increasing number of ontologies is being developed for this purpose, and considerable effort is invested into formally defining them in order to represent their semantics explicitly. However, current biomedical ontologies do not facilitate data integration and interoperability yet, since reasoning over these ontologies is very complex and cannot be performed efficiently or is even impossible. We propose the use of less expressive subsets of ontology representation languages to enable efficient reasoning and achieve the goal of genuine interoperability between ontologies. Results: We present and evaluate EL Vira, a framework that transforms OWL ontologies into the OWL EL subset, thereby enabling the use of tractable reasoning. We illustrate which OWL constructs and inferences are kept and lost following the conversion and demonstrate the performance gain of reasoning indicated by the significant reduction of processing time. We applied EL Vira to the open biomedical ontologies and provide a repository of ontologies resulting from this conversion. EL Vira creates a common layer of ontological interoperability that, for the first time, enables the creation of software solutions that can employ biomedical ontologies to perform inferences and answer complex queries to support scientific analyses. Availability and implementation: The EL Vira software is available from http://el-vira.googlecode.com and converted OBO ontologies and their mappings are available from http://bioonto.gen.cam.ac.uk/el-ont. Contact: rh497@cam.ac.uk'
  summary: Researchers developed a method called EL Vira that converts OWL ontologies into the OWL EL subset, making it easier to reason about them efficiently. This approach enables better interoperability between biomedical ontologies and supports complex queries for scientific analyses. The software is available at http://el-vira.googlecode.com/.
