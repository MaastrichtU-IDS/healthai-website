  authors: Ghaffari F., Gilani K., Bertin E., Crespi N.
  venue: International Journal of Network Management
  doi: 10.1002/nem.2180
  citations: 30
  orcids:
  - 0000-0001-7292-1026
  tags: []
  abstract: Summary As the basic building block of any information security system, identity and access management (IAM) solutions play vital role in enterprise's security programmes. Providing centric solutions for IAM is inefficient in terms of having single point of failure, high cost, duplication and complexity to the users. Recently, emerging the distributed ledger technology (DLT) has attracted significant scientific interests in research areas like identity management, authentication and access control processes. In these contexts, Blockchain can offer greater data and rule confidentiality and integrity, as well as increasing the availability of the system by removing the single point of failure in the procedure. In this paper, we provide a comprehensive overview of the IAM solutions based on their basic components including identity management, authentication and access control. In the identity concept, we discuss about self‐sovereign identity which enhances privacy and security of distributed digital identities by providing individual's consolidated digital identity and verified attributes for enabling them to utilize their ownership. To offer a clearer understanding of the state of the art, we propose taxonomy to categorize them based on their features. For the conclusion of the paper, we compare the existing methods based on proposed taxonomy. Also, considering the advantages and disadvantages of existing methods, we discussed about the possible future directions.
  summary: 'This research provides a comprehensive overview of identity and access management (IAM) solutions based on their basic components: identity management, authentication, and access control. It introduces self-sovereign identity as an enhanced privacy and security solution for distributed digital identities. The study proposes a taxonomy to categorize IAM methods based on features, comparing existing approaches and discussing future directions.'
- year: 2021
  type: Preprint
  title: 'Improving Mathematical Models of Cancer through Game-Theoretic Modelling: A Study in Non-Small Cell Lung Cancer'
  authors: Ardévol Martínez V., Salvioli M., Laleh N. G., Thuijsman F., Brown J. S., Cavill R., Kather J. N., Staňková K.
  venue: ''
  doi: 10.1101/2021.10.29.466444
  citations: 4
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Abstract We examined a dataset of 590 Non-Small Cell Lung Cancer patients treated with either chemotherapy or immunotherapy using a game-theoretic model that includes both the evolution of therapy resistance and a cost of resistance. We tested whether the game-theoretic model provides a better fit than classical mathematical models of population growth (exponential, logistic, classic Bertalanffy, general Bertalanffy, Gompertz, general Gompertz). To our knowledge, this is the first time a large clinical patient cohort (as opposed to only in-vitro data) has been used to apply a game-theoretic cancer model. The game-theoretic model provided a better fit to the tumor dynamics of the 590 Non-Small Cell Lung Cancer patients than any of the non-evolutionary population growth models. This was not simply due to having more parameters in the game-theoretic model. The game-theoretic model was seemingly able to fit more accurately patients whose tumor burden exhibit a U-shaped trajectory over time. We explained how this game-theoretic model provides predictions of future tumor growth based on just a few initial measurements. Using the estimates for treatment-specific parameters, we then explored alternative treatment protocols and their expected impact on tumor growth and patient outcome. As such, the model could possibly be used to suggest patient-specific optimal treatment regimens with the goal of minimizing final tumor burden. Therapeutic protocols based on game-theoretic modeling can help to predict tumor growth, and could potentially improve patient outcome in the future. The model invites evolutionary therapies that anticipate and steer the evolution of therapy resistance.
  summary: Researchers used a game-theoretic model to analyze 590 patients with Non-Small Cell Lung Cancer treated with chemotherapy or immunotherapy. They found this model provided better fits for tumor dynamics compared to classical models, especially for U-shaped tumor burden trajectories. This suggests the model could predict future growth more accurately and inform personalized treatment strategies.
