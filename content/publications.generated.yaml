  title: Assessment of a complete and classified platelet proteome from genome-wide transcripts of human platelets and megakaryocytes covering platelet functions
  authors: Huang J., Swieringa F., Solari F. A., Provenzale I., Grassi L., De Simone I., Baaten C. C. F. M. J., Cavill R., Sickmann A., Frontini M., Heemskerk J. W. M.
  venue: Scientific Reports
  doi: 10.1038/s41598-021-91661-x
  citations: 72
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: 'Abstract Novel platelet and megakaryocyte transcriptome analysis allows prediction of the full or theoretical proteome of a representative human platelet. Here, we integrated the established platelet proteomes from six cohorts of healthy subjects, encompassing 5.2 k proteins, with two novel genome-wide transcriptomes (57.8 k mRNAs). For 14.8 k protein-coding transcripts, we assigned the proteins to 21 UniProt-based classes, based on their preferential intracellular localization and presumed function. This classified transcriptome-proteome profile of platelets revealed: (i) Absence of 37.2 k genome-wide transcripts. (ii) High quantitative similarity of platelet and megakaryocyte transcriptomes (R = 0.75) for 14.8 k protein-coding genes, but not for 3.8 k RNA genes or 1.9 k pseudogenes (R = 0.43–0.54), suggesting redistribution of mRNAs upon platelet shedding from megakaryocytes. (iii) Copy numbers of 3.5 k proteins that were restricted in size by the corresponding transcript levels (iv) Near complete coverage of identified proteins in the relevant transcriptome (log2fpkm &gt; 0.20) except for plasma-derived secretory proteins, pointing to adhesion and uptake of such proteins. (v) Underrepresentation in the identified proteome of nuclear-related, membrane and signaling proteins, as well proteins with low-level transcripts. We then constructed a prediction model, based on protein function, transcript level and (peri)nuclear localization, and calculated the achievable proteome at ~ 10 k proteins. Model validation identified 1.0 k additional proteins in the predicted classes. Network and database analysis revealed the presence of 2.4 k proteins with a possible role in thrombosis and hemostasis, and 138 proteins linked to platelet-related disorders. This genome-wide platelet transcriptome and (non)identified proteome database thus provides a scaffold for discovering the roles of unknown platelet proteins in health and disease.'
  summary: Researchers analyzed the transcriptomes of human platelets and megakaryocytes, integrating six existing datasets with two new ones to create a comprehensive transcriptome-proteome profile. The study found that 37% of transcripts were absent, high similarity between platelets and megakaryocytes for coding genes but not pseudogenes or non-coding RNAs, restricted protein sizes by transcript levels, and underrepresentation of nuclear-related, membrane, signaling proteins, and low-level transcripts. A prediction model was developed to identify 10% of the proteome, with additional proteins identified through network analysis, highlighting potential roles in thrombosis and hemostasis and platelet disorders.
- year: 2021
