  title: Issues in learning an ontology from text
  authors: Brewster C., Jupp S., Luciano J., Shotton D., Stevens R. D., Zhang Z.
  venue: BMC Bioinformatics
  doi: 10.1186/1471-2105-10-s5-s1
  citations: 9
