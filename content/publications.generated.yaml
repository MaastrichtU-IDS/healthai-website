  tags: []
  abstract: Progress in mass spectrometry lipidomics has led to a rapid proliferation of studies across biology and biomedicine. These generate extremely large raw datasets requiring sophisticated solutions to support automated data processing. To address this, numerous software tools have been developed and tailored for specific tasks. However, for researchers, deciding which approach best suits their application relies on ad hoc testing, which is inefficient and time consuming. Here we first review the data processing pipeline, summarizing the scope of available tools. Next, to support researchers, LIPID MAPS provides an interactive online portal listing open-access tools with a graphical user interface. This guides users towards appropriate solutions within major areas in data processing, including (1) lipid-oriented databases, (2) mass spectrometry data repositories, (3) analysis of targeted lipidomics datasets, (4) lipid identification and (5) quantification from untargeted lipidomics datasets, (6) statistical analysis and visualization, and (7) data integration solutions. Detailed descriptions of functions and requirements are provided to guide customized data analysis workflows.
  summary: Researchers faced challenges in selecting appropriate software tools for mass spectrometry lipidomics due to ad hoc testing inefficiency. LIPID MAPS developed an interactive online portal with a graphical user interface, categorizing available tools by major areas such as databases, repositories, targeted datasets, identification, quantification, statistical analysis, and integration solutions. This guide helps researchers choose the right tool for their specific needs, streamlining data processing workflows.
