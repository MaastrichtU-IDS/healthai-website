  abstract: Decision support systems (DSSs) in agriculture are becoming increasingly popular, and have begun adopting visualisations to facilitate insights into complex data. However, DSSs for agriculture are often designed as standalone applications, which limits their flexibility and portability. They also rarely provide interactivity, visualise uncertainty and are evaluated with end-users. To address these gaps, we developed six web-based visual-assisted DSSs for various agricultural use cases, including biological efficacy correlation analysis, water stress and irrigation requirement analysis, product price prediction, etc. We then evaluated our DSSs with domain experts, focusing on usability, workload, acceptance and trust. Results showed that our systems were easy to use and understand, and participants perceived them as highly performant, even though they required a slightly high mental demand, temporal demand and effort. We also published the source code of our proposed systems so that they can be re-used or adapted by the agricultural community.
  summary: Researchers developed six web-based visual-assisted decision support systems for agriculture to improve usability, flexibility, interactivity, visualization of uncertainty, and evaluation with domain experts. The systems were evaluated positively on ease of use, performance, workload, acceptance, and trust, but required a moderate mental demand, temporal demand, and effort. The source code is available for re-use or adaptation by the agricultural community.
