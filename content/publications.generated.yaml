  title: Investigating a Selection of Methods for the Prediction of Total Soluble Solids Among Wine Grape Quality Characteristics Using Normalized Difference Vegetation Index Data From Proximal and Remote Sensing
  authors: Kasimati A., Espejo-Garcia B., Vali E., Malounas I., Fountas S.
  venue: Frontiers in Plant Science
  doi: 10.3389/fpls.2021.683078
