  abstract: 'Childhood obesity is a complex disease with multiple biological and psychosocial risk factors. Recently, novel digital programs were developed with growing evidence for their effectiveness in pediatric weight management studies. The ENDORSE platform consists of mobile applications, wearables, and serious games for the remote management of childhood obesity. The pilot studies included 50 mothers and their children aged 6–14 years and resulted in a clinically significant BMI z-score reduction over 4 to 5 months. This secondary analysis of the ENDORSE study focuses on parenting styles and psychosocial factors. Methodology: Semi-structured clinical interviews were conducted with all participating mothers pre-and post-intervention. The Parenting Styles and Dimensions Questionnaire (PSDQ) evaluated the mothers’ parenting styles. The psychosocial functioning of the participating children was assessed with the parental version of the Strengths and Difficulties Questionnaire (SDQ). The relationship between parenting styles, psychosocial parameters, and weight outcomes was investigated using a linear regression analysis. Results: Weight-related stigma at school (56%), body image concerns (66%), and difficulties in family relationships (48%) were the main concerns documented during the initial psychological interviews. According to the SDQ, there was a significant decrease in children’s conduct problems during the study’s initial phase (pre-pilot group). A decrease in maternal demandingness (i.e., strict parenting style) was associated with a decrease in BMI z-score (beta coefficient = 0.314, p-value = 0.003). Conclusion: Decreasing parental demandingness was associated with better weight outcomes, highlighting the importance of assessing parenting factors in pediatric weight management programs.'
  summary: The ENDORSE platform, which includes mobile apps and games for remote childhood obesity management, showed promising results in reducing BMI z-scores over 4-5 months. This study found that mothers' less demanding parenting styles were associated with better weight outcomes, emphasizing the importance of assessing these factors in pediatric weight management programs.
