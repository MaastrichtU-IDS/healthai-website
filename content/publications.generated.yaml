  abstract: Poor health data interoperability has been an issue for more than 25 years. With the emergence of data-hungry AI solutions, the need for interoperable and reusable health data is growing. This paper presents a prototype virtual assistant, developed and tested as part of the AIDAVA Horizon Europe project, that creates an interoperable and reusable personal health knowledge graph, compliant with a semantic standard, by maximising automation in the curation of multimodal heterogeneous health data. The paper describes the different transformation steps of a data element from collection to its reusable form, with associated issues. We conclude that the lack of health data interoperability could be resolved by addressing these issues in a structural way through a validated roadmap.
  summary: A prototype virtual assistant was developed as part of the AIDAVA Horizon Europe project to create an interoperable and reusable personal health knowledge graph using semantic standards, focusing on automating the curation of multimodal heterogeneous health data. The paper describes the transformation steps of a data element from collection to its reusable form and identifies issues that could be resolved through addressing them in a structured way with a validated roadmap.
