  citations: 0
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: 'Abstract Growing evidence suggests that clinical, pathological, and genetic heterogeneity in late onset Alzheimer’s disease (LOAD) contributes to variable therapeutic outcomes, potentially explaining many trial failures. Advances in molecular subtyping through proteomic and transcriptomic profiling reveal distinct patient subgroups, highlighting disease complexity beyond amyloid-beta plaques and tau tangles. This underscores the need to expand subtyping across new molecular layers, to identify novel drug targets for different patient subgroups.In this study, we analyzed genome-wide DNA methylation (DNAm) data from three independent postmortem brain cohorts (N = 831) to identify epigenetic subtypes of LOAD. Unsupervised clustering approaches were employed to identify distinct DNAm patterns, with subsequent cross-cohort validation. We assessed how subtype-specific methylation signatures map onto individual brain cell types by comparing them with DNAm profiles from purified cells. Next, we integrated bulk and single-cell RNA-seq data to determine each subtype’s functional impact on gene expression. Finally, we explored clinical and neuropathological correlates of the identified subtypes to elucidate biological and clinical significance.We identified two distinct epigenomic subtypes of LOAD, consistently observed across three cohorts. Both subtypes exhibit significant yet distinct microglial methylation enrichment. Bulk transcriptomic analyses further highlighted distinct biological mechanisms underlying these subtypes: subtype 1 was enriched for immune-related processes, while subtype 2 was characterized by neuronal and synaptic pathways. Single-cell transcriptional profiling of microglia revealed subtype-specific inflammatory states: subtype 1 displayed chronic innate immune hyperactivation with impaired resolution, whereas subtype 2 exhibited a more dynamic inflammatory profile, balancing pro-inflammatory signaling with reparative and regulatory mechanisms.These findings reveal distinct epigenetic and functional microglial states underlying LOAD subtypes, advancing our understanding of disease heterogeneity. This work lays the groundwork for targeted therapeutic strategies tailored to specific molecular and cellular disease profiles.'
  summary: 'Researchers analyzed genome-wide DNA methylation data from three postmortem brain cohorts to identify two distinct epigenomic subtypes of late-onset Alzheimer''s disease (LOAD). Both subtypes showed significant enrichment in microglial methylation, with subtype 1 characterized by immune-related processes and subtype 2 by neuronal and synaptic pathways. Single-cell transcriptional profiling revealed subtype-specific inflammatory states: subtype 1 exhibited chronic innate immune hyperactivation, while subtype 2 balanced pro-inflammatory signaling with reparative and regulatory mechanisms. This study advances understanding of disease heterogeneity and identifies potential therapeutic targets for specific molecular and cellular profiles in LOAD.'
- year: 2025
  type: Journal
  title: Epigenomic subtyping of late‐onset Alzheimer's disease reveals distinct microglial signatures and molecular inflammatory phenotypes
  authors: Pishva E., Laroche V., Cavill R., Kouhsar M. P., Reijnders R. A., Harvey J., Smith A. R., Imm J., Weymouth L., MacBean L. F., Pegoraro G., Eijssen L. M., Koetsier J., Creese B., Kofler J. K., Kenis G., van den Hove D. L., Lunnon K.
  venue: Alzheimer's &amp; Dementia
  doi: 10.1002/alz70855_099625
  citations: 0
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: Abstract Background Growing evidence suggests that the heterogeneity of late‐onset Alzheimer's disease (LOAD) plays a significant role in treatment failure. In recent years, molecular subtyping of AD has increasingly leveraged omics data to uncover distinct molecular profiles that may underlie the observed heterogeneity in disease manifestation and mechanisms. This has been particularly transformative as traditional classification methods based on clinical or pathological features alone have proven insufficient. Method We applied data‐driven clustering to genome‐wide DNA methylation (DNAm) data from three independent post‐mortem AD brain cohorts ( n = 831). To determine the brain cell‐type specificity of the findings identified using bulk DNAm profiles, we isolated four nuclei populations from PFC tissue of 20 donors with low neuropathology from the Brains for Dementia Research (BDR) cohort. Result This study identified two distinct epigenetic subtypes of LOAD using genome‐wide DNAm. Data‐driven clustering revealed reproducible LOAD subtypes characterized by cell‐type‐specific DNAm profiles. Bulk transcriptomic analyses further emphasize divergent biological mechanisms driving these subtypes, with subtype 1 (LOAD‐S1) enriched in immune‐related processes and subtype 2 (LOAD‐S2) in neuronal and synaptic functions. Subtype‐specific microglial single‐cell transcriptional signatures revealed that LOAD‐S1 represents a state of chronic innate immune hyperactivation and impaired resolution, while LOAD‐S2 displays a dynamic inflammatory profile, balancing pro‐inflammatory signals with reparative and regulatory mechanisms (see Figure). Conclusion These subtype‐specific immune signatures provide critical insights into the molecular heterogeneity of LOAD and highlight potential therapeutic targets tailored to the immune dysregulation observed in each subtype.
  summary: This study used genome-wide DNA methylation data from post-mortem AD brain tissue to identify two distinct epigenetic subtypes of late-onset Alzheimer's disease (LOAD). Bulk transcriptomic analyses further revealed divergent biological mechanisms driving these subtypes, with subtype 1 enriched in immune-related processes and subtype 2 in neuronal and synaptic functions. Subtype-specific microglial single-cell transcriptional signatures showed that LOAD-1 represents chronic innate immune hyperactivation and impaired resolution, while LOAD-2 displays a dynamic inflammatory profile balancing pro-inflammatory signals with reparative and regulatory mechanisms. These findings provide insights into the molecular heterogeneity of LOAD and potential therapeutic targets tailored to each subtype's immune dysregulation.
