  title: Wikidata as a knowledge graph for the life sciences
  authors: Waagmeester A., Stupp G., Burgstaller-Muehlbacher S., Good B. M., Griffith M., Griffith O. L., Hanspers K., Hermjakob H., Hudson T. S., Hybiske K., Keating S. M., Manske M., Mayers M., Mietchen D., Mitraka E., Pico A. R., Putman T., Riutta A., Queralt-Rosinach N., Schriml L. M., Shafee T., Slenter D., Stephan R., Thornton K., Tsueng G., Tu R., Ul-Hasan S., Willighagen E., Wu C., Su A. I.
  venue: eLife
