  title: Identification of a gene network driving the attenuated response to lipopolysaccharide of monocytes from hypertensive coronary artery disease patients
  authors: Lu C., Donners M. M. P. C., de Baaij J. B. J., Jin H., Otten J. J. T., Manca M., van Zonneveld A. J., Jukema J. W., Kraaijeveld A., Kuiper J., Pasterkamp G., Mees B., Sluimer J. C., Cavill R., Karel J. M. H., Goossens P., Biessen E. A. L.
