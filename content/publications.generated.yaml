  title: 'GridCell: a stochastic particle-based biological system simulator'
  authors: Boulianne L., Al Assaad S., Dumontier M., Gross W. J.
  venue: BMC Systems Biology
  doi: 10.1186/1752-0509-2-66
  citations: 33
  orcids:
