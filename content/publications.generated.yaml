  title: 'Pattern recognition methods to relate time profiles of gene expression with phenotypic data: a comparative study'
  authors: Hendrickx D. M., Jennen D. G. J., Briedé J. J., Cavill R., de Kok T. M., Kleinjans J. C. S.
  venue: Bioinformatics
  doi: 10.1093/bioinformatics/btv108
  citations: 8
  orcids:
  - 0000-0002-3796-1687
  tags: []
  abstract: 'Abstract Motivation: Comparing time courses of gene expression with time courses of phenotypic data may provide new insights in cellular mechanisms. In this study, we compared the performance of five pattern recognition methods with respect to their ability to relate genes and phenotypic data: one classical method (k-means) and four methods especially developed for time series [Short Time-series Expression Miner (STEM), Linear Mixed Model mixtures, Dynamic Time Warping for -Omics and linear modeling with R/Bioconductor limma package]. The methods were evaluated using data available from toxicological studies that had the aim to relate gene expression with phenotypic endpoints (i.e. to develop biomarkers for adverse outcomes). Additionally, technical aspects (influence of noise, number of time points and number of replicates) were evaluated on simulated data. Results: None of the methods outperforms the others in terms of biology. Linear modeling with limma is mostly influenced by noise. STEM is mostly influenced by the number of biological replicates in the dataset, whereas k-means and linear modeling with limma are mostly influenced by the number of time points. In most cases, the results of the methods complement each other. We therefore provide recommendations to integrate the five methods. Availability: The Matlab code for the simulations performed in this research is available in the Supplementary Data (Word file). The microarray data analysed in this paper are available at ArrayExpress (E-TOXM-22 and E-TOXM-23) and Gene Expression Omnibus (GSE39291). The phenotypic data are available in the Supplementary Data (Excel file). Links to the pattern recognition tools compared in this paper are provided in the main text. Contact: d.hendrickx@maastrichtuniversity.nl Supplementary information: Supplementary data are available at Bioinformatics online.'
  summary: Researchers evaluated five methods for predicting gene expression from time series phenotypic data, finding that none consistently outperformed others based on biological accuracy. Linear modeling with limma was most affected by noise, while STEM and k-means were influenced more by the number of biological replicates in datasets and the number of time points, respectively. The methods complement each other's results, suggesting integration recommendations for further studies.
