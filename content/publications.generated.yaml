  title: Topographic imaging of the atrial electrical activity during atrial fibrillation for the analysis of uniform distributions of the surface electrical potentials
  authors: Bonizzi P., Meste O., Zarzoso V., Westra R., Karel J., Guillem M. S., Castells F.
  venue: 2011 Annual International Conference of the IEEE Engineering in Medicine and Biology Society
  doi: 10.1109/iembs.2011.6090714
  citations: 0
  orcids:
  - 0000-0001-8804-235X
  tags: []
  abstract: Atrial fibrillation (AF) is a progressive arrhythmia which causes time dependent impairing of the cardiac muscle. This makes that proper therapeutic interventions depend on the degree of AF progression, i.e., on the temporal decrease of the organization of the electrical patterns observed during AF. Standard effective treatments are still lacking nowadays, and this calls for suitable noninvasive analysis of AF. In this sense, an appropriate therapy relies on the knowledge of AF characteristics, as its degree of organization. To this purpose, fast and accurate imaging of cardiac electrical activity can be helpful. Relying on the results of previous work on noninvasive assessment of the complexity of AF, we put forward a method to obtain visual maps of the topographic projection of the main atrial activity (AA) component given by principal component analysis, which is shown to provide detailed information about AA potential pattern distributions on the body surface. Different AA potential pattern distributions can then be identified, depending on the underlying degree of AF organization. An automated way to assess AF organization degree is then proposed, based on topographic projections. Similarities with previous studies suggest its usefulness for determining uniform distributions in the activation patterns on the body surface.
  summary: The study proposes a method using principal component analysis to visualize and quantify the complexity of atrial fibrillation (AF) through visual maps of the topographic projection of the main atrial activity (AA) component, providing detailed information about potential pattern distributions on the body surface. This approach aims to help in assessing AF organization degree, which is crucial for developing suitable noninvasive therapies.
