  tags: []
  abstract: Introduction The impact of cardiovascular disease (CVD) risk factors, encompassing various biological determinants and unhealthy lifestyles, on the functional dynamics of circulating monocytes—a pivotal cell type in CVD pathophysiology remains elusive. In this study, we aimed to elucidate the influence of CVD risk factors on monocyte transcriptional responses to an infectious stimulus. Methods We conducted a comparative analysis of monocyte gene expression profiles from the CTMM – CIRCULATING CELLS Cohort of coronary artery disease (CAD) patients, at baseline and after lipopolysaccharide (LPS) stimulation. Gene co-expression analysis was used to identify gene modules and their correlations with CVD risk factors, while pivotal transcription factors controlling the hub genes in these modules were identified by regulatory network analyses. The identified gene module was subjected to a drug repurposing screen, utilizing the LINCS L1000 database. Results Monocyte responsiveness to LPS showed a highly significant, negative correlation with blood pressure levels (ρ&amp;lt; -0.4; P&amp;lt;10 -80 ). We identified a ZNF12/ZBTB43-driven gene module closely linked to diastolic blood pressure, suggesting that monocyte responses to infectious stimuli, such as LPS, are attenuated in CAD patients with elevated diastolic blood pressure. This attenuation appears associated with a dampening of the LPS-induced suppression of oxidative phosphorylation. Finally, we identified the serine-threonine inhibitor MW-STK33-97 as a drug candidate capable of reversing this aberrant LPS response. Conclusions Monocyte responses to infectious stimuli may be hampered in CAD patients with high diastolic blood pressure and this attenuated inflammatory response may be reversed by the serine-threonine inhibitor MW-STK33-97. Whether the identified gene module is a mere indicator of, or causal factor in diastolic blood pressure and the associated dampened LPS responses remains to be determined.
  summary: This study investigated how cardiovascular disease (CVD) risk factors affect monocyte gene expression in response to an infectious stimulus like lipopolysaccharide (LPS). It found a negative correlation between high blood pressure levels and monocyte responsiveness, indicating that elevated diastolic blood pressure may impair LPS-induced inflammation. The researchers identified a specific gene module linked to diastolic blood pressure and a potential drug candidate, MW-STK33-97, for reversing this aberrant response.
