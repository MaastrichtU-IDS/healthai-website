  title: 'Quantifying Neural Oscillatory Synchronization: A Comparison between Spectral Coherence and Phase-Locking Value Approaches'
  authors: Lowet E., Roberts M. J., Bonizzi P., Karel J., De Weerd P.
  venue: PLOS ONE
  doi: 10.1371/journal.pone.0146443
  citations: 125
  orcids:
