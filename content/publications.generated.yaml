  title: Identification of platelet function defects by multi-parameter assessment of thrombus formation
  authors: de Witt S. M., Swieringa F., Cavill R., Lamers M. M. E., van Kruchten R., Mastenbroek T., Baaten C., Coort S., Pugh N., Schulz A., Scharrer I., Jurk K., Zieger B., Clemetson K. J., Farndale R. W., Heemskerk J. W. M., Cosemans J. M.
