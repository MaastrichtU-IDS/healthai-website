  title: Wavelet-promoted sparsity for non-invasive reconstruction of electrical activity of the heart
  authors: Cluitmans M., Karel J., Bonizzi P., Volders P., Westra R., Peeters R.
  venue: Medical &amp; Biological Engineering &amp; Computing
  doi: 10.1007/s11517-018-1831-2
  citations: 12
