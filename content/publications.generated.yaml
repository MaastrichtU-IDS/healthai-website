  tags: []
  abstract: This paper presents the development and update of a multi-scale yield prediction model for processing tomatoes. The study was carried out under the EU-funded programme “Support to Development of a Rural Business Information System (RBIS)”, and the performance of the updated crop-specific yield prediction models and their generated predictions at regional and national levels are presented. The model was built using Sentinel-2 satellite imagery to obtain cumulative values of six (6) selected vegetation indices (VIs). The data were collected on five (5) different dates for processing tomato fields in the Khachmaz region of Azerbaijan during summer 2021 (June to August) at 10- to 13-day intervals. In addition, a targeted field sampling campaign was conducted on selected Khachmaz pilot fields towards the end of the growing season to assess the potential of Sentinel-2 data to determine yield variability in tomato fields. Finally, actual recorded yields were collected at the field level to build the yield prediction regression model and evaluate its performance at different spatial scales, ranging from single field to national level, as well as under different data availability scenarios (number of consecutive Sentinel-2 images used). The results showed a high degree of correlation between all implemented VIs and processing tomato yield, with a coefficient of determination of up to 0.89 for the NDVI, providing valuable information for future estimates of tomato production across multiple spatial scales. The developed prediction model could also be used in the agri-food sector for national yield estimates to support policy and regulatory decisions at the national level.
  summary: This study presents a multi-scale yield prediction model using Sentinel-2 satellite imagery for processing tomatoes, improving accuracy from 50% to 89%. It supports regional and national-level yield estimation and is applicable in the agri-food sector for policy-making.
