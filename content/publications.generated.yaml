  abstract: Aims Non-invasive characterization of atrial fibrillation (AF) substrate complexity based on the electrocardiogram (ECG) may improve outcome prediction in patients receiving rhythm control therapies for AF. Multiple parameters to assess AF complexity and predict treatment outcome have been suggested. A comparative study of the predictive performance of complexity parameters on response to therapy and progression of AF in a large patient population is needed to standardize non-invasive analysis of AF. Methods and results A large variety of ECG complexity parameters were systematically compared in patients with recent onset AF undergoing pharmacological cardioversion (PCV) with flecainide. Parameters were computed on 10-s 12-lead ECGs of 221 patients before drug administration. The ability of ECG parameters to predict successful PCV and progression to persistent AF (mean follow-up 49 months) was evaluated and compared with common clinical predictors. Optimal prediction performance of successful PCV using only one ECG parameter was low, using dominant atrial frequency [lead II, receiver operating area under curve (AUC) 0.66, 95% confidence interval [0.64-0.67]], but the optimal combination of several ECG parameters strongly improved predictive performance (AUC 0.78 [0.76-0.79]). While predictive value of the optimal combination of clinical predictors was low (AUC 0.68 [0.66-0.70], using right atrial volume and weight), adding ECG parameters strongly increased performance (AUC 0.81 [0.79-0.82], P Conclusion Assessment of AF complexity from 12-lead ECGs significantly improves prediction of successful PCV and progression to persistent AF compared with common clinical and echocardiographic predictors.
  summary: This study assessed the use of electrocardiogram (ECG) parameters for non-invasive characterization of atrial fibrillation substrate complexity, aiming to improve outcome prediction in patients undergoing rhythm control therapies for AF. The results showed that a combination of ECG parameters significantly improved predictive performance compared to common clinical predictors, with an AUC of 0.78 for successful PCV and 0.81 for progression to persistent AF.
