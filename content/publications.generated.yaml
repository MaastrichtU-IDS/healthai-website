  tags: []
  abstract: 'Background In persistent atrial fibrillation (AF), localized extra-pulmonary vein sources may contribute to arrhythmia recurrences after pulmonary vein isolation. This in-silico study proposes a high-density sequential mapping strategy to localize such sources. Method Catheter repositioning was guided by repetitive conduction patterns, moving against the prevailing conduction direction (upstream) toward the sources. Sources were found either by locally identifying conduction patterns or by encircling the region harboring them. We simulated source tracking in an in-silico atrial model, comparing random vs. upstream-guided catheter repositioning (with and without encircling). To assess performance in increasing AF complexities, we simulated AF in 3 groups: atria with reentry-anchoring scars, without fibrosis, and with severe endomysial fibrosis. Results Compared to random mapping, the upstream-guided approach successfully located sources more often (anchored reentries: 70.6 % vs. 10.6 % ; no fibrosis: 87.9 % vs. 22.1 % ; with fibrosis: 95.0 % vs. 60.9 % of tracking procedures, all p 15 mm from the source. Conclusion Moving mapping catheters upstream improves source detection efficiency, even in the presence of severe fibrosis. Encircling sources may help find regions of interest in fewer steps.'
  summary: Researchers developed a method to locate extra-pulmonary vein sources contributing to atrial fibrillation recurrence after pulmonary vein isolation by guiding catheter repositioning with upstream movement toward identified conduction patterns or encircling the region harboring them. The study simulated AF in three groups and found that the upstream-guided approach was more effective, locating 70.6% of anchoring reentries compared to 10.6%, significantly improving source detection efficiency even in severe fibrosis conditions.
