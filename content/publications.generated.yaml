  citations: 163
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Abstract The Semanticscience Integrated Ontology (SIO) is an ontology to facilitate biomedical knowledge discovery. SIO features a simple upper level comprised of essential types and relations for the rich description of arbitrary (real, hypothesized, virtual, fictional) objects, processes and their attributes. SIO specifies simple design patterns to describe and associate qualities, capabilities, functions, quantities, and informational entities including textual, geometrical, and mathematical entities, and provides specific extensions in the domains of chemistry, biology, biochemistry, and bioinformatics. SIO provides an ontological foundation for the Bio2RDF linked data for the life sciences project and is used for semantic integration and discovery for SADI-based semantic web services. SIO is freely available to all users under a creative commons by attribution license. See website for further information: http://sio.semanticscience.org .'
  summary: The Semanticscience Integrated Ontology (SIO) is an ontology designed to facilitate biomedical knowledge discovery, featuring simple types and relations for describing real, hypothetical, virtual, or fictional objects, processes, attributes, qualities, capabilities, functions, quantities, informational entities, and provides extensions in chemistry, biology, biochemistry, and bioinformatics. SIO supports the Bio2RDF linked data project and semantic integration for SADI-based services, offering a freely available ontology under a creative commons license.
