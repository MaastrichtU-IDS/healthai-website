  title: 'CMEO: a metadata-centric ontology for clinical studies exploration and harmonization assessment'
  authors: Gilani K., Wei W., Peters C., Verket M., Rocca H. B., Nicolis E., Colombo M., Marx-Schütt K., Urovi V., Dumontier M.
  venue: BMC Medical Informatics and Decision Making
  doi: 10.1186/s12911-025-03272-5
  citations: 1
  orcids:
  - 0000-0001-7292-1026
  - 0000-0003-2817-3950
  tags: []
  abstract: 'Abstract The integration of clinical research data across various institutions faces hurdles due to differing definitions, inconsistent terminologies, and inadequate support for interoperable metadata. While biomedical ontologies offer valuable tools for structuring clinical data, they have not yet been fully utilized for creating comprehensive metadata descriptors, such as variable semantics, statistical summaries, and governance elements essential for data discovery and alignment. We present the Clinical Metadata Exploration Ontology (CMEO) that builds upon well-established ontologies to provide a cohesive representation of study designs, data elements, exploratory statistics, and data reuse permissions. CMEO facilitates semantic querying for study exploration and comparison of data elements across studies, particularly when individual-level data cannot be shared. We demonstrate its utility using metadata from five studies: four heart-failure studies and one wearable-based type 1 diabetes study. After serializing, we executed SPARQL queries that operationalized study-level discovery, variable alignment across studies, and governance-constrained reuse. This FAIR-compliant, metadata-driven integration across heterogeneous sources enables scalable, privacy-conscious research and underpins federated clinical data exploration.'
  summary: Researchers developed the Clinical Metadata Exploration Ontology (CMEO) to provide a cohesive representation of study designs, data elements, exploratory statistics, and governance elements for interoperable metadata in clinical research data. The ontology facilitates semantic querying for study exploration and comparison across studies, enabling scalable, privacy-conscious research integration across heterogeneous sources.
