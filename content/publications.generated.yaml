  authors: Ni Z., Wölk M., Jukes G., Mendivelso Espinosa K., Ahrends R., Aimo L., Alvarez-Jarreta J., Andrews S., Andrews R., Bridge A., Clair G. C., Conroy M. J., Fahy E., Gaud C., Goracci L., Hartler J., Hoffmann N., Kopczyinki D., Korf A., Lopez-Clavijo A. F., Malik A., Ackerman J. M., Molenaar M. R., O’Donovan C., Pluskal T., Shevchenko A., Slenter D., Siuzdak G., Kutmon M., Tsugawa H., Willighagen E. L., Xia J., O’Donnell V. B., Fedorova M.
  venue: Nature Methods
