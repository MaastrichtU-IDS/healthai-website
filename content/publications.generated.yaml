  title: 'Biolink Model: A universal schema for knowledge graphs in clinical, biomedical, and translational science'
  authors: Unni D. R., Moxon S. A. T., Bada M., Brush M., Bruskiewich R., Caufield J. H., Clemons P. A., Dancik V., Dumontier M., Fecho K., Glusman G., Hadlock J. J., Harris N. L., Joshi A., Putman T., Qin G., Ramsey S. A., Shefchek K. A., Solbrig H., Soman K., Thessen A. E., Haendel M. A., Bizon C., Mungall C. J.
  venue: Clinical and Translational Science
