  title: An evidence-based approach to identify aging-related genes in Caenorhabditis elegans
  authors: Callahan A., Cifuentes J. J., Dumontier M.
  venue: BMC Bioinformatics
  doi: 10.1186/s12859-015-0469-4
  citations: 8
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background Extensive studies have been carried out on Caenorhabditis elegans as a model organism to elucidate mechanisms of aging and the effects of perturbing known aging-related genes on lifespan and behavior. This research has generated large amounts of experimental data that is increasingly difficult to integrate and analyze with existing databases and domain knowledge. To address this challenge, we demonstrate a scalable and effective approach for automatic evidence gathering and evaluation that leverages existing experimental data and literature-curated facts to identify genes involved in aging and lifespan regulation in C. elegans. Results We developed a semantic knowledge base for aging by integrating data about C. elegans genes from WormBase with data about 2005 human and model organism genes from GenAge and 149 genes from GenDR, and with the Bio2RDF network of linked data for the life sciences. Using HyQue (a Semantic Web tool for hypothesis-based querying and evaluation) to interrogate this knowledge base, we examined 48,231 C. elegans genes for their role in modulating lifespan and aging. HyQue identified 24 novel but well-supported candidate aging-related genes for further experimental validation. Conclusions We use semantic technologies to discover candidate aging genes whose effects on lifespan are not yet well understood. Our customized HyQue system, the aging research knowledge base it operates over, and HyQue evaluations of all C. elegans genes are freely available at http://hyque.semanticscience.org .
  summary: Researchers developed a semantic knowledge base for aging in Caenorhabditis elegans by integrating data from multiple sources, including WormBase, GenAge, and GenDR. They used HyQue to identify 24 novel candidate genes involved in lifespan regulation that warrant further experimental validation. This approach leverages existing experimental data and literature-curated facts to address the challenge of integrating large amounts of experimental information for aging research.
