  abstract: Abstract Collecting knowledge about Inherited Metabolic Disorders (IMDs) has the potential to support early diagnosis as well as foster research into treatment options. Biological pathway databases can be used to create an overview of relevant articles and books describing IMDs and collect, curate, and summarize knowledge about these disorders. Reuse of the information captured in these databases in research requires the knowledge to be accurate but also machine-readable. WikiPathways is a community-driven project to establish a machinereadable knowledge base of biological processes. We here describe how pathways models from WikiPathways were used to represent the underlying biological mechanisms of many IMDs collected by domain experts over a period of six years. This paper describes a standardized approach to depict IMDs in WikiPathways, shows the current limitations in creating machine-readable disease information, and introduces an approach to support data curation based on these machine-readable biological pathways. Furthermore, several SPARQL-queries were developed to analyze the biological content created in these models. Using this approach, 47 pathways were collected about 345 diseases, involving 877 metabolites, 421 annotated metabolic interactions, 262 genes, and 587 proteins related to these disorders.
  summary: Researchers used WikiPathways, a community-driven project for biological pathway databases, to represent the underlying mechanisms of Inherited Metabolic Disorders (IMDs) collected by domain experts over six years. This approach standardized IMD representation in WikiPathways and showed current limitations in creating machine-readable disease information. The study also introduced SPARQL-queries to analyze the biological content created in these models, collecting 47 pathways about 345 diseases involving 877 metabolites, 421 metabolic interactions, 262 genes, and 587 proteins related to IMDs.
