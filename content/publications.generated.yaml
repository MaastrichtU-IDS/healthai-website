  abstract: Pharmacogenomics aims to understand pharmacological response with respect to genetic variation. Essential to the delivery of better health care is the use of pharmacogenomics knowledge to answer questions about therapeutic, pharmacological or genetic aspects. Several XML markup languages have been developed to capture pharmacogenomic and related information so as to facilitate data sharing. However, recent advances in semantic web technologies have presented exciting new opportunities for pharmacogenomics knowledge discovery by representing the information with machine understandable semantics. Progress in this area is illustrated with reference to the personalized medicine project that aims to facilitate pharmacogenomics knowledge discovery through intuitive knowledge capture and sophisticated question answering using automated reasoning over expressive ontologies.
  summary: Researchers developed XML markup languages to store pharmacogenomic data for sharing, but new semantic web technologies offer more efficient ways to discover this information by representing it in machine-understandable semantics. The personalized medicine project demonstrates how these advancements can help answer questions about therapeutic and genetic aspects of drug response through intuitive knowledge capture and sophisticated question answering using automated reasoning over expressive ontologies.
