  title: 'Electrocardiographic Imaging for Atrial Fibrillation: A Perspective From Computer Models and Animal Experiments to Clinical Value'
  authors: Salinet J., Molero R., Schlindwein F. S., Karel J., Rodrigo M., Rojo-Álvarez J. L., Berenfeld O., Climent A. M., Zenger B., Vanheusden F., Paredes J. G. S., MacLeod R., Atienza F., Guillem M. S., Cluitmans M., Bonizzi P.
