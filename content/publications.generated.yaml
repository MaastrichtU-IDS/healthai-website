  abstract: 'In combination with microspotting, whole-blood microfluidics can provide high-throughput information on multiple platelet functions in thrombus formation. Based on assessment of the inter- and intra-subject variability in parameters of microspot-based thrombus formation, we aimed to determine the platelet factors contributing to this variation. Blood samples from 94 genotyped healthy subjects were analyzed for conventional platelet phenotyping: i.e. hematologic parameters, platelet glycoprotein (GP) expression levels and activation markers (24 parameters). Furthermore, platelets were activated by ADP, CRP-XL or TRAP. Parallel samples were investigated for whole-blood thrombus formation (6 microspots, providing 48 parameters of adhesion, aggregation and activation). Microspots triggered platelet activation through GP Ib-V-IX, GPVI, CLEC-2 and integrins. For most thrombus parameters, inter-subject variation was 2-4 times higher than the intra-subject variation. Principal component analyses indicated coherence between the majority of parameters for the GPVI-dependent microspots, partly linked to hematologic parameters, and glycoprotein expression levels. Prediction models identified parameters per microspot that were linked to variation in agonist-induced α IIb β 3 activation and secretion. Common sequence variation of GP6 and FCER1G , associated with GPVI-induced α IIb β 3 activation and secretion, affected parameters of GPVI-and CLEC-2-dependent thrombus formation. Subsequent analysis of blood samples from patients with Glanzmann thrombasthenia or storage pool disease revealed thrombus signatures of aggregation-dependent parameters that were subject-dependent, but not linked to GPVI activity. Taken together, this high-throughput elucidation of thrombus formation revealed patterns of inter-subject differences in platelet function, which were partly related to GPVI-induced activation and common genetic variance linked to GPVI, but also included a distinct platelet aggregation component.'
  summary: This study used whole-blood microfluidics with microspots to assess platelet functions during thrombus formation across 94 healthy subjects. It found significant inter-subject variability in parameters related to platelet activation and adhesion compared to intra-subject variation, indicating that GPVI-dependent microspots showed the most consistent results. The researchers identified common genetic variants of GP6 and FCER1G associated with GPVI-induced αIIbβ3 activation, which affected thrombus formation signatures. This study provides insights into inter-subject variability in platelet function and its genetic basis, highlighting the importance of considering both intra- and inter-subject differences when studying thrombus formation.
