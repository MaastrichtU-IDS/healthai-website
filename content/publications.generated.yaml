  title: The electrocardiogram as a predictor of successful pharmacological cardioversion and progression of atrial fibrillation
  authors: Zeemering S., Lankveld T. A. R., Bonizzi P., Limantoro I., Bekkers S. C. A. M., Crijns H. J. G. M., Schotten U.
