  title: 'NBLAST: a cluster variant of BLAST for NxN comparisons'
  authors: Dumontier M., Hogue C. W.
  venue: BMC Bioinformatics
  doi: 10.1186/1471-2105-3-13
  citations: 23
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background The BLAST algorithm compares biological sequences to one another in order to determine shared motifs and common ancestry. However, the comparison of all non-redundant (NR) sequences against all other NR sequences is a computationally intensive task. We developed NBLAST as a cluster computer implementation of the BLAST family of sequence comparison programs for the purpose of generating pre-computed BLAST alignments and neighbour lists of NR sequences. Results NBLAST performs the heuristic BLAST algorithm and generates an exhaustive database of alignments, but it only computes alignments (i.e. the upper triangle) of a possible N2 alignments, where N is the set of all sequences to be compared. A task-partitioning algorithm allows for cluster computing across all cluster nodes and the NBLAST master process produces a BLAST sequence alignment database and a list of sequence neighbours for each sequence record. The resulting sequence alignment and neighbour databases are used to serve the SeqHound query system through a C/C++ and PERL Application Programming Interface (API). Conclusions NBLAST offers a local alternative to the NCBI's remote Entrez system for pre-computed BLAST alignments and neighbour queries. On our 216-processor 450 MHz PIII cluster, NBLAST requires ~24 hrs to compute neighbours for 850000 proteins currently in the non-redundant protein database.
  summary: Researchers developed NBLAST, a parallel implementation of BLAST that generates pre-computed alignments and neighbor lists for all sequences in the NCBI's non-redundant protein database using cluster computing. This allows faster access to sequence information compared to remote systems like Entrez. On a 216-processor system, it takes approximately 24 hours to compute neighbors for 850,000 proteins.
- year: 2002
  type: Journal
  title: 'SeqHound: biological sequence and structure database as a platform for bioinformatics research'
  authors: Michalickova K., Bader G. D., Dumontier M., Lieu H., Betel D., Isserlin R., Hogue C. W.
  venue: BMC Bioinformatics
  doi: 10.1186/1471-2105-3-32
  citations: 29
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background SeqHound has been developed as an integrated biological sequence, taxonomy, annotation and 3-D structure database system. It provides a high-performance server platform for bioinformatics research in a locally-hosted environment. Results SeqHound is based on the National Center for Biotechnology Information data model and programming tools. It offers daily updated contents of all Entrez sequence databases in addition to 3-D structural data and information about sequence redundancies, sequence neighbours, taxonomy, complete genomes, functional annotation including Gene Ontology terms and literature links to PubMed. SeqHound is accessible via a web server through a Perl, C or C++ remote API or an optimized local API. It provides functionality necessary to retrieve specialized subsets of sequences, structures and structural domains. Sequences may be retrieved in FASTA, GenBank, ASN.1 and XML formats. Structures are available in ASN.1, XML and PDB formats. Emphasis has been placed on complete genomes, taxonomy, domain and functional annotation as well as 3-D structural functionality in the API, while fielded text indexing functionality remains under development. SeqHound also offers a streamlined WWW interface for simple web-user queries. Conclusions The system has proven useful in several published bioinformatics projects such as the BIND database and offers a cost-effective infrastructure for research. SeqHound will continue to develop and be provided as a service of the Blueprint Initiative at the Samuel Lunenfeld Research Institute. The source code and examples are available under the terms of the GNU public license at the Sourceforge site http://sourceforge.net/projects/slritools/ in the SLRI Toolkit.
  summary: SeqHound is an integrated database system that provides a high-performance server platform for bioinformatics research, offering daily updated sequence data, 3-D structural information, and comprehensive annotations including Gene Ontology terms and PubMed links. It supports retrieval of sequences, structures, and functional annotation through web-based APIs or optimized local access methods, focusing on complete genomes, taxonomy, domain, and functional annotation while developing fielded text indexing functionality. SeqHound has been used in various bioinformatics projects and will continue to be provided as a service by the Blueprint Initiative at the Samuel Lunenfeld Research Institute under the GNU public license.
- year: 2002
  type: Journal
  title: Species-specific protein sequence and fold optimizations
  authors: Dumontier M., Michalickova K., Hogue C. W.
  venue: BMC Bioinformatics
  doi: 10.1186/1471-2105-3-39
  citations: 14
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Background An organism's ability to adapt to its particular environmental niche is of fundamental importance to its survival and proliferation. In the largest study of its kind, we sought to identify and exploit the amino-acid signatures that make species-specific protein adaptation possible across 100 complete genomes. Results Environmental niche was determined to be a significant factor in variability from correspondence analysis using the amino acid composition of over 360,000 predicted open reading frames (ORFs) from 17 archaea, 76 bacteria and 7 eukaryote complete genomes. Additionally, we found clusters of phylogenetically unrelated archaea and bacteria that share similar environments by amino acid composition clustering. Composition analyses of conservative, domain-based homology modeling suggested an enrichment of small hydrophobic residues Ala, Gly, Val and charged residues Asp, Glu, His and Arg across all genomes. However, larger aromatic residues Phe, Trp and Tyr are reduced in folds, and these results were not affected by low complexity biases. We derived two simple log-odds scoring functions from ORFs (CG) and folds (CF) for each of the complete genomes. CF achieved an average cross-validation success rate of 85 +/- 8% whereas the CG detected 73 +/- 9% species-specific sequences when competing against all other non-redundant CG. Continuously updated results are available at http://genome.mshri.on.ca. Conclusion Our analysis of amino acid compositions from the complete genomes provides stronger evidence for species-specific and environmental residue preferences in genomic sequences as well as in folds. Scoring functions derived from this work will be useful in future protein engineering experiments and possibly in identifying horizontal transfer events.
  summary: Researchers analyzed 100 complete genomes to identify amino-acid signatures that enable species-specific adaptation across different organisms, finding significant environmental niche influence on variability and clusters of related but phylogenetically unrelated bacteria and archaea sharing similar environments based on amino acid composition. This work provides stronger evidence for species-specific residue preferences in genomic sequences and folds, with scoring functions derived from this analysis useful for future protein engineering experiments and identifying horizontal transfer events.
