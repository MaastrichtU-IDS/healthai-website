  tags: []
  abstract: Electrocardiographic imaging (ECGI) is a technique to reconstruct non-invasively the electrical activity on the heart surface from body-surface potential recordings and geometric information of the torso and the heart. ECGI has shown scientific and clinical value when used to characterize and treat both atrial and ventricular arrhythmias. Regarding atrial fibrillation (AF), the characterization of the electrical propagation and the underlying substrate favoring AF is inherently more challenging than for ventricular arrhythmias, due to the progressive and heterogeneous nature of the disease and its manifestation, the small volume and wall thickness of the atria, and the relatively large role of microstructural abnormalities in AF. At the same time, ECGI has the advantage over other mapping technologies of allowing a global characterization of atrial electrical activity at every atrial beat and non-invasively. However, since ECGI is time-consuming and costly and the use of electrical mapping to guide AF ablation is still not fully established, the clinical value of ECGI for AF is still under assessment. Nonetheless, AF is known to be the manifestation of a complex interaction between electrical and structural abnormalities and therefore, true electro-anatomical-structural imaging may elucidate important key factors of AF development, progression, and treatment. Therefore, it is paramount to identify which clinical questions could be successfully addressed by ECGI when it comes to AF characterization and treatment, and which questions may be beyond its technical limitations. In this manuscript we review the questions that researchers have tried to address on the use of ECGI for AF characterization and treatment guidance (for example, localization of AF triggers and sustaining mechanisms), and we discuss the technological requirements and validation. We address experimental and clinical results, limitations, and future challenges for fruitful application of ECGI for AF understanding and management. We pay attention to existing techniques and clinical application, to computer models and (animal or human) experiments, to challenges of methodological and clinical validation. The overall objective of the study is to provide a consensus on valuable directions that ECGI research may take to provide future improvements in AF characterization and treatment guidance.
  summary: Researchers have developed electrocardiographic imaging (ECGI) as a non-invasive technique for reconstructing electrical activity on the heart surface from body-surface potential recordings, with significant scientific and clinical value in characterizing and treating both atrial and ventricular arrhythmias. However, ECGI is time-consuming and costly, and its use to guide ablation procedures for atrial fibrillation (AF) remains under assessment. Despite these limitations, ECGI has the advantage of providing a global characterization of atrial electrical activity at every beat without invasively mapping the heart. The study reviews questions that researchers have tried to address with ECGI in AF characterization and treatment guidance, discusses technological requirements and validation, and highlights existing techniques and challenges for future improvements in AF understanding and management.
- year: 2021
