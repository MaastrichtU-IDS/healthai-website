  abstract: This special issue covers selected papers from the 18th Bio-Ontologies Special Interest Group meeting and Phenotype Day, which took place at the Intelligent Systems for Molecular Biology (ISMB) conference in Dublin in 2015. The papers presented in this collection range from descriptions of software tools supporting ontology development and annotation of objects with ontology terms, to applications of text mining for structured relation extraction involving diseases and phenotypes, to detailed proposals for new ontologies and mapping of existing ontologies. Together, the papers consider a range of representational issues in bio-ontology development, and demonstrate the applicability of bio-ontologies to support biological and clinical knowledge-based decision making and analysis.The full set of papers in the Thematic Issue is available at http://www.biomedcentral.com/collections/sig .
  summary: This collection of papers from a special issue covers various aspects of bio-ontology development, including software tools for ontology creation, text mining applications for disease phenotype extraction, and proposals for new ontologies. The papers discuss representational issues in bio-ontology development and demonstrate the practical application of these ontologies to support biological and clinical knowledge-based decision-making and analysis.
