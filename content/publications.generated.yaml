  title: Comparing Drug-Disease Associations in Clinical Practice Guideline Recommendations and Drug Product Label Indications
  authors: Leung Tiffany I., Dumontier Michel
  venue: Studies in Health Technology and Informatics
  doi: 10.3233/978-1-61499-564-7-1039
