  title: 'FALDO: a semantic standard for describing the location of nucleotide and protein feature annotation'
  authors: Bolleman J. T., Mungall C. J., Strozzi F., Baran J., Dumontier M., Bonnal R. J. P., Buels R., Hoehndorf R., Fujisawa T., Katayama T., Cock P. J. A.
