  abstract: We present the Linked SPARQL Queries (LSQ) dataset, which currently describes 43.95 million executions of 11.56 million unique SPARQL queries extracted from the logs of 27 different endpoints. The LSQ dataset provides RDF descriptions of each such query, which are indexed in a public LSQ endpoint, allowing interested parties to find queries with the characteristics they require. We begin by describing the use cases envisaged for the LSQ dataset, which include applications for research on common features of queries, for building custom benchmarks, and for designing user interfaces. We then discuss how LSQ has been used in practice since the release of four initial SPARQL logs in 2015. We discuss the model and vocabulary that we use to represent these queries in RDF. We then provide a brief overview of the 27 endpoints from which we extracted queries in terms of the domain to which they pertain and the data they contain. We provide statistics on the queries included from each log, including the number of query executions, unique queries, as well as distributions of queries for a variety of selected characteristics. We finally discuss how the LSQ dataset is hosted and how it can be accessed and leveraged by interested parties for their use cases.
  summary: This study presents the Linked SPARQL Queries (LSQ) dataset, which contains 43.95 million executions of 11.56 million unique SPARQL queries from various endpoints. The dataset provides RDF descriptions of these queries and indexes them at a public endpoint for finding specific query characteristics. It aims to facilitate research on common features of queries, building custom benchmarks, and designing user interfaces. The study discusses how LSQ has been used in practice since its release in 2015 and describes the model and vocabulary used to represent queries in RDF. The dataset includes statistics on query executions, unique queries, and distributions for various characteristics from each log source.
- year: 2024
  type: Journal
  title: Macrophages excite muscle spindles with glutamate to bolster locomotion
  authors: Yan Y., Antolin N., Zhou L., Xu L., Vargas I. L., Gomez C. D., Kong G., Palmisano I., Yang Y., Chadwick J., Müller F., Bull A. M. J., Lo Celso C., Primiano G., Servidei S., Perrier J. F., Bellardita C., Di Giovanni S.
  venue: Nature
  doi: 10.1038/s41586-024-08272-5
  citations: 17
  orcids:
  - 0000-0002-2538-9046
  tags: []
  abstract: Abstract The stretch reflex is a fundamental component of the motor system that orchestrates the coordinated muscle contractions underlying movement. At the heart of this process lie the muscle spindles (MS), specialized receptors finely attuned to fluctuations in tension within intrafusal muscle fibres. The tension variation in the MS triggers a series of neuronal events including an initial depolarization of sensory type Ia afferents that subsequently causes the activation of motoneurons within the spinal cord 1,2 . This neuronal cascade culminates in the execution of muscle contraction, underscoring a presumed closed-loop mechanism between the musculoskeletal and nervous systems. By contrast, here we report the discovery of a new population of macrophages with exclusive molecular and functional signatures within the MS that express the machinery for synthesizing and releasing glutamate. Using mouse intersectional genetics with optogenetics and electrophysiology, we show that activation of MS macrophages (MSMP) drives proprioceptive sensory neuron firing on a millisecond timescale. MSMP activate spinal circuits, motor neurons and muscles by means of a glutamate-dependent mechanism that excites the MS. Furthermore, MSMP respond to neural and muscle activation by increasing the expression of glutaminase, enabling them to convert the uptaken glutamine released by myocytes during muscle contraction into glutamate. Selective silencing or depletion of MSMP in hindlimb muscles disrupted the modulation of the stretch reflex for force generation and sensory feedback correction, impairing locomotor strategies in mice. Our results have identified a new cellular component, the MSMP, that directly regulates neural activity and muscle contraction. The glutamate-mediated signalling of MSMP and their dynamic response to sensory cues introduce a new dimension to our understanding of sensation and motor action, potentially offering innovative therapeutic approaches in conditions that affect sensorimotor function.
  summary: Researchers discovered a previously unknown population of macrophages within muscle spindles (MS) called muscle spindles macrophages (MSMP). MSMP express machinery for synthesizing glutamate, which they release to excite sensory neurons and spinal circuits. This mechanism is essential for proprioception and modulating stretch reflexes for force generation and sensory feedback correction in mice.
