  tags: []
  abstract: Clinical practice guidelines (CPGs) and structured product labels (SPLs) are both intended to promote evidence-based medical practices and guide clinicians' prescribing decisions. However, it is unclear how well CPG recommendations about pharmacologic therapies for certain diseases match SPL indications for recommended drugs. In this study, we use publicly available data and text mining methods to examine drug-disease associations in CPG recommendations and SPL treatment indications for 15 common chronic conditions. Preliminary results suggest that there is a mismatch between guideline-recommended pharmacologic therapies and SPL indications. Conflicting or inconsistent recommendations and indications may complicate clinical decision making and implementation or measurement of best practices.
  summary: This study examined how well clinical practice guidelines (CPGs) and structured product labels (SPLs) align for 15 common chronic conditions, finding that there is often a mismatch between the recommended drugs in CPGs and their indications on SPLs. This inconsistency can complicate clinicians' decision-making and implementation of best practices.
