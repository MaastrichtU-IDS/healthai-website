  title: Selecting repetitive focal and rotational activation patterns with the highest probability of being a source of atrial fibrillation
  authors: Hermans B. J., Özgül O., Wolf M., Marques V. G., van Hunnik A., Verheule S., Chaldoupi S., Linz D., El Haddad M., Duytschaever M., Bonizzi P., Vernooy K., Knecht S., Zeemering S., Schotten U.
  venue: Journal of Molecular and Cellular Cardiology Plus
  doi: 10.1016/j.jmccpl.2024.100064
