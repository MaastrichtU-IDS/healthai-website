  title: Finding Our Way through Phenotypes
  authors: Deans A. R., Lewis S. E., Huala E., Anzaldo S. S., Ashburner M., Balhoff J. P., Blackburn D. C., Blake J. A., Burleigh J. G., Chanet B., Cooper L. D., Courtot M., Csösz S., Cui H., Dahdul W., Das S., Dececchi T. A., Dettai A., Diogo R., Druzinsky R. E., Dumontier M., Franz N. M., Friedrich F., Gkoutos G. V., Haendel M., Harmon L. J., Hayamizu T. F., He Y., Hines H. M., Ibrahim N., Jackson L. M., Jaiswal P., James-Zorn C., Köhler S., Lecointre G., Lapp H., Lawrence C. J., Le Novère N., Lundberg J. G., Macklin J., Mast A. R., Midford P. E., Mikó I., Mungall C. J., Oellrich A., Osumi-Sutherland D., Parkinson H., Ramírez M. J., Richter S., Robinson P. N., Ruttenberg A., Schulz K. S., Segerdell E., Seltmann K. C., Sharkey M. J., Smith A. D., Smith B., Specht C. D., Squires R. B., Thacker R. W., Thessen A., Fernandez-Triana J., Vihinen M., Vize P. D., Vogt L., Wall C. E., Walls R. L., Westerfeld M., Wharton R. A., Wirkner C. S., Woolley J. B., Yoder M. J., Zorn A. M., Mabee P.
  venue: PLoS Biology
  doi: 10.1371/journal.pbio.1002033
  citations: 183
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: Despite a large and multifaceted effort to understand the vast landscape of phenotypic data, their current form inhibits productive data analysis. The lack of a community-wide, consensus-based, human- and machine-interpretable language for describing phenotypes and their genomic and environmental contexts is perhaps the most pressing scientific bottleneck to integration across many key fields in biology, including genomics, systems biology, development, medicine, evolution, ecology, and systematics. Here we survey the current phenomics landscape, including data resources and handling, and the progress that has been made to accurately capture relevant data descriptions for phenotypes. We present an example of the kind of integration across domains that computable phenotypes would enable, and we call upon the broader biology community, publishers, and relevant funding agencies to support efforts to surmount today's data barriers and facilitate analytical reproducibility.
  summary: Researchers surveyed current challenges in phenomics data representation, emphasizing a need for standardized language to bridge biological fields like genomics, systems biology, and medicine. They propose computable phenotypes could enable interdisciplinary integration but call on the broader community to address data barriers for improved analysis and reproducibility.
- year: 2015
  type: Journal
  title: 'GFVO: the Genomic Feature and Variation Ontology'
  authors: Baran J., Durgahee B. S. B., Eilbeck K., Antezana E., Hoehndorf R., Dumontier M.
  venue: PeerJ
  doi: 10.7717/peerj.933
  citations: 5
  orcids:
  - 0000-0003-4727-9435
  tags: []
  abstract: 'Falling costs in genomic laboratory experiments have led to a steady increase of genomic feature and variation data. Multiple genomic data formats exist for sharing these data, and whilst they are similar, they are addressing slightly different data viewpoints and are consequently not fully compatible with each other. The fragmentation of data format specifications makes it hard to integrate and interpret data for further analysis with information from multiple data providers. As a solution, a new ontology is presented here for annotating and representing genomic feature and variation dataset contents. The Genomic Feature and Variation Ontology (GFVO) specifically addresses genomic data as it is regularly shared using the GFF3 (incl. FASTA), GTF, GVF and VCF file formats. GFVO simplifies data integration and enables linking of genomic annotations across datasets through common semantics of genomic types and relations. Availability and implementation. The latest stable release of the ontology is available via its base URI; previous and development versions are available at the ontology''s GitHub repository: https://github.com/BioInterchange/Ontologies; versions of the ontology are indexed through BioPortal (without external class-/property-equivalences due to BioPortal release 4.10 limitations); examples and reference documentation is provided on a separate web-page: http://www.biointerchange.org/ontologies.html. GFVO version 1.0.2 is licensed under the CC0 1.0 Universal license (https://creativecommons.org/publicdomain/zero/1.0) and therefore de facto within the public domain; the ontology can be appropriated without attribution for commercial and non-commercial use.'
  summary: A new ontology, Genomic Feature and Variation Ontology (GFVO), has been developed to simplify data integration and linking of genomic annotations across multiple datasets sharing GFF3, GTF, GVF, and VCF file formats. The GFVO provides common semantics for genomic types and relations, making it easier to integrate and interpret data from various sources.
