  title: Platelet-primed interactions of coagulation and anticoagulation pathways in flow-dependent thrombus formation
  authors: Brouns S. L. N., van Geffen J. P., Campello E., Swieringa F., Spiezia L., van Oerle R., Provenzale I., Verdoold R., Farndale R. W., Clemetson K. J., Spronk H. M. H., van der Meijden P. E. J., Cavill R., Kuijpers M. J. E., Castoldi E., Simioni P., Heemskerk J. W. M.
  venue: Scientific Reports
