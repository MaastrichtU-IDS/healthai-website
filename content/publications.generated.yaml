  title: 'Bloodstain Pattern Analysis: implementation of a fluid dynamic model for position determination of victims'
  authors: Laan N., de Bruin K. G., Slenter D., Wilhelm J., Jermy M., Bonn D.
  venue: Scientific Reports
  doi: 10.1038/srep11461
  citations: 72
  orcids:
  - 0000-0001-8449-1318
  tags: []
  abstract: 'Abstract Bloodstain Pattern Analysis is a forensic discipline in which, among others, the position of victims can be determined at crime scenes on which blood has been shed. To determine where the blood source was investigators use a straight-line approximation for the trajectory, ignoring effects of gravity and drag and thus overestimating the height of the source. We determined how accurately the location of the origin can be estimated when including gravity and drag into the trajectory reconstruction. We created eight bloodstain patterns at one meter distance from the wall. The origin’s location was determined for each pattern with: the straight-line approximation, our method including gravity and our method including both gravity and drag. The latter two methods require the volume and impact velocity of each bloodstain, which we are able to determine with a 3D scanner and advanced fluid dynamics, respectively. We conclude that by including gravity and drag in the trajectory calculation, the origin’s location can be determined roughly four times more accurately than with the straight-line approximation. Our study enables investigators to determine if the victim was sitting or standing, or it might be possible to connect wounds on the body to specific patterns, which is important for crime scene reconstruction.'
  summary: Researchers found that including gravity and drag in bloodstain trajectory calculations can significantly improve accuracy in determining where a blood source originated at a crime scene, potentially aiding forensic investigations by revealing more about victims' positions or connecting injuries to specific patterns.
