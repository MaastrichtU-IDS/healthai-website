blog:
  - date: "14 Apr 2026"
    tag: Federated AI
    title: Why sending algorithms to data is the future of clinical research
    excerpt: >
      Moving computation to distributed data sources rather than centralising sensitive
      patient records is fast becoming the standard for responsible AI in healthcare.
      Here's why and how we're building this infrastructure.
    author: Visara Urovi
    initials: VU
    img: "[ lab / server room photo ]"

  - date: "02 Mar 2026"
    tag: FAIR Data
    title: "FAIR data five years on: progress, pitfalls and what comes next"
    excerpt: >
      The FAIR principles turned ten in 2026. We reflect on what the health data
      community has achieved — and where significant challenges remain for truly
      machine-actionable data.
    author: Michel Dumontier
    initials: MD
    img: "[ data infrastructure graphic ]"

  - date: "19 Feb 2026"
    tag: Signal Processing
    title: Can a smartwatch detect your next heart attack? What the science actually says
    excerpt: >
      Consumer wearables can now capture single-lead ECG. We unpack the evidence for
      AI-powered arrhythmia detection, the clinical validation gaps, and the regulatory
      path forward.
    author: Pietro Bonizzi
    initials: PB
    img: "[ ECG / wearable photo ]"

  - date: "08 Jan 2026"
    tag: Clinical NLP
    title: "The Dutch EHR challenge: adapting LLMs to a low-resource clinical language"
    excerpt: >
      English dominates NLP benchmarks, but most European hospitals document in their
      national language. Our work adapting transformer models to Dutch clinical text
      reveals lessons for multilingual health AI.
    author: Chang Sun
    initials: CS
    img: "[ clinical text / NLP illustration ]"

  - date: "11 Dec 2025"
    tag: Bioinformatics
    title: "Integrating the -omes: why multi-omics is harder than it looks"
    excerpt: >
      Combining genomics, proteomics and metabolomics data is scientifically compelling
      but computationally brutal. A practical account of the challenges and our solutions.
    author: Rachel Cavill
    initials: RC
    img: "[ genomics / lab photo ]"

  - date: "24 Nov 2025"
    tag: Precision Medicine
    title: "Closed-loop AI for diabetes: from idea to clinical pilot"
    excerpt: >
      From the first prototype to the first patient: the two-year journey of deploying
      an AI-powered continuous glucose management system in a real hospital setting.
    author: Konstantia Zarkogianni
    initials: KZ
    img: "[ diabetes / CGM device photo ]"

