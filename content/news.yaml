talks:
- event: 'Official visit of Ms. Maria Cristina Russo (Deputy Director-General, DG RTD, European Commission) to Maastricht University'
  date: 22 Apr 2026
  title: 'AI for Europe: Trust. Understand. Apply.'
  speaker: Michel Dumontier
  type: Presentation
  url: https://doi.org/10.5281/zenodo.19764579
  description: The presentation outlines a vision for positioning Europe as a global
    leader in artificial intelligence by focusing on trustworthy, interpretable, and
    impactful AI. It argues that AI should function as a public good—reliable, accountable,
    and beneficial to society—while advancing European science.
