news:
- day: '25'
  month: Apr
  year: 2026
  title: Welcome to the new HAIR Group website
  body: "We've launched a new website for the Health AI Research Group at Maastricht\
    \ University. It brings together our people, research themes, publications, and\
    \ news in one place — with live data drawn from ORCID and Crossref. Explore\
    \ what we do and get in touch."
