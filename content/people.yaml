  group: Researchers
  themes: [Precision Medicine]
  bio: >
    Mahmoud's PhD research focuses on generative AI for synthetic data generation
    across multiple medical modalities, enabling privacy-preserving use of clinical
    data for machine learning and biomedical research.
  keywords: [Generative AI, Synthetic Data, Medical Data, Generative Models]
  orcid: "0000-0002-5099-7609"
