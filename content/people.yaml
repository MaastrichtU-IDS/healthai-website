- name: Seun Adekunle
  role: PhD Researcher
  group: Researchers
  themes: [Precision Medicine]
  bio: >
    Seun's PhD research applies machine learning methods to improve pension savings
    outcomes in the Netherlands, combining financial data analysis with AI-driven
    decision support.
  keywords: [Machine Learning, Financial AI, Decision Support]
  orcid: ""
  url: "https://www.maastrichtuniversity.nl/oh-adekunle"
