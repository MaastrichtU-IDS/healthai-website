- name: Denise Slenter
  slug: denise-slenter
  role: Assistant Professor
  group: Faculty
  image_url: "assets/people/denise-slenter.jpg"
  themes: [Neurosymbolic AI, Computational Biology & Bioinformatics]
  bio: >
    Dr. Denise Slenter is an Assistant Professor at the Institute of Data Science, Maastricht
    University. She completed her PhD (2024, "Symphonies of metabolomics") combining metabolic
    pathway knowledge, inherited metabolic disorders, semantic web technologies, and
    metabolomics data. Her work spans WikiPathways, Wikidata, knowledge graphs, and FAIR data
    principles applied to life sciences. She is a core contributor to WikiPathways and has
    authored publications on lipidomics bioinformatics, metabolic network analysis, and the
    COVID-19 Disease Map. She currently holds a Kootstra Talent Fellowship for the Tears of
    Joy project, developing a risk assessment model for recurrent miscarriage by integrating
    immunological, ultrasound, and lifestyle data.
