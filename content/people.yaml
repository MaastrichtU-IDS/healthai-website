- name: Michel Dumontier
  role: Distinguished Professor
  group: Faculty
  themes: [FAIR Data, Knowledge Graphs]
  bio: >
    Michel is Distinguished Professor of Data Science for Health. His research focuses
    on the development of FAIR data ecosystems for biomedical research and the application
    of knowledge graphs in drug discovery and clinical decision support. He leads the FAIR
    Data initiative at Maastricht University and chairs the FAIR Metrics group.
  keywords: [FAIR Data, Knowledge Graphs, Semantic Web, Drug Discovery, Open Science]
  orcid: "0000-0003-4727-9435"
  url: https://dumontierlab.com
  email: michel.dumontier@maastrichtuniversity.nl

- name: Christopher Brewster
  role: Full Professor
  group: Faculty
  themes: [Computational Biology]
  bio: >
    Christopher's research spans knowledge management, supply chain AI and digital health.
    He applies graph-based and machine learning methods to link complex heterogeneous data
    sources in agri-food and healthcare contexts.
  keywords: [Knowledge Management, AI, Supply Chain, Digital Agriculture, Graph AI]
  orcid: ""
  url: ""
  email: c.brewster@maastrichtuniversity.nl

- name: Visara Urovi
  role: Associate Professor
  group: Faculty
  themes: [Federated AI]
  bio: >
    Visara leads research on federated learning and privacy-preserving AI, enabling
    collaborative analysis across distributed clinical datasets without sharing raw data.
    She is the UM lead on the Personal Health Train project and was named an ELLIS Fellow in 2026.
  keywords: [Federated Learning, Privacy-Preserving AI, GDPR, Distributed ML, Health Data]
  orcid: ""
  url: ""
  email: v.urovi@maastrichtuniversity.nl

- name: Chang Sun
  role: Assistant Professor
  group: Faculty
  themes: [Clinical NLP, Federated AI]
  bio: >
    Chang develops natural language processing and text mining methods tailored to clinical
    documents. His work on adapting LLMs to low-resource clinical languages (Dutch, German)
    bridges NLP research and real-world hospital deployment.
  keywords: [Clinical NLP, Large Language Models, Text Mining, ICD Coding, Dutch EHR]
  orcid: ""
  url: ""
  email: chang.sun@maastrichtuniversity.nl

- name: Remzi Celebi
  role: Assistant Professor
  group: Faculty
  themes: [FAIR Data, Clinical NLP]
  bio: >
    Remzi works at the intersection of FAIR data, rare disease informatics and clinical
    knowledge graphs. He coordinates multiple European rare disease data infrastructure
    projects and is an active contributor to FAIR metrics development.
  keywords: [Rare Diseases, FAIR Principles, Linked Data, Ontologies, Knowledge Graphs]
  orcid: ""
  url: ""
  email: r.celebi@maastrichtuniversity.nl

- name: Rohan Nanda
  role: Assistant Professor
  group: Faculty
  themes: [Precision Medicine]
  bio: >
    Rohan focuses on AI-based clinical decision support systems, with a particular interest
    in risk stratification models, hospital readmission prediction and the integration of
    structured and unstructured data in electronic health records.
  keywords: [Clinical Decision Support, Risk Stratification, EHR, Predictive Modelling, Hospital AI]
  orcid: ""
  url: ""
  email: r.nanda@maastrichtuniversity.nl

- name: Aikaterina Kasimati
  role: Assistant Professor
  group: Faculty
  themes: [Precision Medicine]
  bio: >
    Katerina's research combines IoT, wearable sensing and AI to create smart personalised
    health systems. She focuses on precision nutrition and digital interventions for chronic
    disease management, integrating physiological and lifestyle data streams.
  keywords: [IoT, Wearables, Precision Nutrition, Digital Health, Chronic Disease]
  orcid: ""
  url: ""
  email: a.kasimati@maastrichtuniversity.nl

- name: Pietro Bonizzi
  role: Associate Professor
  group: Faculty
  themes: [Signal Processing]
  bio: >
    Pietro specialises in biomedical signal processing and machine learning for cardiac
    monitoring. His work on non-invasive ECG analysis and atrial fibrillation detection
    from consumer wearables is applied in clinical and home settings.
  keywords: [ECG, Arrhythmia, Atrial Fibrillation, Signal Processing, Wearable AI]
  orcid: ""
  url: ""
  email: p.bonizzi@maastrichtuniversity.nl

- name: Rachel Cavill
  role: Assistant Professor
  group: Faculty
  themes: [Computational Biology]
  bio: >
    Rachel develops statistical and machine learning methods for integrating multi-omics
    datasets. Her research addresses the computational challenges of high-dimensional
    biological data to identify disease biomarkers and drug targets.
  keywords: [Bioinformatics, Multi-Omics, Biomarker Discovery, Statistical ML, Genomics]
  orcid: ""
  url: ""
  email: r.cavill@maastrichtuniversity.nl

- name: Konstantia Zarkogianni
  role: Associate Professor
  group: Faculty
  themes: [Precision Medicine, Signal Processing]
  bio: >
    Konstantia works on AI-powered diabetes management, combining continuous glucose
    monitoring data, dietary logs and wearable biosignals with knowledge graph reasoning
    to personalise insulin dosing and lifestyle recommendations.
  keywords: [Diabetes AI, CGM, Personalised Interventions, Knowledge Graphs, Wearables]
  orcid: ""
  url: ""
  email: k.zarkogianni@maastrichtuniversity.nl

- name: Shervin Mehryar
