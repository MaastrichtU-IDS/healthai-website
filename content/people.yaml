- name: Chang Sun
  slug: chang-sun
  role: Assistant Professor
  group: Faculty
  image_url: "assets/people/chang-sun.jpg"
  themes: [Regulatory AI, Federated & Privacy-Preserving AI]
  bio: >
    Chang Sun is an Assistant Professor at the Institute of Data Science at Maastricht
    University. Her research interests cover privacy-preserving distributed data mining,
    federated/distributed machine learning, synthetic data generation, decentralized
    personal health data management, health data sharing, management and analysis,
    personal knowledge graphs, and linked data. She used data science technologies (e.g.,
    deep learning models, federated machine learning models, GANS) to solve research
    challenges in health domains such as diabetes, rare diseases (Leukemia),
    cardiovascular diseases, and sleeping disorders, and also in social sciences.
