tagline: Responsible Data Science. Trustworthy AI. Better Health
tagline_italic: Better Health
hero_body: >
  We use data science and AI to explore what we eat, how we live, and how healthy we are — from the molecular machines in our body, to the nutrients in our food, and to the health of our planet.
  
  Our work combines responsible data science with trustworthy artificial intelligence to make make data usable and to ensure AI is aligned to human values. We build tools that bring knowledge to the fingertips of citizens, researchers, clinicians, farmers, and policymakers so they can make better decisions. 
  
