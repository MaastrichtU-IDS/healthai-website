themes:
  - id: precision
    number: "01"
    title: Precision Medicine & Digital Health
    icon: "◎"
    leads: [Konstantia Zarkogianni, Remzi Celebi, Chang Sun, Pietro Bonizzi, Visara Urovi, Michel Dumontier]
    desc: >
      One-size-fits-all medicine is giving way to personalised interventions driven
      by data. We integrate IoT sensor streams, EHR data and knowledge graphs to
      deliver closed-loop AI systems that adapt recommendations to individual
      patients in real time.
    projects: [CHARM, iCare4CVD, DACIL]

  - id: agriculture
    number: "02"
    title: Precision Agriculture, Food & Health
    icon: "⌇"
    leads: [Aikaterina Kasimati,Christopher Brewster]
    desc: >
      Precision Agriculture, Food & Health integrates data-driven farming, nutrition science, and health analytics to optimize outcomes from soil to society.
      It leverages AI, sensors, and interoperable data systems to improve crop production, food quality, and personalized health—linking sustainable agriculture directly to better human and environmental well-being.
    projects: [EU-FarmBook, AMBROSIA]

  - id: bioinfo
    number: "03"
    title: Computational Biology & Bioinformatics
    icon: "⌬"
    leads: [Rachel Cavill, Denise Slenter]
    desc: >
      Understanding complex disease requires integrating information across molecular
      scales. We develop scalable computational workflows for multi-omics integration —
      linking genomics, proteomics and metabolomics data — to identify biomarkers and
      advance drug target discovery.
    projects: []

  - id: fair
    number: "04"
    title: Neurosymbolic AI
    icon: "◈"
    leads: [Michel Dumontier, Remzi Celebi, Denise Slenter]
    desc: >
      We build neurosymbolic AI frameworks that enable machines to reason over biomedical data 
      using both learned representations and formal domain knowledge. Leveraging FAIR data 
      principles, ontologies, and knowledge graphs, we create semantically grounded models 
      that connect molecular, clinical, and population-level information. These systems 
      support explainable inference, hypothesis generation, and trustworthy AI applications in healthcare and life sciences.
    projects: [GENIUS, BDT, AIDAVA]

  - id: federated
    number: "05"
    title: Federated & Privacy-Preserving AI
    icon: "⊞"
    leads: [Visara Urovi, Chang Sun]
    desc: >
      Sensitive health data cannot simply be pooled. We develop federated learning
      architectures that allow AI models to learn from distributed patient data across
      hospitals and countries — without the data ever leaving its source. Our work
      covers algorithm design, privacy guarantees and real-world deployment.
    projects: [REALM]

  - id: nlp
    number: "05"
    title: Regulatory AI
    icon: "❋"
    leads: [Rohan Nanda, Michel Dumontier]
    desc: >
      Regulatory AI captures the dual role of AI in modern governance: using AI to improve regulatory processes, and designing regulation to ensure AI systems are safe, transparent, and accountable.
      It emphasizes a feedback loop where AI enhances evidence generation and oversight, while regulatory frameworks shape trustworthy, human-centered AI deployment.
    projects: [REALM]


projects:
  - acronym: AIDAVA
    title: AI powered Data Curation & Publishing Virtual Assistant
    theme: Neurosymbolic AI
    desc: >
      AIDAVA develops an AI-powered virtual assistant to automate the curation, integration, and publishing 
      of personal health data from heterogeneous sources (e.g., hospitals, devices, patient-reported data).
    team: [Michel Dumontier, Remzi Celebi]
    funder: European Commission (Horizon Europe)
    amount: "€7.7M"
    period: "2022–2026"
    status: Active
    featured: true
    url: https://aidava.eu/
    logo: https://www.aidava.eu/user/themes/aidava/images/logo.svg

  - acronym: REALM
    title: REALM Real-world-data Enabled Assessment for heaLth regulatory decision-Making
    theme: Regulatory AI
    desc: >
      REALM builds a collaborative regulatory ecosystem for evaluating and certifying medical device software (including AI) 
      using real-world and synthetic data.
    team: [Visara Urovi, Chang Sun, Michel Dumontier]
    funder: European Commission (Horizon Europe)
    amount: "€7M"
    period: "2023–2026"
    status: Active
    featured: true
    url: https://www.realm-project.eu/
    logo: https://vito.be/sites/vito/files/styles/logo/public/logo/realm-logo.png?itok=BNkUKxCi

  - acronym: CHARM
    title: CHARM
    theme: Precision Medicine & Digital Health
    desc: >
      The CHARM project is an Advanced Research Projects Agency for Health–funded initiative developing a complete, 
      AI-enabled biomedical data pipeline that spans data collection through to clinical decision support.
    team: [Chang Sun, Michel Dumontier]
    funder: ARPA-H
    amount: "€8.7M"
    period: "2024–2027"
    status: Active
    featured: true
    logo: https://avatars.githubusercontent.com/u/197785359?s=200&v=4

  - acronym: BDT
    title: Biomedical Data Translator
    theme: Neurosymbolic AI
    desc: >
      The Biomedical Data Translator is a flagship program of the National Center for Advancing Translational Sciences 
      that aims to integrate and “translate” diverse biomedical data into actionable knowledge for research and clinical discovery.
    team: [Remzi Celebi, Michel Dumontier]
    funder: NIH
    amount: "€2.5M"
    period: "2016–2024"
    status: Completed
    url: https://ncats.nih.gov/translator

  - acronym: AMBROSIA
    title: Ambrosia - Bridging Knowledge, Communication, and Action for Food Safety in a Changing Climate
    theme: Precision Agriculture, Food & Health
    desc: >
      AMBROSIA is a Horizon Europe project focused on transforming how Europe assesses and manages food safety
      risks under climate change. It develops a holistic, AI-enabled risk assessment framework that integrates
      climate models with food safety data across the entire supply chain (“farm to fork”).
    team: [Christopher Brewster, Michel Dumontier]
    funder: European Commission (Horizon Europe)
    amount: "€3.97M"
    period: "2024–2027"
    status: Active
    url: https://www.ambrosia-project.eu/
    logo: https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSJWx-L9ym7JzQwRVz7bExqj81WHofXg-NFUQ&s

  - acronym: EU-FarmBook
    title: EU-FarmBook
    theme: Precision Agriculture, Food & Health
    desc: >
      EU-FarmBook develops an EU-wide digital knowledge platform to support knowledge exchange in agriculture 
      and forestry. It connects stakeholders within Agricultural Knowledge and Innovation Systems (AKIS), 
      including farmers, advisors, researchers, and policymakers.
    team: [Christopher Brewster]
    funder: European Commission (Horizon Europe)
    amount: ""
    period: "2022–2026"
    status: Active
    url: https://welcome.eufarmbook.eu/
    logo: https://welcome.eufarmbook.eu/wp-content/uploads/Photo-01_EU-FarmBook_Logo_-Horizontal_Color.png

  - acronym: GENIUS
    title: Generative-Enhanced Next-generation Intelligent Understanding SystemsIUS
    theme: Neurosymbolic AI
    desc: >
      GENIUS is a public-private partnership that specifically targets the development of next-generation generative AI systems that 
      augment human expertise, combining advances in large language models with structured knowledge 
      and domain-specific reasoning.
    team: [Chang Sun, Remzi Celebi, Christopher Brewster, Michel Dumontier]
    funder: NWO (Netherlands Organisation for Scientific Research)
    amount: "€3M"
    period: "2024–2028"
    status: Active
    url: https://www.genius-lab.nl/
    logo: https://images.squarespace-cdn.com/content/v1/67b32da4169313782ad07b05/f892c172-2ee8-4f9c-8851-e7efb0c3e674/Genius+Transparent-V2.png?format=1500w

  - acronym: iCARE4CVD
    title: Intelligent CArdiovascular pREvention and care for Chronic Vascular Diseases
    theme: Precision Medicine & Digital Health
    desc: >
      iCARE4CVD is a Horizon Europe project that develops AI-driven approaches for personalised
      prevention and management of cardiovascular disease. It integrates clinical, lifestyle,
      and real-world data (including wearables) to enable early risk prediction, continuous
      monitoring, and tailored interventions, supporting a shift from reactive treatment to
      proactive, preventive care.
    team: [Visara Urovi, Michel Dumontier]
    funder: European Union (Horizon Europe)
    amount: "€6–10M"
    period: "2023–2027"
    status: Active
    url: https://icare4cvd.eu/
    logo: https://www.ihi.europa.eu/sites/default/files/projects/logos/iCare4CVD.png

  - acronym: DACIL
    title: Developing A digital COPD companion for Improving Lifestyle
    theme: Precision Medicine & Digital Health
    desc: >
      DACIL develops an AI-supported digital companion for people with chronic obstructive pulmonary disease (COPD),
      enabling continuous, non-invasive monitoring in the home environment using speech and sensor data. The system
      supports early detection of disease deterioration and provides personalised lifestyle guidance, empowering
      patients to self-manage their condition, reduce hospitalisation, and address health inequalities.
    team: [Visara Urovi]
    funder: NWO (Dutch Research Council) – KIC programme
    amount: "Multi-partner public-private funding (exact amount not publicly specified)"
    period: "2023–2029"
    status: Active