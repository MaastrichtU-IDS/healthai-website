courses:
  - code: DKE3001
    title: Introduction to Machine Learning
    level: BSc
    period: Period 1
    staff: R. Cavill, R. Nanda
    desc: Foundations of supervised and unsupervised learning, probabilistic modelling and model evaluation.

  - code: DKE4012
    title: Knowledge Graphs & Semantic Web
    level: BSc
    period: Period 2
    staff: M. Dumontier, R. Celebi
    desc: RDF, OWL, SPARQL and the principles of linked data, with applications to biomedical ontologies.

  - code: DKE6001
    title: Advanced Deep Learning
    level: MSc
    period: Period 1
    staff: P. Bonizzi, C. Sun
    desc: "Convolutional, recurrent and transformer architectures; self-supervised learning; responsible AI."

  - code: DKE6022
    title: Federated & Privacy-Preserving Machine Learning
    level: MSc
    period: Period 3
    staff: V. Urovi, C. Sun
    desc: "Federated learning frameworks, differential privacy, secure aggregation and regulatory context (GDPR)."

  - code: DKE6034
    title: Health Data Science
    level: MSc
    period: Period 2
    staff: R. Nanda, A. Kasimati, K. Zarkogianni
    desc: "Clinical data types, EHR mining, survival analysis, clinical decision support and translational AI."

  - code: DKE7005
    title: Biomedical Informatics
    level: MSc
    period: Period 4
    staff: M. Dumontier, R. Celebi, C. Brewster
    desc: "FAIR data, knowledge representation, clinical terminologies (SNOMED, ICD), and health data interoperability."

  - code: DKE7018
    title: Computational Biology
    level: MSc
    period: Period 3
    staff: R. Cavill, C. Brewster
    desc: "Bioinformatics algorithms, multi-omics integration, pathway analysis and biomarker discovery."

  - code: PhD-ACS01
    title: Research Methods for Health AI (Doctoral)
    level: PhD
    period: Year 1
    staff: All HAIR faculty
    desc: Doctoral-level seminar covering experimental design, evaluation methodology, ethics, and responsible innovation in health AI research.
