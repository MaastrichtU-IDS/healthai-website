<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications · HAIR Group · Maastricht University</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>#pubPage { max-width: 900px; }</style>
</head>
<body class="page-body">
<script src="nav.js"></script>
<script src="cms.js"></script>

<div class="page-hero">
  <div class="container">
    <span class="section-label">Research output</span>
    <h1>Publications</h1>
    <p class="lead">Peer-reviewed articles, conference papers and preprints from the HAIR Group.</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="loading" id="loading"><div class="spinner"></div> Loading…</div>
    <div id="pubPage" class="hidden"></div>
  </div>
</section>

<script>
(async () => {
  const [data, people] = await CMS.loadAll(
    'content/publications.generated.yaml',
    'content/people.yaml'
  );
  const allPubs = data.publications;
  const orcidToName = Object.fromEntries(
    (people || []).filter(p => p.orcid).map(p => [p.orcid, p.name])
  );
  const thisYearLabel = data.stats.this_year_label || `Published in ${new Date().getFullYear()}`;
  const initialSearch = new URLSearchParams(location.search).get('q') || '';

  document.getElementById('loading').remove();
  const container = document.getElementById('pubPage');
  container.classList.remove('hidden');

  CMS.PubBrowser.init(container, allPubs, {
    orcidToName,
    showThisYear: true,
    thisYearLabel,
    initialSearch,
  });
})();
</script>
</body>
</html>
