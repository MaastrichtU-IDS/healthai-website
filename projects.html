<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects · HAIR Group · Maastricht University</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    .proj-stats {
      display: flex; gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 32px;
    }
    .proj-stat { flex: 1; background: var(--white); padding: 18px 20px; text-align: center; }
    .proj-stat-val { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; color: var(--slate); line-height: 1; }
    .proj-stat-lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 22px; }
    @media (max-width: 640px) {
      .proj-stats { flex-wrap: wrap; }
      .proj-stat { flex: 1 1 45%; }
      .proj-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="page-body">
<script src="nav.js"></script>
<script src="cms.js"></script>

<div class="page-hero">
  <div class="container">
    <span class="section-label">What we build</span>
    <h1>Projects</h1>
    <p class="lead">Funded research projects spanning AI, health, agriculture and regulatory science.</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="loading" id="loading"><div class="spinner"></div> Loading…</div>

    <div id="pageContent" class="hidden">
      <div class="proj-stats" id="projStats"></div>

      <div class="filter-bar">
        <input class="search-input" id="projSearch" type="text"
               placeholder="Search projects by title, description, team or funder…"
               oninput="filterProjects()" />
        <div style="flex-basis:100%;height:0"></div>
        <div class="filter-chips" id="statusChips"></div>
        <div style="flex-basis:100%;height:0"></div>
        <div class="filter-chips" id="themeChips"></div>
      </div>

      <div class="proj-grid" id="projGrid"></div>
      <p class="hidden no-results" id="noResults">No matching projects found.</p>
    </div>
  </div>
</section>

<script>
let _projects = [], _nameToSlug = {}, _themeToId = {};
let activeStatus = 'All', activeTheme = 'All';

(async () => {
  const [data, people] = await CMS.loadAll('content/research.yaml', 'content/people.yaml');
  document.getElementById('loading').remove();
  document.getElementById('pageContent').classList.remove('hidden');

  _nameToSlug = Object.fromEntries((people || []).filter(p => p.slug).map(p => [p.name, p.slug]));
  _themeToId  = Object.fromEntries((data.themes || []).map(t => [t.title, t.id]));
  _projects   = data.projects || [];

  /* Stats */
  const active    = _projects.filter(p => p.status === 'Active').length;
  const completed = _projects.filter(p => p.status === 'Completed').length;
  document.getElementById('projStats').innerHTML = [
    { val: _projects.length, lbl: 'Total projects' },
    { val: active,           lbl: 'Active' },
    { val: completed,        lbl: 'Completed' },
    { val: (data.themes||[]).length, lbl: 'Research themes' },
  ].map(s => `<div class="proj-stat"><div class="proj-stat-val">${s.val}</div><div class="proj-stat-lbl">${s.lbl}</div></div>`).join('');

  /* Status chips */
  const statuses = ['All', ...new Set(_projects.map(p => p.status).filter(Boolean))];
  document.getElementById('statusChips').innerHTML = statuses.map(s =>
    `<button class="chip${s === 'Active' ? ' active' : ''}" onclick="setStatus('${s}')">${s}</button>`
  ).join('');
  activeStatus = 'Active';

  /* Theme chips */
  const themes = ['All', ...new Set(_projects.map(p => p.theme).filter(Boolean))];
  document.getElementById('themeChips').innerHTML = themes.map(t =>
    `<button class="chip${t === 'All' ? ' active' : ''}" onclick="setTheme('${encodeURIComponent(t)}')">${t}</button>`
  ).join('');

  filterProjects();
})();

function setStatus(s) {
  activeStatus = s;
  document.querySelectorAll('#statusChips .chip').forEach(c => c.classList.toggle('active', c.textContent === s));
  filterProjects();
}
function setTheme(encoded) {
  const t = decodeURIComponent(encoded);
  activeTheme = t;
  document.querySelectorAll('#themeChips .chip').forEach(c => c.classList.toggle('active', c.textContent === t));
  filterProjects();
}

function filterProjects() {
  const q = document.getElementById('projSearch').value.toLowerCase();
  const filtered = _projects.filter(p => {
    if (activeStatus !== 'All' && p.status !== activeStatus) return false;
    if (activeTheme !== 'All' && p.theme !== activeTheme) return false;
    if (!q) return true;
    return [p.acronym, p.title, p.desc, p.funder, (p.team||[]).join(' ')].join(' ').toLowerCase().includes(q);
  });
  const grid = document.getElementById('projGrid');
  grid.innerHTML = filtered.map(p => renderCard(p)).join('');
  document.getElementById('noResults').classList.toggle('hidden', filtered.length > 0);
  CMS.revealNew(grid);
}

function renderCard(p) {
  const themeId  = _themeToId[p.theme];
  const themeUrl = themeId ? `research.html#theme-${themeId}` : 'research.html';
  const statusCls = p.status === 'Active' ? 'tag-active' : 'tag-muted';

  const logo = p.logo
    ? `<div class="proj-logo"><img src="${p.logo}" alt="${p.acronym} logo" loading="lazy"></div>`
    : '';

  const teamHtml = (p.team || []).map(name => {
    const slug = _nameToSlug[name];
    return slug
      ? `<a class="proj-member" href="people/?id=${slug}">${name}</a>`
      : `<span class="proj-member">${name}</span>`;
  }).join('');

  const meta = [p.period, p.funder, p.amount].filter(Boolean).join(' · ');

  const titleLine = p.title && p.title.trim() && p.title.trim() !== p.acronym
    ? `<div class="proj-title">${p.title.trim()}</div>`
    : '';

  const urlLink = p.url
    ? `<a class="proj-url" href="${p.url}" target="_blank" rel="noopener">Visit project →</a>`
    : '';

  const featuredBadge = p.featured ? `<span class="tag tag-gold" style="font-size:0.68rem">Featured</span>` : '';

  return `
    <div class="proj-card${p.featured ? ' is-featured' : ''} reveal">
      ${logo}
      <div class="proj-body">
        <div class="proj-top">
          <a class="proj-theme-link" href="${themeUrl}">${p.theme || ''}</a>
          <div class="proj-badges">
            ${featuredBadge}
            <span class="tag ${statusCls}" style="font-size:0.68rem">${p.status}</span>
          </div>
        </div>
        <div class="proj-acronym">${p.acronym}</div>
        ${titleLine}
        <p class="proj-desc">${(p.desc || '').trim()}</p>
        <div class="proj-footer">
          ${teamHtml ? `<div class="proj-team">${teamHtml}</div>` : ''}
          ${meta ? `<div class="proj-meta">${meta}</div>` : ''}
          ${urlLink}
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
