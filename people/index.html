<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Profile · HAIR Group · Maastricht University</title>
  <base href="../" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    /* ── Hero ── */
    #personPage .page-hero { background: var(--slate); border-bottom-color: transparent; padding: 32px 0 28px; }
    .person-hero-inner { display: flex; gap: 36px; align-items: flex-start; }
    .person-avatar-lg {
      width: 130px; height: 130px; flex-shrink: 0; border-radius: 50%;
      overflow: hidden; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 2.8rem; font-weight: 700;
      color: rgba(255,255,255,0.35);
    }
    .person-avatar-lg img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 15%; }
    .person-hero-text { flex: 1; }
    .person-hero-text .back-link {
      font-size: 0.78rem; color: rgba(255,255,255,0.4); text-decoration: none;
      display: inline-block; margin-bottom: 14px; transition: color var(--transition);
    }
    .person-hero-text .back-link:hover { color: rgba(255,255,255,0.7); }
    .person-hero-text h1 { color: white; margin-bottom: 6px; line-height: 1.15; }
    .person-hero-role { color: rgba(46,143,160,0.9); font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
    .person-hero-dept { color: rgba(255,255,255,0.45); font-size: 0.8rem; margin-bottom: 22px; }
    .hero-stat-row { display: flex; gap: 32px; }
    .hero-stat-val { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: white; line-height: 1; }
    .hero-stat-lbl { font-size: 0.7rem; color: rgba(255,255,255,0.45); margin-top: 3px; }

    /* ── Profile sections ── */
    .profile-content { max-width: 900px; padding-top: 12px; padding-bottom: 80px; }
    .profile-section { margin-bottom: 52px; }
    .profile-section-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1.5px solid var(--border);
    }
    .profile-bio { font-size: 0.92rem; line-height: 1.85; color: var(--text-muted); }
    .profile-links { display: flex; flex-wrap: wrap; gap: 8px; }
    .profile-link {
      padding: 7px 14px; border-radius: 6px; font-size: 0.8rem;
      border: 1px solid var(--border); color: var(--slate-mid);
      display: flex; align-items: center; gap: 6px; text-decoration: none;
      transition: all var(--transition);
    }
    .profile-link:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

    @media (max-width: 600px) {
      .person-hero-inner { flex-direction: column; gap: 18px; }
      .person-avatar-lg { width: 90px; height: 90px; font-size: 2rem; }
    }
  </style>
</head>
<body class="page-body">
<script src="nav.js"></script>
<script src="cms.js"></script>

<div class="loading" id="loading"><div class="spinner"></div> Loading…</div>

<div id="notFound" class="hidden">
  <div class="page-hero">
    <div class="container">
      <span class="section-label">Not found</span>
      <h1>Person not found</h1>
      <p class="lead">No team member matches that profile URL.</p>
      <a href="people.html" class="btn btn-primary" style="margin-top:16px">← Back to People</a>
    </div>
  </div>
</div>

<div id="personPage" class="hidden">
  <div class="page-hero">
    <div class="container">
      <div class="person-hero-inner">
        <div class="person-avatar-lg" id="heroAvatar"></div>
        <div class="person-hero-text">
          <a href="people.html" class="back-link">← People</a>
          <h1 id="heroName"></h1>
          <div class="person-hero-role" id="heroRole"></div>
          <div class="person-hero-dept">Dept. of Advanced Computing Sciences · Maastricht University</div>
          <div class="hero-stat-row" id="heroStats"></div>
        </div>
      </div>
    </div>
  </div>

  <section>
    <div class="container profile-content">
      <div class="profile-section" id="secBio"></div>
      <div class="profile-section" id="secThemes"></div>
      <div class="profile-section" id="secLinks"></div>
      <div class="profile-section" id="secActivity"></div>
      <div class="profile-section" id="secPubs"></div>
    </div>
  </section>
</div>

<script>
const { icon: ICON, ICONS } = CMS;

function imgSrc(url) { return url || ''; }

const fmt = n => Number(n).toLocaleString();

(async () => {
  const slug = new URLSearchParams(location.search).get('id');
  if (!slug) {
    document.getElementById('loading').remove();
    document.getElementById('notFound').classList.remove('hidden');
    return;
  }

  const [people, news, pubData] = await Promise.all([
    CMS.load('content/people.yaml'),
    CMS.load('content/news.yaml'),
    CMS.load('content/publications.generated.yaml').catch(() => ({ publications: [] })),
  ]);

  document.getElementById('loading').remove();

  const person = (Array.isArray(people) ? people : []).find(p => p.slug === slug);
  if (!person) {
    document.getElementById('notFound').classList.remove('hidden');
    return;
  }

  document.getElementById('pageTitle').textContent = `${person.name} · HAIR Group`;

  // Hero
  const src = imgSrc(person.image_url);
  document.getElementById('heroAvatar').innerHTML = src
    ? `<img src="${src}" alt="${person.name}">`
    : CMS.initials(person.name);
  document.getElementById('heroName').textContent = person.name;
  document.getElementById('heroRole').textContent = person.role;

  const allPubs = (pubData.publications || []);
  const myPubs = allPubs.filter(pub => person.orcid && (pub.orcids || []).includes(person.orcid));
  const totalCites = myPubs.reduce((s, p) => s + (p.citations || 0), 0);

  if (myPubs.length) {
    document.getElementById('heroStats').innerHTML = `
      <div><div class="hero-stat-val">${myPubs.length}</div><div class="hero-stat-lbl">Publications</div></div>
      <div><div class="hero-stat-val">${fmt(totalCites)}</div><div class="hero-stat-lbl">Citations</div></div>`;
  }

  // Bio
  if (person.bio && person.bio.trim() && !person.bio.includes('TODO')) {
    document.getElementById('secBio').innerHTML = `
      <div class="profile-section-title">About</div>
      <p class="profile-bio">${person.bio.trim()}</p>`;
  }

  // Themes & Keywords
  const themes = (person.themes || []).filter(Boolean);
  const kws = (person.keywords || []).filter(Boolean);
  if (themes.length || kws.length) {
    let html = '<div class="profile-section-title">Research</div>';
    if (themes.length) html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${kws.length ? 10 : 0}px">${themes.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
    if (kws.length) html += `<div style="display:flex;gap:6px;flex-wrap:wrap">${kws.map(k => `<span class="tag tag-muted">${k}</span>`).join('')}</div>`;
    document.getElementById('secThemes').innerHTML = html;
  }

  // Links
  const links = [];
  if (person.email)          links.push(`<a class="profile-link" href="mailto:${person.email}">${ICONS.email} Email</a>`);
  if (person.orcid)          links.push(`<a class="profile-link" href="https://orcid.org/${person.orcid}" target="_blank" rel="noopener">${ICONS.orcid} ORCID</a>`);
  if (person.google_scholar) links.push(`<a class="profile-link" href="https://scholar.google.com/citations?user=${person.google_scholar}" target="_blank" rel="noopener">${ICONS.scholar} Google Scholar</a>`);
  if (person.linkedin)       links.push(`<a class="profile-link" href="https://www.linkedin.com/in/${person.linkedin}" target="_blank" rel="noopener">${ICONS.linkedin} LinkedIn</a>`);
  if (person.cris_url)       links.push(`<a class="profile-link" href="${person.cris_url}" target="_blank" rel="noopener">${ICONS.pure} PURE</a>`);
  if (person.work_url)       links.push(`<a class="profile-link" href="${person.work_url}" target="_blank" rel="noopener">${ICONS.work} UM page</a>`);
  if (person.personal_page)  links.push(`<a class="profile-link" href="${person.personal_page}" target="_blank" rel="noopener">${ICONS.home} Personal page</a>`);
  if (links.length) {
    document.getElementById('secLinks').innerHTML = `
      <div class="profile-section-title">Links</div>
      <div class="profile-links">${links.join('')}</div>`;
  }

  // Publications browser
  if (myPubs.length) {
    CMS.PubBrowser.init(document.getElementById('secPubs'), myPubs, {
      highlightName: person.name.split(' ').pop(),
      pageSize: 20,
      scrollTarget: 'secPubs',
      sectionTitle: 'Publications',
    });
  }

  // Activity
  const personName = person.name.toLowerCase();
  const activity = CMS.normalizeNewsItems(news)
    .filter(item => item.search.toLowerCase().includes(personName));
  if (activity.length) {
    document.getElementById('secActivity').innerHTML = `
      <div class="profile-section-title">News & Activity</div>
      ${activity.map(item => CMS.renderNewsItem(item)).join('')}`;
  }

  document.getElementById('personPage').classList.remove('hidden');
  CMS.revealNew(document.getElementById('personPage'));
})();
</script>
</body>
</html>
